<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой IP и местоположение</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #0f3460;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .header h1 {
            font-size: 1.8rem;
            background: linear-gradient(90deg, #e94560, #0f3460, #53d8fb);
            background-size: 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 3s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .info-card {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border: 1px solid #0f3460;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .info-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(83, 216, 251, 0.15);
        }

        .info-card .icon {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .info-card .label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 6px;
        }

        .info-card .value {
            font-size: 1.2rem;
            font-weight: bold;
            color: #53d8fb;
            word-break: break-all;
        }

        .ip-highlight {
            font-size: 1.6rem !important;
            color: #e94560 !important;
            cursor: pointer;
            position: relative;
        }

        .ip-highlight:hover::after {
            content: 'Нажмите, чтобы скопировать';
            position: absolute;
            bottom: -28px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            color: #888;
            white-space: nowrap;
        }

        .map-container {
            padding: 0 20px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        #map {
            width: 100%;
            height: 500px;
            border-radius: 12px;
            border: 2px solid #0f3460;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
        }

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #0f3460;
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading p {
            margin-top: 15px;
            color: #888;
        }

        .error-msg {
            background: rgba(233, 69, 96, 0.1);
            border: 1px solid #e94560;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            color: #e94560;
            margin: 20px;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }

        .footer {
            text-align: center;
            padding: 15px;
            color: #555;
            font-size: 0.8rem;
        }

        .copy-toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #53d8fb;
            color: #000;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.3s;
            z-index: 9999;
        }

        .copy-toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .leaflet-popup-content-wrapper {
            background: #1a1a2e !important;
            color: #e0e0e0 !important;
            border: 1px solid #0f3460 !important;
            border-radius: 10px !important;
        }

        .leaflet-popup-tip {
            background: #1a1a2e !important;
        }

        .popup-content {
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .popup-content strong {
            color: #53d8fb;
        }

        @media (max-width: 600px) {
            .header h1 { font-size: 1.3rem; }
            #map { height: 350px; }
            .info-card .value { font-size: 1rem; }
            .ip-highlight { font-size: 1.2rem !important; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🌍 Мой IP и местоположение</h1>
    </div>

    <div id="content">
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Определяем ваш IP и местоположение...</p>
        </div>
    </div>

    <div class="copy-toast" id="toast">📋 IP скопирован!</div>

    <div class="footer">
        Данные предоставлены ipapi.co • Карта: OpenStreetMap (Leaflet)
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const content = document.getElementById('loading');
        const toast = document.getElementById('toast');
        let map = null;
        let marker = null;

        function copyIP(ip) {
            navigator.clipboard.writeText(ip).then(() => {
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2000);
            });
        }

        function showIP(data) {
            const ip = data.query || data.ip;
            const cards = [
                { icon: '🌐', label: 'IP-адрес', value: ip, isIP: true },
                { icon: '🏙️', label: 'Город', value: data.city || '—' },
                { icon: '📍', label: 'Регион', value: data.region || data.regionName || '—' },
                { icon: '🗺️', label: 'Страна', value: (data.country || '—') + ' ' + (data.country_code || data.countryCode ? getFlag(data.country_code || data.countryCode) : '') },
                { icon: '📮', label: 'Почтовый индекс', value: data.postal || data.zip || '—' },
                { icon: '🕐', label: 'Часовой пояс', value: data.timezone || '—' },
                { icon: '🏢', label: 'Провайдер (ISP)', value: data.org || data.isp || '—' },
                { icon: '📐', label: 'Координаты', value: `${data.lat}, ${data.lon}` },
            ];

            let html = '<div class="info-grid">';
            cards.forEach(card => {
                const cls = card.isIP ? 'value ip-highlight' : 'value';
                const clickAttr = card.isIP ? `onclick="copyIP('${ip}')"` : '';
                html += `
                    <div class="info-card">
                        <div class="icon">${card.icon}</div>
                        <div class="label">${card.label}</div>
                        <div class="${cls}" ${clickAttr}>${card.value}</div>
                    </div>`;
            });
            html += '</div>';

            html += `
                <div class="map-container">
                    <div id="map"></div>
                </div>`;

            content.outerHTML = html;

            initMap(data.lat, data.lon, data);
        }

        function getFlag(code) {
            if (!code) return '';
            const offset = 127397;
            return String.fromCodePoint(
                code.toUpperCase().charCodeAt(0) + offset,
                code.toUpperCase().charCodeAt(1) + offset
            );
        }

        function initMap(lat, lon, data) {
            map = L.map('map').setView([lat, lon], 12);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
                maxZoom: 18
            }).addTo(map);

            const city = data.city || '';
            const country = data.country || '';
            const popupHTML = `
                <div class="popup-content">
                    <strong>📍 ${city || 'Ваше местоположение'}</strong><br>
                    ${country}<br>
                    <small>${parseFloat(lat).toFixed(4)}, ${parseFloat(lon).toFixed(4)}</small>
                </div>`;

            const icon = L.divIcon({
                html: `<div style="
                    width: 20px; height: 20px;
                    background: #e94560;
                    border: 3px solid #fff;
                    border-radius: 50%;
                    box-shadow: 0 0 15px rgba(233,69,96,0.7);
                "></div>`,
                iconSize: [20, 20],
                iconAnchor: [10, 10],
                popupAnchor: [0, -12],
                className: ''
            });

            marker = L.marker([lat, lon], { icon }).addTo(map);
            marker.bindPopup(popupHTML).openPopup();

            L.circle([lat, lon], {
                radius: 2000,
                color: '#e94560',
                fillColor: '#e94560',
                fillOpacity: 0.08,
                weight: 1
            }).addTo(map);
        }

        function showError(msg) {
            content.outerHTML = `
                <div class="error-msg">
                    <h2>⚠️ Ошибка</h2>
                    <p>${msg}</p>
                    <br>
                    <button onclick="location.reload()" style="
                        background: #e94560; color: #fff; border: none;
                        padding: 10px 25px; border-radius: 8px; cursor: pointer;
                        font-size: 1rem;
                    ">🔄 Повторить</button>
                </div>`;
        }

        // ====== Загрузка данных (исправленная версия с HTTPS) ======
        async function fetchIP() {
            try {
                // Основной сервис - ipapi.co (поддерживает HTTPS)
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                
                if (data.error) {
                    throw new Error(data.reason || 'Ошибка API');
                }
                
                // Преобразуем формат данных для совместимости с showIP
                const formattedData = {
                    query: data.ip,
                    ip: data.ip,
                    city: data.city,
                    region: data.region,
                    regionName: data.region,
                    country: data.country_name,
                    countryCode: data.country_code,
                    zip: data.postal,
                    lat: data.latitude,
                    lon: data.longitude,
                    timezone: data.timezone,
                    org: data.org,
                    isp: data.org
                };
                
                showIP(formattedData);
            } catch (e) {
                console.warn('ipapi.co не доступен, пробуем ipinfo.io...', e);
                
                try {
                    // Резервный сервис - ipinfo.io
                    const res2 = await fetch('https://ipinfo.io/json');
                    const data2 = await res2.json();
                    
                    if (data2.error) {
                        throw new Error(data2.error);
                    }
                    
                    const [lat, lon] = (data2.loc || '0,0').split(',').map(Number);
                    
                    const formattedData = {
                        query: data2.ip,
                        ip: data2.ip,
                        city: data2.city,
                        region: data2.region,
                        regionName: data2.region,
                        country: data2.country,
                        countryCode: data2.country,
                        zip: data2.postal,
                        lat: lat,
                        lon: lon,
                        timezone: data2.timezone,
                        org: data2.org,
                        isp: data2.org
                    };
                    
                    showIP(formattedData);
                } catch (e2) {
                    console.error('Все API недоступны', e2);
                    showError('Не удалось получить данные об IP. Проверьте подключение к интернету и отключите AdBlock если он включён.<br><small>' + e2.message + '</small>');
                }
            }
        }

        // Запускаем приложение
        fetchIP();
    </script>

</body>
</html>
