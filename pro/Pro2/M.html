<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Детектор поля — через компас</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: #0a0f1e;
            font-family: system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            color: white;
        }
        .card {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 24px;
            max-width: 500px;
            width: 100%;
        }
        h1 { text-align: center; margin: 0 0 8px; font-size: 1.6rem; }
        .sub { text-align: center; font-size: 0.75rem; opacity: 0.7; margin-bottom: 24px; }
        .meter {
            background: #1a2a34;
            border-radius: 60px;
            height: 30px;
            width: 100%;
            margin: 20px 0;
            overflow: hidden;
        }
        .meter-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #2ecc71, #f1c40f, #e67e22, #e74c3c);
            transition: width 0.1s ease;
        }
        .value {
            text-align: center;
            font-size: 3rem;
            font-weight: bold;
            font-family: monospace;
            margin: 16px 0;
        }
        .status {
            text-align: center;
            font-size: 0.9rem;
            margin: 12px 0;
            padding: 8px;
            border-radius: 40px;
            background: #00000044;
        }
        button {
            background: #2c6e9e;
            border: none;
            width: 100%;
            padding: 14px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 60px;
            color: white;
            margin-top: 16px;
            cursor: pointer;
        }
        .note {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 20px;
            opacity: 0.6;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>🧲 ДЕТЕКТОР ПОЛЯ</h1>
    <div class="sub">через компас · работает везде</div>

    <div class="meter">
        <div class="meter-fill" id="meterFill"></div>
    </div>

    <div class="value">
        <span id="fieldValue">0</span><span style="font-size: 1.2rem;">%</span>
    </div>

    <div class="status" id="statusMsg">⏳ Нажмите кнопку</div>

    <button id="activateBtn">🔓 АКТИВИРОВАТЬ</button>

    <div class="note">
        ⚡ Подносите телефон к работающим проводам, розеткам, блоку питания.<br>
        Чем выше процент — тем сильнее магнитное поле.<br>
        📱 Работает на Android и iPhone.
    </div>
</div>

<script>
    const meterFill = document.getElementById('meterFill');
    const fieldSpan = document.getElementById('fieldValue');
    const statusMsg = document.getElementById('statusMsg');
    const activateBtn = document.getElementById('activateBtn');

    let lastHeading = 0;
    let disturbance = 0;
    let isActive = false;

    // Функция обновления UI по уровню возмущения
    function updateUI(levelPercent) {
        let percent = Math.min(100, Math.max(0, levelPercent));
        meterFill.style.width = percent + "%";
        fieldSpan.innerText = Math.floor(percent);

        if (percent < 15) {
            statusMsg.innerHTML = "🟢 Фоновое поле · норма";
            statusMsg.style.background = "#1a5a3a44";
        } else if (percent < 40) {
            statusMsg.innerHTML = "🟡 Слабое возмущение · возможно, рядом провод";
            statusMsg.style.background = "#9a7b2e44";
        } else if (percent < 70) {
            statusMsg.innerHTML = "🟠 Сильное поле · источник тока рядом!";
            statusMsg.style.background = "#c0681e44";
        } else {
            statusMsg.innerHTML = "🔴 ОЧЕНЬ СИЛЬНО! · прибор поднесён вплотную";
            statusMsg.style.background = "#a5222244";
        }
    }

    // Обработчик показаний компаса
    function handleOrientation(event) {
        if (!isActive) return;

        let heading = event.alpha;
        if (event.webkitCompassHeading !== undefined) {
            heading = event.webkitCompassHeading;
        }
        if (heading === null || heading === undefined) return;

        // Вычисляем резкость изменения угла (отклонение от предыдущего)
        let delta = Math.abs(heading - lastHeading);
        // Нормализуем через 360°
        if (delta > 180) delta = 360 - delta;
        
        // Сглаживаем: новое возмущение = 70% старого + 30% нового скачка
        disturbance = disturbance * 0.7 + delta * 0.3;
        
        // Преобразуем в проценты: скачок 15° -> ~50%, 30° -> 100%
        let percent = Math.min(100, (disturbance / 25) * 100);
        updateUI(percent);
        
        lastHeading = heading;
    }

    // Запуск с разрешением (для iOS)
    function startDetector() {
        if (window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientation', handleOrientation);
            isActive = true;
            statusMsg.innerHTML = "✅ Детектор активен! Подносите к проводам.";
            statusMsg.style.background = "#2e7d5e44";
        } else {
            statusMsg.innerHTML = "❌ Датчики не поддерживаются";
        }
    }

    function requestPermission() {
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            statusMsg.innerHTML = "📱 Требуется разрешение...";
            DeviceOrientationEvent.requestPermission()
                .then(permissionState => {
                    if (permissionState === 'granted') {
                        startDetector();
                    } else {
                        statusMsg.innerHTML = "❌ Доступ запрещён";
                    }
                })
                .catch(() => statusMsg.innerHTML = "⚠️ Ошибка запроса");
        } else {
            startDetector();
        }
    }

    activateBtn.addEventListener('click', () => {
        requestPermission();
    });

    // Подсказка
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission !== 'function') {
        statusMsg.innerHTML = "▶️ Нажмите кнопку для активации";
    }
</script>
</body>
</html>
