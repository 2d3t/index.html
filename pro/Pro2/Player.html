
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vibify | Элегантный музыкальный плеер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #0b0b12;
            --bg-surface: #12121a;
            --bg-elevated: #1a1a24;
            --glass-bg: rgba(25, 25, 35, 0.75);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary: #8b5cf6;
            --primary-soft: #a78bfa;
            --primary-deep: #6d28d9;
            --text-white: #ffffff;
            --text-gray: #cbd5e1;
            --text-muted: #6b7280;
            --accent-glow: rgba(139, 92, 246, 0.2);
            --card-hover: rgba(255, 255, 255, 0.03);
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: var(--bg-deep);
            color: var(--text-white);
            min-height: 100vh;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* Тонкая текстура фона */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 25% 40%, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
                              radial-gradient(circle at 75% 70%, rgba(16, 185, 129, 0.03) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 1.75rem;
            position: relative;
            z-index: 2;
        }

        /* Header */
        .header {
            margin-bottom: 2rem;
            text-align: center;
        }

        .logo {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(120deg, #ffffff, var(--primary-soft));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo span {
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
            color: var(--primary-soft);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 0.3rem;
            font-weight: 400;
        }

        /* Grid layout */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1.4fr;
            gap: 1.75rem;
        }

        @media (max-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
            .container {
                padding: 1rem;
            }
        }

        /* Glassmorphic cards — refined */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            border: 1px solid var(--glass-border);
            padding: 1.5rem;
            transition: all 0.25s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .glass-card:hover {
            border-color: rgba(139, 92, 246, 0.3);
            background: rgba(30, 30, 40, 0.8);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.25rem;
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--text-gray);
            letter-spacing: -0.2px;
        }

        /* Buttons */
        .btn {
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            font-weight: 500;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-gray);
            backdrop-filter: blur(4px);
        }

        .btn-primary {
            background: linear-gradient(105deg, var(--primary), var(--primary-deep));
            color: white;
            box-shadow: 0 2px 8px rgba(107, 70, 193, 0.25);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            background: linear-gradient(105deg, var(--primary-soft), var(--primary));
            box-shadow: 0 6px 16px rgba(107, 70, 193, 0.4);
        }

        .btn-outline {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .btn-outline:hover {
            background: rgba(139, 92, 246, 0.25);
            border-color: var(--primary-soft);
            color: white;
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.3);
            color: white;
        }

        /* Playlist list */
        .playlist-list {
            max-height: 280px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
            padding-right: 4px;
        }

        .playlist-item {
            background: rgba(0, 0, 0, 0.35);
            border-radius: 1.25rem;
            padding: 0.9rem 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .playlist-item:hover {
            background: var(--card-hover);
            transform: translateX(3px);
            border-color: rgba(139, 92, 246, 0.4);
        }

        .playlist-item.active {
            background: linear-gradient(115deg, rgba(139, 92, 246, 0.2), rgba(109, 40, 217, 0.15));
            border-left: 3px solid var(--primary);
            border-color: var(--primary);
        }

        .playlist-info .name {
            font-weight: 600;
            margin-bottom: 0.2rem;
        }

        .playlist-info .count {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        /* Track list */
        .track-list {
            max-height: 360px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .track-item {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 1rem;
            padding: 0.8rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .track-item:hover {
            background: rgba(139, 92, 246, 0.15);
            transform: scale(1.01);
        }

        .track-item.playing {
            background: linear-gradient(115deg, rgba(139, 92, 246, 0.3), rgba(109, 40, 217, 0.1));
            box-shadow: 0 0 0 1px var(--primary-soft);
        }

        .track-info .title {
            font-weight: 500;
            font-size: 0.9rem;
            margin-bottom: 0.2rem;
        }

        .track-info .artist {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .duration {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-right: 0.75rem;
        }

        /* Now playing card */
        .now-playing {
            text-align: center;
            margin-bottom: 1.8rem;
            padding: 1.2rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 2rem;
        }

        .cover-art {
            width: 110px;
            height: 110px;
            margin: 0 auto 1rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-deep));
            border-radius: 1.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            box-shadow: 0 16px 30px -8px rgba(0, 0, 0, 0.4);
            transition: transform 0.2s;
        }

        .visualizer-container {
            margin: 1.2rem 0;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .visualizer-bar {
            width: 5px;
            background: linear-gradient(180deg, var(--primary-soft), var(--primary));
            border-radius: 4px;
            transition: height 0.08s ease;
            opacity: 0.85;
        }

        .track-title-main {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.2rem;
            letter-spacing: -0.3px;
        }

        .track-artist-main {
            font-size: 0.85rem;
            color: var(--text-gray);
        }

        /* Progress bar */
        .progress-container {
            margin: 1.2rem 0;
        }

        .progress-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            cursor: pointer;
            overflow: hidden;
            transition: height 0.1s;
        }

        .progress-bar:hover {
            height: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--primary-soft));
            border-radius: 10px;
            width: 0%;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            margin-top: 0.5rem;
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        /* Controls */
        .player-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
            margin: 1.8rem 0;
        }

        .control-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:hover {
            background: var(--primary);
            transform: scale(1.05);
            border-color: transparent;
        }

        .play-btn {
            width: 68px;
            height: 68px;
            background: linear-gradient(135deg, var(--primary), var(--primary-deep));
            font-size: 1.7rem;
            box-shadow: 0 8px 18px rgba(139, 92, 246, 0.4);
        }

        .mode-group {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            margin: 0.8rem 0;
        }

        .mode-btn {
            padding: 0.4rem 1rem;
            font-size: 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2rem;
            border: none;
            color: var(--text-gray);
        }

        .mode-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 2px 6px rgba(139, 92, 246, 0.5);
        }

        /* Volume */
        .volume-control {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .volume-slider {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--primary-soft);
            cursor: pointer;
            box-shadow: 0 0 5px var(--primary);
        }

        /* File drop */
        .file-drop {
            border: 1.5px dashed rgba(139, 92, 246, 0.4);
            border-radius: 1.5rem;
            padding: 1.8rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(0, 0, 0, 0.2);
        }

        .file-drop.dragover {
            border-color: var(--primary);
            background: rgba(139, 92, 246, 0.15);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(8, 8, 12, 0.85);
            backdrop-filter: blur(12px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--bg-elevated);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            padding: 1.8rem;
            width: 90%;
            max-width: 500px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.5);
        }

        .file-list {
            max-height: 220px;
            overflow-y: auto;
            margin: 1rem 0;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.6rem 0.8rem;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 1rem;
            margin-bottom: 0.6rem;
            font-size: 0.85rem;
        }

        input, input:focus {
            outline: none;
        }

        input[type="text"], input[type="file"] {
            background: #1e1e2a;
            border: 1px solid #2d2d3a;
            border-radius: 1.2rem;
            padding: 0.8rem 1rem;
            color: white;
            font-size: 0.9rem;
        }

        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 2rem;
            font-size: 0.85rem;
        }

        .flex-group {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        @keyframes subtleFade {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glass-card, .track-item, .playlist-item {
            animation: subtleFade 0.3s ease-out;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">🎵 <span>Vibify</span></div>
        <div class="subtitle">Погружение в звук. Минимализм и атмосфера.</div>
    </div>

    <div class="main-grid">
        <!-- Левая панель: плейлисты и треки -->
        <div class="glass-card">
            <div class="section-header">
                <span>📀 Коллекции</span>
                <div class="flex-group">
                    <button class="btn btn-outline" id="savePlaylistsBtn">💾 Экспорт</button>
                    <button class="btn btn-outline" id="loadPlaylistsBtn">📂 Импорт</button>
                </div>
            </div>
            <div class="flex-group" style="margin-bottom: 1.2rem;">
                <button class="btn btn-primary" id="createPlaylistBtn">➕ Плейлист</button>
                <button class="btn btn-primary" id="addTracksBtn">🎵 Добавить треки</button>
            </div>
            <div class="playlist-list" id="playlistList"></div>

            <div class="section-header" style="margin-top: 1.5rem;">
                <span>🎧 Треки</span>
            </div>
            <div class="track-list" id="trackList"></div>
        </div>

        <!-- Правая панель: плеер -->
        <div class="glass-card">
            <div class="now-playing">
                <div class="cover-art" id="coverArt">🎵</div>
                <div class="visualizer-container" id="visualizer"></div>
                <div class="track-title-main" id="currentTrackTitle">Тишина</div>
                <div class="track-artist-main" id="currentTrackArtist">Выберите трек</div>
            </div>

            <div class="progress-container">
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="time-info">
                    <span id="currentTime">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>

            <div class="player-controls">
                <button class="control-btn" id="prevBtn">⏮</button>
                <button class="control-btn play-btn" id="playPauseBtn">▶</button>
                <button class="control-btn" id="nextBtn">⏭</button>
            </div>

            <div class="mode-group">
                <button class="mode-btn" id="shuffleBtn">🔀 Случайный</button>
                <button class="mode-btn" id="repeatBtn">🔁 Повтор</button>
            </div>

            <div class="volume-control">
                <span>🔊</span>
                <input type="range" min="0" max="1" step="0.01" value="0.7" class="volume-slider" id="volumeSlider">
            </div>
        </div>
    </div>
</div>

<!-- Модалки (структура та же) -->
<div class="modal" id="createModal"><div class="modal-content"><h3 style="margin-bottom: 1rem;">Новый плейлист</h3><input type="text" id="playlistNameInput" placeholder="Название" style="width:100%"><div class="flex-group" style="margin-top: 1.5rem; justify-content: flex-end;"><button class="btn btn-outline" id="cancelCreateBtn">Отмена</button><button class="btn btn-primary" id="confirmCreateBtn">Создать</button></div></div></div>
<div class="modal" id="addModal"><div class="modal-content"><h3 style="margin-bottom: 1rem;">Добавить треки</h3><div class="file-drop" id="fileDropArea">📁 Нажмите или перетащите аудиофайлы<br><small style="opacity:0.6;">MP3, WAV, OGG</small></div><input type="file" id="fileInputElem" multiple accept="audio/*" style="display:none"><div id="selectedFilesContainer" class="file-list"></div><div class="flex-group" style="justify-content: flex-end; margin-top: 1rem;"><button class="btn btn-outline" id="cancelAddBtn">Отмена</button><button class="btn btn-primary" id="confirmAddBtn">Добавить</button></div></div></div>
<div class="modal" id="loadModal"><div class="modal-content"><h3 style="margin-bottom: 1rem;">Загрузить коллекцию</h3><input type="file" id="loadFileInput" accept=".json"><div class="flex-group" style="margin-top: 1.5rem; justify-content: flex-end;"><button class="btn btn-outline" id="cancelLoadBtn">Отмена</button><button class="btn btn-primary" id="confirmLoadBtn">Загрузить</button></div></div></div>

<script>
    // ---------- IndexedDB ----------
    const DB_NAME = 'VibifyDB';
    const STORE_NAME = 'audioStore';
    let db = null;

    function openDB() {
        return new Promise((resolve, reject) => {
            const req = indexedDB.open(DB_NAME, 1);
            req.onerror = () => reject(req.error);
            req.onsuccess = () => { db = req.result; resolve(db); };
            req.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains(STORE_NAME)) {
                    db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                }
            };
        });
    }

    async function saveFileToDB(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = async () => {
                const id = `audio_${Date.now()}_${file.name.replace(/[^a-zA-Z0-9]/g, '_')}`;
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                store.put({ id, name: file.name, type: file.type, data: reader.result });
                tx.oncomplete = () => resolve(id);
                tx.onerror = reject;
            };
            reader.onerror = reject;
            reader.readAsArrayBuffer(file);
        });
    }

    async function loadFileFromDB(id) {
        return new Promise((resolve, reject) => {
            const tx = db.transaction(STORE_NAME, 'readonly');
            const store = tx.objectStore(STORE_NAME);
            const req = store.get(id);
            req.onsuccess = () => {
                if (req.result) {
                    const blob = new Blob([req.result.data], { type: req.result.type });
                    resolve(URL.createObjectURL(blob));
                } else reject('not found');
            };
            req.onerror = reject;
        });
    }

    // ---------- Состояние ----------
    let playlists = [];
    let currentPlaylistId = null;
    let currentTrackId = null;
    let audio = new Audio();
    let isPlaying = false;
    let isShuffle = false;
    let isRepeat = false;
    let playedHistory = [];
    let visualizerInterval = null;
    let pendingFiles = [];

    // DOM elements
    const playlistDiv = document.getElementById('playlistList');
    const trackDiv = document.getElementById('trackList');
    const createPlaylistBtn = document.getElementById('createPlaylistBtn');
    const addTracksBtn = document.getElementById('addTracksBtn');
    const saveBtn = document.getElementById('savePlaylistsBtn');
    const loadBtn = document.getElementById('loadPlaylistsBtn');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const shuffleModeBtn = document.getElementById('shuffleBtn');
    const repeatModeBtn = document.getElementById('repeatBtn');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const currentTimeSpan = document.getElementById('currentTime');
    const durationSpan = document.getElementById('duration');
    const currentTitleSpan = document.getElementById('currentTrackTitle');
    const currentArtistSpan = document.getElementById('currentTrackArtist');
    const volumeSlider = document.getElementById('volumeSlider');
    const coverArt = document.getElementById('coverArt');
    const visualizerContainer = document.getElementById('visualizer');

    // Модальные элементы
    const createModal = document.getElementById('createModal');
    const addModal = document.getElementById('addModal');
    const loadModal = document.getElementById('loadModal');
    const playlistNameInput = document.getElementById('playlistNameInput');
    const confirmCreateBtn = document.getElementById('confirmCreateBtn');
    const cancelCreateBtn = document.getElementById('cancelCreateBtn');
    const fileDropArea = document.getElementById('fileDropArea');
    const fileInputElem = document.getElementById('fileInputElem');
    const selectedFilesContainer = document.getElementById('selectedFilesContainer');
    const confirmAddBtn = document.getElementById('confirmAddBtn');
    const cancelAddBtn = document.getElementById('cancelAddBtn');
    const loadFileInput = document.getElementById('loadFileInput');
    const confirmLoadBtn = document.getElementById('confirmLoadBtn');
    const cancelLoadBtn = document.getElementById('cancelLoadBtn');

    // Визуализатор (не мерцающий, плавный)
    function startVisualizer() {
        if (visualizerInterval) clearInterval(visualizerInterval);
        if (!isPlaying) return;
        visualizerContainer.innerHTML = '';
        const barsCount = 28;
        for (let i = 0; i < barsCount; i++) {
            const bar = document.createElement('div');
            bar.className = 'visualizer-bar';
            bar.style.height = '6px';
            visualizerContainer.appendChild(bar);
        }
        visualizerInterval = setInterval(() => {
            if (!isPlaying || audio.paused) {
                return;
            }
            const intensity = Math.min(0.8, audio.volume * 0.6 + (audio.currentTime % 0.3) * 0.8);
            const bars = document.querySelectorAll('.visualizer-bar');
            const time = Date.now() * 0.006;
            bars.forEach((bar, idx) => {
                let sine = Math.sin(time + idx * 0.3) * 0.6 + 0.4;
                let randomWalk = Math.sin(idx * 0.9 + time * 1.5) * 0.25;
                let height = 6 + (sine + randomWalk) * 22 * intensity;
                bar.style.height = `${Math.min(44, Math.max(5, height))}px`;
            });
        }, 70);
    }

    function stopVisualizer() {
        if (visualizerInterval) clearInterval(visualizerInterval);
        visualizerContainer.innerHTML = '';
    }

    // Хранение данных
    function saveToLocalStorage() {
        const data = playlists.map(pl => ({
            id: pl.id, name: pl.name,
            tracks: pl.tracks.map(t => ({ id: t.id, title: t.title, artist: t.artist, duration: t.duration, fileId: t.fileId }))
        }));
        localStorage.setItem('vibify_data', JSON.stringify(data));
    }

    async function loadFromLocalStorage() {
        const raw = localStorage.getItem('vibify_data');
        if (!raw) return false;
        const parsed = JSON.parse(raw);
        playlists = parsed;
        for (let pl of playlists) {
            for (let t of pl.tracks) {
                if (t.fileId) {
                    try { t.url = await loadFileFromDB(t.fileId); } catch(e) { t.url = null; }
                }
            }
        }
        return true;
    }

    // Рендеры
    function renderPlaylists() {
        if (!playlists.length) { playlistDiv.innerHTML = '<div class="empty-state">✨ Создайте первый плейлист</div>'; return; }
        playlistDiv.innerHTML = playlists.map(pl => `
            <div class="playlist-item ${currentPlaylistId === pl.id ? 'active' : ''}" data-id="${pl.id}">
                <div class="playlist-info"><div class="name">${escapeHtml(pl.name)}</div><div class="count">${pl.tracks.length} треков</div></div>
                <button class="btn btn-outline delete-pl" data-id="${pl.id}" style="padding:4px 10px;">✕</button>
            </div>
        `).join('');
        document.querySelectorAll('.playlist-item').forEach(el => {
            const id = el.dataset.id;
            el.addEventListener('click', (e) => { if (!e.target.classList.contains('delete-pl')) selectPlaylist(id); });
            const delBtn = el.querySelector('.delete-pl');
            if (delBtn) delBtn.addEventListener('click', (e) => { e.stopPropagation(); deletePlaylistById(id); });
        });
    }

    async function renderTracks() {
        if (!currentPlaylistId) { trackDiv.innerHTML = '<div class="empty-state">🎵 Выберите плейлист слева</div>'; return; }
        const pl = playlists.find(p => p.id === currentPlaylistId);
        if (!pl || !pl.tracks.length) { trackDiv.innerHTML = '<div class="empty-state">🎶 Добавьте треки через кнопку выше</div>'; return; }
        trackDiv.innerHTML = pl.tracks.map(t => `
            <div class="track-item ${currentTrackId === t.id ? 'playing' : ''}" data-id="${t.id}">
                <div class="track-info"><div class="title">${escapeHtml(t.title)}</div><div class="artist">${escapeHtml(t.artist)}</div></div>
                <div class="flex-group"><span class="duration">${t.duration}</span><button class="btn btn-outline del-track" data-id="${t.id}" style="padding:4px 8px;">✕</button></div>
            </div>
        `).join('');
        document.querySelectorAll('.track-item').forEach(el => {
            const id = el.dataset.id;
            el.addEventListener('click', (e) => { if (!e.target.classList.contains('del-track')) playTrackById(id); });
            const del = el.querySelector('.del-track');
            if (del) del.addEventListener('click', (e) => { e.stopPropagation(); deleteTrackById(id); });
        });
    }

    function selectPlaylist(id) {
        currentPlaylistId = id;
        currentTrackId = null;
        playedHistory = [];
        audio.pause(); isPlaying = false;
        updatePlayBtn();
        stopVisualizer();
        renderPlaylists();
        renderTracks();
        updateNowPlaying(null);
    }

    async function deletePlaylistById(id) {
        if (!confirm('Удалить плейлист?')) return;
        playlists = playlists.filter(p => p.id !== id);
        if (currentPlaylistId === id) currentPlaylistId = null;
        saveToLocalStorage();
        renderPlaylists();
        renderTracks();
        if (!currentPlaylistId) updateNowPlaying(null);
    }

    async function playTrackById(trackId) {
        const pl = playlists.find(p => p.id === currentPlaylistId);
        if (!pl) return;
        const track = pl.tracks.find(t => t.id === trackId);
        if (!track) return;
        if (!track.url && track.fileId) {
            try { track.url = await loadFileFromDB(track.fileId); } catch(e) { alert('Ошибка загрузки'); return; }
        }
        if (!track.url) return;
        audio.src = track.url;
        currentTrackId = track.id;
        if (isShuffle && !playedHistory.includes(track.id)) playedHistory.push(track.id);
        try {
            await audio.play();
            isPlaying = true;
            updatePlayBtn();
            renderTracks();
            updateNowPlaying(track);
            startVisualizer();
        } catch(e) { console.log(e); }
    }

    function updateNowPlaying(track) {
        if (track) {
            currentTitleSpan.innerText = track.title;
            currentArtistSpan.innerText = track.artist;
            coverArt.innerHTML = '🎧';
            coverArt.style.background = 'linear-gradient(135deg, #8b5cf6, #6d28d9)';
        } else {
            currentTitleSpan.innerText = 'Тишина';
            currentArtistSpan.innerText = 'Выберите трек';
            coverArt.innerHTML = '🎵';
        }
    }

    function deleteTrackById(trackId) {
        const pl = playlists.find(p => p.id === currentPlaylistId);
        if (!pl) return;
        pl.tracks = pl.tracks.filter(t => t.id !== trackId);
        if (currentTrackId === trackId) { audio.pause(); isPlaying = false; updatePlayBtn(); currentTrackId = null; updateNowPlaying(null); stopVisualizer(); }
        saveToLocalStorage();
        renderTracks();
    }

    async function addMultipleTracks(files) {
        if (!currentPlaylistId) { alert('Выберите плейлист'); return; }
        const pl = playlists.find(p => p.id === currentPlaylistId);
        for (let file of files) {
            if (!file.type.startsWith('audio/')) continue;
            const fileId = await saveFileToDB(file);
            const url = await loadFileFromDB(fileId);
            const trackId = `tr_${Date.now()}_${Math.random()}`;
            pl.tracks.push({
                id: trackId, title: file.name.replace(/\.[^/.]+$/, ''), artist: 'Исполнитель', duration: '0:00', fileId, url
            });
        }
        saveToLocalStorage();
        renderTracks();
        alert(`✅ Добавлено ${files.length} треков`);
    }

    async function nextTrack() {
        const pl = playlists.find(p => p.id === currentPlaylistId);
        if (!pl || !pl.tracks.length) return;
        if (isShuffle) {
            let available = pl.tracks.filter(t => !playedHistory.includes(t.id));
            if (!available.length) { playedHistory = []; available = pl.tracks; }
            if (available.length) await playTrackById(available[Math.floor(Math.random() * available.length)].id);
        } else {
            let idx = pl.tracks.findIndex(t => t.id === currentTrackId);
            let nextIdx = (idx + 1) % pl.tracks.length;
            await playTrackById(pl.tracks[nextIdx].id);
        }
    }

    async function prevTrack() {
        const pl = playlists.find(p => p.id === currentPlaylistId);
        if (!pl || !pl.tracks.length) return;
        if (isShuffle && playedHistory.length > 1) {
            await playTrackById(playedHistory[playedHistory.length - 2]);
        } else {
            let idx = pl.tracks.findIndex(t => t.id === currentTrackId);
            let prevIdx = (idx - 1 + pl.tracks.length) % pl.tracks.length;
            await playTrackById(pl.tracks[prevIdx].id);
        }
    }

    function updatePlayBtn() { playPauseBtn.innerHTML = isPlaying ? '⏸' : '▶'; }
    function togglePlayPause() {
        if (!currentPlaylistId) { alert('Выберите плейлист'); return; }
        const pl = playlists.find(p => p.id === currentPlaylistId);
        if (!pl || !pl.tracks.length) { alert('Нет треков'); return; }
        if (!currentTrackId) { playTrackById(pl.tracks[0].id); return; }
        if (isPlaying) { audio.pause(); isPlaying = false; updatePlayBtn(); stopVisualizer(); }
        else { audio.play(); isPlaying = true; updatePlayBtn(); startVisualizer(); }
    }

    function updateProgress() { if (audio.duration) { progressFill.style.width = `${(audio.currentTime / audio.duration) * 100}%`; currentTimeSpan.innerText = formatTime(audio.currentTime); } }
    function setDurationMeta() { if (audio.duration) { durationSpan.innerText = formatTime(audio.duration); const pl = playlists.find(p => p.id === currentPlaylistId); if (pl && currentTrackId) { const track = pl.tracks.find(t => t.id === currentTrackId); if (track && track.duration === '0:00') { track.duration = formatTime(audio.duration); saveToLocalStorage(); renderTracks(); } } } }
    function formatTime(sec) { if (isNaN(sec)) return '0:00'; const m = Math.floor(sec / 60); const s = Math.floor(sec % 60); return `${m}:${s < 10 ? '0' : ''}${s}`; }
    function seek(e) { if (audio.duration) { const rect = progressBar.getBoundingClientRect(); const x = e.clientX - rect.left; audio.currentTime = (x / rect.width) * audio.duration; } }
    function setVolume() { audio.volume = volumeSlider.value; }
    function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    function toggleShuffle() { isShuffle = !isShuffle; if (isShuffle && currentTrackId) playedHistory = [currentTrackId]; shuffleModeBtn.classList.toggle('active', isShuffle); }
    function toggleRepeat() { isRepeat = !isRepeat; repeatModeBtn.classList.toggle('active', isRepeat); audio.loop = isRepeat; }

    // Modal handlers
    function showCreateModal() { createModal.style.display = 'flex'; }
    function hideCreateModal() { createModal.style.display = 'none'; playlistNameInput.value = ''; }
    function createNewPlaylist() { const name = playlistNameInput.value.trim(); if (!name) return; playlists.push({ id: `pl_${Date.now()}`, name, tracks: [] }); saveToLocalStorage(); renderPlaylists(); selectPlaylist(playlists[playlists.length-1].id); hideCreateModal(); }
    function showAddModal() { if (!currentPlaylistId) { alert('Выберите плейлист'); return; } pendingFiles = []; selectedFilesContainer.innerHTML = ''; addModal.style.display = 'flex'; }
    function updatePendingFilesList() { selectedFilesContainer.innerHTML = pendingFiles.map((f, idx) => `<div class="file-item">${f.name} <button class="btn btn-outline" data-idx="${idx}" style="padding:2px 8px;">✕</button></div>`).join(''); document.querySelectorAll('[data-idx]').forEach(btn => btn.addEventListener('click', (e) => { pendingFiles.splice(parseInt(btn.dataset.idx),1); updatePendingFilesList(); })); }
    async function confirmAddFiles() { if (!pendingFiles.length) { alert('Выберите файлы'); return; } await addMultipleTracks(pendingFiles); addModal.style.display = 'none'; pendingFiles = []; }
    async function exportPlaylists() { const data = playlists.map(pl => ({ id: pl.id, name: pl.name, tracks: pl.tracks.map(t => ({ id: t.id, title: t.title, artist: t.artist, duration: t.duration, fileId: t.fileId })) })); const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'vibify_backup.json'; a.click(); URL.revokeObjectURL(a.href); }
    async function importPlaylists(file) { const reader = new FileReader(); reader.onload = async (e) => { const imported = JSON.parse(e.target.result); playlists = imported; for (let pl of playlists) { for (let tr of pl.tracks) { if (tr.fileId) { try { tr.url = await loadFileFromDB(tr.fileId); } catch(e) { tr.url = null; } } } } saveToLocalStorage(); renderPlaylists(); if (playlists.length) selectPlaylist(playlists[0].id); alert('Коллекция загружена!'); }; reader.readAsText(file); }

    // Init
    async function init() {
        await openDB();
        const loaded = await loadFromLocalStorage();
        if (!loaded || !playlists.length) { playlists = [{ id: 'demo', name: 'Основная', tracks: [] }]; saveToLocalStorage(); }
        renderPlaylists();
        if (playlists.length) selectPlaylist(playlists[0].id);
        audio.addEventListener('timeupdate', updateProgress);
        audio.addEventListener('loadedmetadata', setDurationMeta);
        audio.addEventListener('ended', () => { if (isRepeat) { audio.currentTime = 0; audio.play(); } else nextTrack(); });
        progressBar.addEventListener('click', seek);
        volumeSlider.addEventListener('input', setVolume);
        playPauseBtn.addEventListener('click', togglePlayPause);
        prevBtn.addEventListener('click', prevTrack);
        nextBtn.addEventListener('click', nextTrack);
        shuffleModeBtn.addEventListener('click', toggleShuffle);
        repeatModeBtn.addEventListener('click', toggleRepeat);
        createPlaylistBtn.addEventListener('click', showCreateModal);
        confirmCreateBtn.addEventListener('click', createNewPlaylist);
        cancelCreateBtn.addEventListener('click', hideCreateModal);
        addTracksBtn.addEventListener('click', showAddModal);
        cancelAddBtn.addEventListener('click', () => addModal.style.display = 'none');
        confirmAddBtn.addEventListener('click', confirmAddFiles);
        fileDropArea.addEventListener('click', () => fileInputElem.click());
        fileDropArea.addEventListener('dragover', e => { e.preventDefault(); fileDropArea.classList.add('dragover'); });
        fileDropArea.addEventListener('dragleave', () => fileDropArea.classList.remove('dragover'));
        fileDropArea.addEventListener('drop', e => { e.preventDefault(); fileDropArea.classList.remove('dragover'); const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('audio/')); pendingFiles.push(...files); updatePendingFilesList(); });
        fileInputElem.addEventListener('change', (e) => { pendingFiles.push(...Array.from(e.target.files)); updatePendingFilesList(); fileInputElem.value = ''; });
        saveBtn.addEventListener('click', exportPlaylists);
        loadBtn.addEventListener('click', () => loadModal.style.display = 'flex');
        cancelLoadBtn.addEventListener('click', () => loadModal.style.display = 'none');
        confirmLoadBtn.addEventListener('click', async () => { if (loadFileInput.files[0]) await importPlaylists(loadFileInput.files[0]); loadModal.style.display = 'none'; loadFileInput.value = ''; });
        window.addEventListener('click', (e) => { if (e.target.classList.contains('modal')) e.target.style.display = 'none'; });
        audio.volume = 0.7; volumeSlider.value = 0.7;
    }
    init();
</script>
</body>
