
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Музыкальный Плеер - Полная версия</title>
    <style>
        :root {
            --primary: #8a2be2;
            --primary-dark: #6a1cb0;
            --bg-dark: #121212;
            --bg-card: #1e1e1e;
            --bg-hover: #2a2a2a;
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --text-muted: #888888;
            --border: #333333;
            --success: #4caf50;
            --danger: #f44336;
            --warning: #ff9800;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        h1 {
            color: var(--primary);
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .main-content {
            display: flex;
            flex: 1;
            gap: 20px;
        }

        .playlist-section {
            flex: 1;
            background-color: var(--bg-card);
            border-radius: 10px;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        .player-section {
            flex: 2;
            background-color: var(--bg-card);
            border-radius: 10px;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        .section-title {
            font-size: 18px;
            margin-bottom: 15px;
            color: var(--text-primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .playlist-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        button:hover {
            background-color: var(--primary-dark);
        }

        button.secondary {
            background-color: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }

        button.secondary:hover {
            background-color: var(--bg-hover);
        }

        button.danger {
            background-color: var(--danger);
        }

        button.danger:hover {
            background-color: #d32f2f;
        }

        button.success {
            background-color: var(--success);
        }

        button.success:hover {
            background-color: #388e3c;
        }

        .playlist-list {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 15px;
            border: 1px solid var(--border);
            border-radius: 5px;
            padding: 10px;
        }

        .playlist-item {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 8px;
            background-color: var(--bg-dark);
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .playlist-item:hover {
            background-color: var(--bg-hover);
        }

        .playlist-item.active {
            background-color: var(--primary-dark);
        }

        .playlist-item .name {
            font-weight: 500;
        }

        .playlist-item .count {
            color: var(--text-muted);
            font-size: 12px;
        }

        .track-list {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 15px;
            border: 1px solid var(--border);
            border-radius: 5px;
            padding: 10px;
        }

        .track-item {
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 5px;
            background-color: var(--bg-dark);
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .track-item:hover {
            background-color: var(--bg-hover);
        }

        .track-item.playing {
            background-color: var(--primary-dark);
        }

        .track-item .track-info {
            flex: 1;
        }

        .track-item .title {
            font-weight: 500;
            margin-bottom: 3px;
        }

        .track-item .artist {
            color: var(--text-muted);
            font-size: 12px;
        }

        .track-item .duration {
            color: var(--text-muted);
            font-size: 12px;
            margin-right: 10px;
        }

        .track-actions {
            display: flex;
            gap: 5px;
        }

        .player-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
        }

        .player-controls button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
        }

        .play-pause {
            width: 50px;
            height: 50px;
            font-size: 20px;
        }

        .progress-container {
            margin-top: 20px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background-color: var(--border);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
        }

        .progress {
            height: 100%;
            background-color: var(--primary);
            border-radius: 3px;
            width: 0%;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            margin-top: 5px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .current-track {
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            background-color: var(--bg-dark);
            border-radius: 8px;
        }

        .track-title {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .track-artist {
            color: var(--text-muted);
            font-size: 14px;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
        }

        .volume-slider {
            flex: 1;
            -webkit-appearance: none;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
        }

        .player-mode-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }

        .file-drop-area {
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            margin-bottom: 15px;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        .file-drop-area:hover, .file-drop-area.dragover {
            border-color: var(--primary);
            background-color: var(--bg-hover);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: var(--bg-card);
            padding: 20px;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .form-group {
            margin-bottom: 15px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid var(--border);
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-size: 14px;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }

        .file-list {
            max-height: 200px;
            overflow-y: auto;
            margin-top: 10px;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            background: var(--bg-dark);
            margin-bottom: 5px;
            border-radius: 4px;
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 30px;
        }

        @media (max-width: 768px) {
            .main-content { flex-direction: column; }
            .track-item { flex-direction: column; align-items: flex-start; gap: 5px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Музыкальный Плеер</h1>
            <p class="subtitle">С несколькими файлами, сохранением и загрузкой плейлистов с музыкой</p>
        </header>
        
        <div class="main-content">
            <div class="playlist-section">
                <div class="section-title">
                    <span>Плейлисты</span>
                    <div>
                        <button id="savePlaylistsBtn" class="secondary">💾 Сохранить</button>
                        <button id="loadPlaylistsBtn" class="secondary">📂 Загрузить</button>
                    </div>
                </div>
                <div class="playlist-controls">
                    <button id="createPlaylistBtn">📝 Создать плейлист</button>
                    <button id="addTracksBtn" class="success">🎵 Добавить треки (несколько)</button>
                </div>
                <div class="playlist-list" id="playlistList"></div>
                <div class="section-title"><span>Треки в плейлисте</span></div>
                <div class="track-list" id="trackList"></div>
            </div>
            
            <div class="player-section">
                <div class="current-track">
                    <div class="track-title" id="currentTrackTitle">Не выбрано</div>
                    <div class="track-artist" id="currentTrackArtist">Выберите трек</div>
                </div>
                <div class="progress-container">
                    <div class="progress-bar" id="progressBar"><div class="progress" id="progress"></div></div>
                    <div class="time-info"><span id="currentTime">0:00</span><span id="duration">0:00</span></div>
                </div>
                <div class="player-controls">
                    <button id="prevBtn">⏮</button>
                    <button id="playPauseBtn" class="play-pause">▶</button>
                    <button id="nextBtn">⏭</button>
                </div>
                <div class="player-mode-controls">
                    <button id="shuffleBtn" class="secondary">🔀 Случайный порядок: Выкл</button>
                    <button id="repeatBtn" class="secondary">🔁 Повтор: Выкл</button>
                </div>
                <div class="volume-control">
                    <span>🔊</span>
                    <input type="range" min="0" max="1" step="0.01" value="0.7" class="volume-slider" id="volumeSlider">
                </div>
            </div>
        </div>
    </div>
    
    <!-- Модальные окна -->
    <div class="modal" id="createPlaylistModal">
        <div class="modal-content">
            <div class="form-group"><label>Название плейлиста</label><input type="text" id="playlistName" placeholder="Введите название"></div>
            <div class="modal-actions"><button id="cancelCreatePlaylist" class="secondary">Отмена</button><button id="confirmCreatePlaylist">Создать</button></div>
        </div>
    </div>
    
    <div class="modal" id="addTracksModal">
        <div class="modal-content">
            <h3>Добавить несколько аудиофайлов</h3>
            <div class="file-drop-area" id="fileDropArea">📁 Нажмите или перетащите файлы сюда (можно несколько)</div>
            <input type="file" id="modalFileInput" class="file-input" accept="audio/*" multiple style="display:none">
            <div id="selectedFilesList" class="file-list"></div>
            <div class="modal-actions"><button id="cancelAddTracks" class="secondary">Отмена</button><button id="confirmAddTracks" class="success">➕ Добавить все</button></div>
        </div>
    </div>
    
    <div class="modal" id="loadPlaylistsModal">
        <div class="modal-content">
            <h3>Загрузить плейлисты (JSON)</h3>
            <div class="form-group"><label>Файл .json</label><input type="file" id="playlistFile" accept=".json"></div>
            <div class="modal-actions"><button id="cancelLoadPlaylists" class="secondary">Отмена</button><button id="confirmLoadPlaylists">Загрузить</button></div>
        </div>
    </div>

    <script>
        // ==================== ИНИЦИАЛИЗАЦИЯ INDEXEDDB ДЛЯ ХРАНЕНИЯ ФАЙЛОВ ====================
        const DB_NAME = 'MusicPlayerDB';
        const DB_VERSION = 1;
        const STORE_NAME = 'audioFiles';
        let db = null;

        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve(db);
                };
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                    }
                };
            });
        }

        async function saveAudioFileToDB(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const arrayBuffer = e.target.result;
                    const id = `file_${Date.now()}_${file.name}`;
                    const transaction = db.transaction([STORE_NAME], 'readwrite');
                    const store = transaction.objectStore(STORE_NAME);
                    const record = { id, name: file.name, type: file.type, data: arrayBuffer };
                    const request = store.put(record);
                    request.onsuccess = () => resolve(id);
                    request.onerror = () => reject(request.error);
                };
                reader.onerror = reject;
                reader.readAsArrayBuffer(file);
            });
        }

        async function loadAudioFileFromDB(id) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.get(id);
                request.onsuccess = () => {
                    const record = request.result;
                    if (record && record.data) {
                        const blob = new Blob([record.data], { type: record.type });
                        const url = URL.createObjectURL(blob);
                        resolve(url);
                    } else reject('File not found');
                };
                request.onerror = reject;
            });
        }

        // ==================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ====================
        let playlists = [];        // { id, name, tracks: [{ id, title, artist, duration, fileId, fileName }] }
        let currentPlaylistId = null;
        let currentTrackId = null;
        let audio = new Audio();
        let isPlaying = false;
        let isShuffle = false;
        let isRepeat = false;
        let playedHistory = [];
        
        // DOM элементы
        const playlistListDiv = document.getElementById('playlistList');
        const trackListDiv = document.getElementById('trackList');
        const createPlaylistBtn = document.getElementById('createPlaylistBtn');
        const addTracksBtn = document.getElementById('addTracksBtn');
        const savePlaylistsBtn = document.getElementById('savePlaylistsBtn');
        const loadPlaylistsBtn = document.getElementById('loadPlaylistsBtn');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const shuffleBtn = document.getElementById('shuffleBtn');
        const repeatBtn = document.getElementById('repeatBtn');
        const progressBar = document.getElementById('progressBar');
        const progress = document.getElementById('progress');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const currentTrackTitle = document.getElementById('currentTrackTitle');
        const currentTrackArtist = document.getElementById('currentTrackArtist');
        const volumeSlider = document.getElementById('volumeSlider');
        
        // Модалки
        const createModal = document.getElementById('createPlaylistModal');
        const addModal = document.getElementById('addTracksModal');
        const loadModal = document.getElementById('loadPlaylistsModal');
        const playlistNameInput = document.getElementById('playlistName');
        const confirmCreate = document.getElementById('confirmCreatePlaylist');
        const cancelCreate = document.getElementById('cancelCreatePlaylist');
        const fileDropArea = document.getElementById('fileDropArea');
        const modalFileInput = document.getElementById('modalFileInput');
        const selectedFilesList = document.getElementById('selectedFilesList');
        const confirmAdd = document.getElementById('confirmAddTracks');
        const cancelAdd = document.getElementById('cancelAddTracks');
        const playlistFileInput = document.getElementById('playlistFile');
        const confirmLoad = document.getElementById('confirmLoadPlaylists');
        const cancelLoad = document.getElementById('cancelLoadPlaylists');
        
        let pendingFiles = []; // временные файлы для добавления
        
        // ==================== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ====================
        function formatTime(sec) {
            if (isNaN(sec)) return '0:00';
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }
        
        function savePlaylistsToLocalStorage() {
            // Сохраняем метаданные плейлистов (без blob-ссылок, только fileId)
            const dataToStore = playlists.map(pl => ({
                id: pl.id,
                name: pl.name,
                tracks: pl.tracks.map(t => ({
                    id: t.id,
                    title: t.title,
                    artist: t.artist,
                    duration: t.duration,
                    fileId: t.fileId,
                    fileName: t.fileName
                }))
            }));
            localStorage.setItem('musicPlayerFullData', JSON.stringify(dataToStore));
        }
        
        async function loadPlaylistsFromLocalStorage() {
            const saved = localStorage.getItem('musicPlayerFullData');
            if (!saved) return false;
            try {
                const parsed = JSON.parse(saved);
                playlists = parsed.map(pl => ({ ...pl, tracks: pl.tracks || [] }));
                // Восстанавливаем URL для каждого трека из IndexedDB
                for (let pl of playlists) {
                    for (let track of pl.tracks) {
                        if (track.fileId) {
                            try {
                                const url = await loadAudioFileFromDB(track.fileId);
                                track.url = url;
                            } catch(e) { console.warn('Не удалось загрузить файл', track.fileId); }
                        }
                    }
                }
                return true;
            } catch(e) { return false; }
        }
        
        async function savePlaylistsToFile() {
            if (playlists.length === 0) { alert('Нет плейлистов'); return; }
            // Для экспорта сохраняем метаданные (файлы уже в IndexedDB)
            const exportData = playlists.map(pl => ({
                id: pl.id,
                name: pl.name,
                tracks: pl.tracks.map(t => ({
                    id: t.id,
                    title: t.title,
                    artist: t.artist,
                    duration: t.duration,
                    fileId: t.fileId,
                    fileName: t.fileName
                }))
            }));
            const dataStr = JSON.stringify(exportData, null, 2);
            const blob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'playlists_backup.json';
            a.click();
            URL.revokeObjectURL(url);
            alert('Плейлисты сохранены (аудиофайлы уже в базе браузера)');
        }
        
        async function loadPlaylistsFromFile(file) {
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    playlists = imported.map(pl => ({ ...pl, tracks: pl.tracks || [] }));
                    // Восстанавливаем URL
                    for (let pl of playlists) {
                        for (let track of pl.tracks) {
                            if (track.fileId) {
                                try {
                                    const url = await loadAudioFileFromDB(track.fileId);
                                    track.url = url;
                                } catch(err) { console.warn('Файл не найден в БД', track.fileId); track.url = null; }
                            }
                        }
                    }
                    savePlaylistsToLocalStorage();
                    renderPlaylists();
                    if (playlists.length) selectPlaylist(playlists[0].id);
                    alert('Плейлисты загружены!');
                } catch(err) { alert('Ошибка JSON'); }
            };
            reader.readAsText(file);
        }
        
        // ==================== ОТРИСОВКА ====================
        function renderPlaylists() {
            playlistListDiv.innerHTML = '';
            if (!playlists.length) {
                playlistListDiv.innerHTML = '<div class="empty-state">Нет плейлистов, создайте!</div>';
                return;
            }
            playlists.forEach(pl => {
                const div = document.createElement('div');
                div.className = `playlist-item ${currentPlaylistId === pl.id ? 'active' : ''}`;
                div.innerHTML = `<div><div class="name">${escapeHtml(pl.name)}</div><div class="count">${pl.tracks.length} треков</div></div><button class="danger del-pl" data-id="${pl.id}">✕</button>`;
                div.addEventListener('click', (e) => { if(!e.target.classList.contains('del-pl')) selectPlaylist(pl.id); });
                div.querySelector('.del-pl').addEventListener('click', (e) => { e.stopPropagation(); deletePlaylist(pl.id); });
                playlistListDiv.appendChild(div);
            });
        }
        
        function renderTracks() {
            trackListDiv.innerHTML = '';
            if (!currentPlaylistId) { trackListDiv.innerHTML = '<div class="empty-state">Выберите плейлист</div>'; return; }
            const playlist = playlists.find(p => p.id === currentPlaylistId);
            if (!playlist || !playlist.tracks.length) { trackListDiv.innerHTML = '<div class="empty-state">Нет треков, добавьте музыку</div>'; return; }
            playlist.tracks.forEach((track, idx) => {
                const div = document.createElement('div');
                div.className = `track-item ${currentTrackId === track.id ? 'playing' : ''}`;
                div.innerHTML = `
                    <div class="track-info"><div class="title">${escapeHtml(track.title)}</div><div class="artist">${escapeHtml(track.artist)}</div></div>
                    <div class="track-actions"><span class="duration">${track.duration}</span><button class="danger del-track" data-id="${track.id}">✕</button></div>
                `;
                div.addEventListener('click', (e) => { if(!e.target.classList.contains('del-track')) playTrackById(track.id); });
                div.querySelector('.del-track').addEventListener('click', (e) => { e.stopPropagation(); deleteTrack(track.id); });
                trackListDiv.appendChild(div);
            });
        }
        
        function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
        
        // ==================== ЛОГИКА ПЛЕЙЛИСТОВ ====================
        function createPlaylist(name) {
            const id = 'pl_' + Date.now() + '_' + Math.random();
            playlists.push({ id, name, tracks: [] });
            savePlaylistsToLocalStorage();
            renderPlaylists();
            selectPlaylist(id);
        }
        
        function deletePlaylist(id) {
            if(!confirm('Удалить плейлист?')) return;
            const idx = playlists.findIndex(p => p.id === id);
            if(idx !== -1) playlists.splice(idx,1);
            if(currentPlaylistId === id) { currentPlaylistId = null; currentTrackId = null; audio.pause(); isPlaying=false; updatePlayPauseBtn(); updateCurrentTrackDisplay(); }
            savePlaylistsToLocalStorage();
            renderPlaylists();
            renderTracks();
        }
        
        function selectPlaylist(id) {
            currentPlaylistId = id;
            currentTrackId = null;
            playedHistory = [];
            audio.pause(); isPlaying=false; updatePlayPauseBtn();
            renderPlaylists();
            renderTracks();
            updateCurrentTrackDisplay();
        }
        
        // ==================== РАБОТА С ТРЕКАМИ (МНОЖЕСТВЕННОЕ ДОБАВЛЕНИЕ) ====================
        async function addMultipleTracksToCurrentPlaylist(files) {
            if(!currentPlaylistId) { alert('Сначала создайте/выберите плейлист'); return false; }
            const playlist = playlists.find(p => p.id === currentPlaylistId);
            if(!playlist) return false;
            let added = 0;
            for(const file of files) {
                if(!file.type.startsWith('audio/')) continue;
                const fileId = await saveAudioFileToDB(file);
                const url = await loadAudioFileFromDB(fileId);
                const trackId = 'tr_' + Date.now() + '_' + Math.random() + '_' + file.name;
                const title = file.name.replace(/\.[^/.]+$/, '');
                playlist.tracks.push({
                    id: trackId,
                    title: title,
                    artist: 'Неизвестный',
                    duration: '0:00',
                    fileId: fileId,
                    fileName: file.name,
                    url: url
                });
                added++;
            }
            if(added) {
                savePlaylistsToLocalStorage();
                renderTracks();
                alert(`Добавлено ${added} треков!`);
                return true;
            }
            return false;
        }
        
        function deleteTrack(trackId) {
            const playlist = playlists.find(p => p.id === currentPlaylistId);
            if(!playlist) return;
            const idx = playlist.tracks.findIndex(t => t.id === trackId);
            if(idx === -1) return;
            if(currentTrackId === trackId) { audio.pause(); isPlaying=false; updatePlayPauseBtn(); currentTrackId = null; updateCurrentTrackDisplay(); }
            playlist.tracks.splice(idx,1);
            if(currentTrackId === trackId) currentTrackId = null;
            savePlaylistsToLocalStorage();
            renderTracks();
        }
        
        async function playTrackById(trackId) {
            const playlist = playlists.find(p => p.id === currentPlaylistId);
            if(!playlist) return;
            const track = playlist.tracks.find(t => t.id === trackId);
            if(!track) return;
            if(!track.url && track.fileId) {
                try {
                    track.url = await loadAudioFileFromDB(track.fileId);
                } catch(e) { alert('Не удалось загрузить аудиофайл'); return; }
            }
            if(!track.url) { alert('Файл недоступен'); return; }
            audio.src = track.url;
            currentTrackId = track.id;
            if(isShuffle && !playedHistory.includes(trackId)) playedHistory.push(trackId);
            try {
                await audio.play();
                isPlaying = true;
                updatePlayPauseBtn();
                renderTracks();
                updateCurrentTrackDisplay();
            } catch(e) { console.error(e); alert('Ошибка воспроизведения'); }
        }
        
        function getCurrentTrackObject() {
            const pl = playlists.find(p => p.id === currentPlaylistId);
            if(!pl || !currentTrackId) return null;
            return pl.tracks.find(t => t.id === currentTrackId);
        }
        
        function getPlaylistTracks() {
            const pl = playlists.find(p => p.id === currentPlaylistId);
            return pl ? pl.tracks : [];
        }
        
        async function playNext() {
            const tracks = getPlaylistTracks();
            if(!tracks.length) return;
            if(isShuffle) {
                let available = tracks.filter(t => !playedHistory.includes(t.id));
                if(!available.length) { playedHistory = []; available = tracks; }
                if(available.length) {
                    const random = available[Math.floor(Math.random()*available.length)];
                    await playTrackById(random.id);
                }
            } else {
                let idx = tracks.findIndex(t => t.id === currentTrackId);
                let nextIdx = (idx + 1) % tracks.length;
                await playTrackById(tracks[nextIdx].id);
            }
        }
        
        async function playPrev() {
            const tracks = getPlaylistTracks();
            if(!tracks.length) return;
            if(isShuffle && playedHistory.length > 1) {
                const prevId = playedHistory[playedHistory.length-2];
                await playTrackById(prevId);
            } else {
                let idx = tracks.findIndex(t => t.id === currentTrackId);
                let prevIdx = (idx - 1 + tracks.length) % tracks.length;
                await playTrackById(tracks[prevIdx].id);
            }
        }
        
        function togglePlayPause() {
            if(!currentPlaylistId) { alert('Выберите плейлист'); return; }
            const tracks = getPlaylistTracks();
            if(!tracks.length) { alert('Нет треков'); return; }
            if(!currentTrackId) { playTrackById(tracks[0].id); return; }
            if(isPlaying) { audio.pause(); isPlaying=false; updatePlayPauseBtn(); }
            else { audio.play(); isPlaying=true; updatePlayPauseBtn(); }
        }
        
        function handleTrackEnd() {
            if(isRepeat) { audio.currentTime = 0; audio.play(); }
            else playNext();
        }
        
        function updateProgress() {
            if(audio.duration) {
                progress.style.width = (audio.currentTime/audio.duration)*100 + '%';
                currentTimeEl.textContent = formatTime(audio.currentTime);
            }
        }
        function setDurationMeta() {
            durationEl.textContent = formatTime(audio.duration);
            const track = getCurrentTrackObject();
            if(track && track.duration === '0:00') {
                track.duration = formatTime(audio.duration);
                savePlaylistsToLocalStorage();
                renderTracks();
            }
        }
        function seek(e) { if(audio.duration) { const rect = progressBar.getBoundingClientRect(); const x = e.clientX - rect.left; audio.currentTime = (x/rect.width)*audio.duration; } }
        function setVolume() { audio.volume = volumeSlider.value; }
        function updatePlayPauseBtn() { playPauseBtn.textContent = isPlaying ? '⏸' : '▶'; }
        function updateCurrentTrackDisplay() {
            const track = getCurrentTrackObject();
            if(track) { currentTrackTitle.textContent = track.title; currentTrackArtist.textContent = track.artist; }
            else { currentTrackTitle.textContent = 'Не выбрано'; currentTrackArtist.textContent = 'Выберите трек'; }
        }
        function toggleShuffle() { isShuffle = !isShuffle; if(isShuffle) playedHistory = currentTrackId ? [currentTrackId] : []; shuffleBtn.textContent = `🔀 Случайный порядок: ${isShuffle ? 'Вкл' : 'Выкл'}`; shuffleBtn.classList.toggle('active', isShuffle); }
        function toggleRepeat() { isRepeat = !isRepeat; repeatBtn.textContent = `🔁 Повтор: ${isRepeat ? 'Вкл' : 'Выкл'}`; repeatBtn.classList.toggle('active', isRepeat); }
        
        // ==================== UI МОДАЛЕЙ ====================
        function showAddTracksModal() {
            if(!currentPlaylistId) { alert('Сначала выберите плейлист'); return; }
            pendingFiles = [];
            selectedFilesList.innerHTML = '';
            addModal.style.display = 'flex';
        }
        function updateSelectedFilesList() {
            selectedFilesList.innerHTML = pendingFiles.map((f,i) => `<div class="file-item">${f.name} <button class="danger" data-idx="${i}">✕</button></div>`).join('');
            document.querySelectorAll('[data-idx]').forEach(btn => {
                btn.addEventListener('click', (e) => { const idx = parseInt(btn.dataset.idx); pendingFiles.splice(idx,1); updateSelectedFilesList(); });
            });
        }
        function handleFileSelectFromModal(files) {
            const audioFiles = Array.from(files).filter(f => f.type.startsWith('audio/'));
            pendingFiles.push(...audioFiles);
            updateSelectedFilesList();
        }
        async function confirmAddFiles() {
            if(pendingFiles.length === 0) { alert('Выберите файлы'); return; }
            await addMultipleTracksToCurrentPlaylist(pendingFiles);
            pendingFiles = [];
            addModal.style.display = 'none';
        }
        
        // ==================== ЗАГРУЗКА ПРИ СТАРТЕ ====================
        async function init() {
            await openDB();
            const loaded = await loadPlaylistsFromLocalStorage();
            if(!loaded || playlists.length===0) {
                // демо-плейлист
                const demoId = 'pl_demo';
                playlists = [{ id: demoId, name: 'Пример', tracks: [] }];
                savePlaylistsToLocalStorage();
            }
            renderPlaylists();
            if(playlists.length) selectPlaylist(playlists[0].id);
            
            // События
            createPlaylistBtn.onclick = () => { playlistNameInput.value=''; createModal.style.display='flex'; };
            confirmCreate.onclick = () => { const name = playlistNameInput.value.trim(); if(name) createPlaylist(name); createModal.style.display='none'; };
            cancelCreate.onclick = () => createModal.style.display='none';
            addTracksBtn.onclick = showAddTracksModal;
            cancelAdd.onclick = () => addModal.style.display='none';
            confirmAdd.onclick = confirmAddFiles;
            fileDropArea.onclick = () => modalFileInput.click();
            fileDropArea.addEventListener('dragover', e => { e.preventDefault(); fileDropArea.classList.add('dragover'); });
            fileDropArea.addEventListener('dragleave', () => fileDropArea.classList.remove('dragover'));
            fileDropArea.addEventListener('drop', e => { e.preventDefault(); fileDropArea.classList.remove('dragover'); const files = Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('audio/')); pendingFiles.push(...files); updateSelectedFilesList(); });
            modalFileInput.onchange = (e) => { handleFileSelectFromModal(e.target.files); modalFileInput.value=''; };
            savePlaylistsBtn.onclick = savePlaylistsToFile;
            loadPlaylistsBtn.onclick = () => loadModal.style.display='flex';
            confirmLoad.onclick = async () => { const file = playlistFileInput.files[0]; if(file) await loadPlaylistsFromFile(file); loadModal.style.display='none'; playlistFileInput.value=''; };
            cancelLoad.onclick = () => loadModal.style.display='none';
            playPauseBtn.onclick = togglePlayPause;
            prevBtn.onclick = playPrev;
            nextBtn.onclick = playNext;
            shuffleBtn.onclick = toggleShuffle;
            repeatBtn.onclick = toggleRepeat;
            progressBar.onclick = seek;
            volumeSlider.oninput = setVolume;
            audio.addEventListener('timeupdate', updateProgress);
            audio.addEventListener('loadedmetadata', setDurationMeta);
            audio.addEventListener('ended', handleTrackEnd);
            audio.volume = 0.7;
            volumeSlider.value = 0.7;
        }
        
        init();
    </script>
</body>
</html>
