

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3D Видео-Навигатор | Панорамное видео + карта мира</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a12;
            color: white;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: fixed;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* Модальное окно для просмотра видео */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.98);
            z-index: 1000;
            backdrop-filter: blur(8px);
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-video-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            cursor: pointer;
            background: #000;
            position: relative;
        }

        .modal video {
            width: 100%;
            height: auto;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .modal-nav {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            width: fit-content;
            margin: 0 auto;
            border: 1px solid rgba(255,255,255,0.2);
            z-index: 1001;
        }

        .modal-nav-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(30,30,40,0.9);
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            transition: all 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }

        .modal-nav-btn:active {
            transform: scale(0.92);
        }

        .modal-nav-btn.has-video {
            background: #1f6d3b;
            box-shadow: 0 0 12px rgba(46, 204, 113, 0.6);
        }

        .modal-close-hint {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 14px;
            cursor: pointer;
            z-index: 1002;
        }

        .modal-location-name {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            z-index: 1002;
            pointer-events: none;
        }

        .swipe-hint {
            position: absolute;
            bottom: 110px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 11px;
            background: rgba(0,0,0,0.4);
            padding: 4px 12px;
            width: fit-content;
            margin: 0 auto;
            border-radius: 40px;
            pointer-events: none;
            z-index: 1001;
        }

        /* Интерфейс поверх */
        .ui-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 10;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            padding: 20px 16px 30px;
            pointer-events: none;
        }

        .video-panel {
            background: rgba(20,20,30,0.9);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 16px;
            pointer-events: auto;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .video-title {
            font-size: 1.2rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 12px;
            color: #ffd966;
        }

        .video-preview {
            background: #1e1e2a;
            border-radius: 24px;
            min-height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }

        .video-preview video {
            width: 100%;
            max-height: 160px;
            object-fit: cover;
            border-radius: 20px;
            pointer-events: none;
        }

        .video-preview .play-overlay {
            position: absolute;
            width: 60px;
            height: 60px;
            background: rgba(0,0,0,0.7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: white;
            backdrop-filter: blur(4px);
            pointer-events: none;
        }

        .empty-video {
            color: #aaa;
            text-align: center;
            padding: 40px;
            background: #2a2a32;
            border-radius: 20px;
            width: 100%;
        }

        .click-hint {
            font-size: 0.7rem;
            color: #888;
            text-align: center;
            margin-top: 5px;
        }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 8px;
        }

        .nav-btn {
            background: rgba(30,30,40,0.9);
            border: none;
            padding: 14px 0;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            pointer-events: auto;
            transition: 0.1s;
        }

        .nav-btn.has-video {
            background: #1f6d3b;
            box-shadow: 0 0 6px rgba(46, 204, 113, 0.5);
        }

        .nav-btn:active {
            transform: scale(0.96);
        }

        .special-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 8px;
        }

        .action-btn {
            background: #2c3e66;
        }

        .danger-btn {
            background: #8b3c3c;
        }

        .reset-group {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .reset-world-btn, .full-reset-btn {
            flex: 1;
            padding: 12px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            color: white;
        }

        .reset-world-btn { background: #a5421b; }
        .full-reset-btn { background: #7a2e2e; }

        .save-load {
            display: flex;
            gap: 12px;
            margin-top: 12px;
            pointer-events: auto;
        }

        .file-btn {
            background: #1f3b4c;
            flex: 1;
            text-align: center;
            padding: 12px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            color: white;
        }

        .file-input-label {
            background: #2c5a2e;
            display: block;
        }

        input[type="file"] { display: none; }

        .status {
            font-size: 0.7rem;
            text-align: center;
            color: #ccc;
            margin-top: 12px;
            pointer-events: auto;
        }

        @media (max-width: 600px) {
            .nav-btn { padding: 12px 0; font-size: 0.9rem; }
            .modal-nav-btn { width: 50px; height: 50px; font-size: 24px; }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="video-modal" class="modal">
        <div class="modal-location-name" id="modal-location-name">📍 Локация</div>
        <div class="modal-close-hint" id="modal-close-btn">✖ Закрыть</div>
        <div class="modal-video-container" id="modal-video-container">
            <video id="modal-video" controls loop playsinline></video>
        </div>
        <div class="modal-nav">
            <button class="modal-nav-btn" id="modal-nav-left">◀</button>
            <button class="modal-nav-btn" id="modal-nav-forward">▲</button>
            <button class="modal-nav-btn" id="modal-nav-right">▶</button>
            <button class="modal-nav-btn" id="modal-nav-back">▼</button>
        </div>
        <div class="swipe-hint">↔ Свайп влево/вправо = перемещение | ↕ Свайп вверх/вниз = вперёд/назад</div>
    </div>
    
    <div class="ui-overlay">
        <div class="video-panel">
            <div class="video-title" id="location-name">📍 Центральная площадь</div>
            <div class="video-preview" id="video-preview-area">
                <div class="empty-video">🎬 Нет видео<br>Нажмите "Добавить видео"</div>
            </div>
            <div class="click-hint">✨ Нажмите на видео, чтобы открыть плеер</div>
            <div class="nav-grid">
                <button class="nav-btn" id="btn-left">◀ ВЛЕВО</button>
                <button class="nav-btn" id="btn-forward">⬆ ВПЕРЁД</button>
                <button class="nav-btn" id="btn-right">ВПРАВО ▶</button>
                <button class="nav-btn" id="btn-back">⬇ НАЗАД</button>
                <button class="nav-btn" id="btn-rotate-left">🔄 ВЛЕВО</button>
                <button class="nav-btn" id="btn-rotate-right">🔄 ВПРАВО</button>
            </div>
            <div class="special-row">
                <button class="nav-btn action-btn" id="add-video-btn">🎬 ДОБАВИТЬ ВИДЕО</button>
                <button class="nav-btn action-btn danger-btn" id="reset-location-btn">🗑️ ОЧИСТИТЬ</button>
            </div>
            <div class="reset-group">
                <button class="reset-world-btn" id="new-world-btn">🌍 НОВЫЙ МИР</button>
                <button class="full-reset-btn" id="full-clear-btn">🗑️ СБРОС ВСЕГО</button>
            </div>
            <div class="save-load">
                <button class="file-btn" id="save-world-btn">💾 СОХРАНИТЬ JSON</button>
                <label class="file-btn file-input-label">
                    📂 ЗАГРУЗИТЬ JSON
                    <input type="file" id="load-file-input" accept=".json">
                </label>
            </div>
            <div class="status" id="status-msg">🎬 3D Видео-навигатор | Добавьте видео с телефона</div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // Хранилище видео (ключ -> blob URL)
        let videoStorage = new Map();
        
        // Данные мира
        let worldData = {
            locations: {
                "start": {
                    id: "start",
                    name: "Центральная площадь",
                    videoKey: null,
                    links: {
                        left: null, right: null, forward: null, back: null,
                        turnLeft: null, turnRight: null
                    }
                }
            },
            currentLocationId: "start"
        };
        
        let currentVideoTexture = null;
        let currentVideoElement = null;
        
        function generateId() {
            return Date.now() + '-' + Math.random().toString(36).substr(2, 6);
        }
        
        function createEmptyLocation(baseName, directionHint = "") {
            const newId = generateId();
            const name = directionHint ? `${baseName} (${directionHint})` : `${baseName} ${Object.keys(worldData.locations).length}`;
            return {
                id: newId,
                name: name,
                videoKey: null,
                links: {
                    left: null, right: null, forward: null, back: null,
                    turnLeft: null, turnRight: null
                }
            };
        }
        
        function locationHasVideo(locId) {
            const loc = worldData.locations[locId];
            return loc && loc.videoKey !== null && videoStorage.has(loc.videoKey);
        }
        
        function getVideoUrl(key) {
            return videoStorage.get(key) || null;
        }
        
        // Обновление цвета кнопок
        function updateButtonsState() {
            const current = worldData.locations[worldData.currentLocationId];
            if (!current) return;
            
            const dirs = ['left', 'right', 'forward', 'back', 'turnLeft', 'turnRight'];
            const btnIds = {
                left: 'btn-left', right: 'btn-right', forward: 'btn-forward', 
                back: 'btn-back', turnLeft: 'btn-rotate-left', turnRight: 'btn-rotate-right'
            };
            
            dirs.forEach(dir => {
                const targetId = current.links[dir];
                const btn = document.getElementById(btnIds[dir]);
                if (btn) {
                    if (targetId && locationHasVideo(targetId)) {
                        btn.classList.add('has-video');
                    } else {
                        btn.classList.remove('has-video');
                    }
                }
            });
            
            // Модальные кнопки
            const modalBtns = {
                left: document.getElementById('modal-nav-left'),
                right: document.getElementById('modal-nav-right'),
                forward: document.getElementById('modal-nav-forward'),
                back: document.getElementById('modal-nav-back')
            };
            for (const [dir, btn] of Object.entries(modalBtns)) {
                if (btn) {
                    const targetId = current.links[dir];
                    if (targetId && locationHasVideo(targetId)) {
                        btn.classList.add('has-video');
                    } else {
                        btn.classList.remove('has-video');
                    }
                }
            }
        }
        
        // Навигация
        function navigate(direction) {
            const current = worldData.locations[worldData.currentLocationId];
            if (!current) return;
            
            let targetId = current.links[direction];
            
            if (targetId && worldData.locations[targetId]) {
                worldData.currentLocationId = targetId;
                updateUI();
                updatePanoramaVideo();
                showStatus(`Переход: ${worldData.locations[targetId].name}`);
                updateButtonsState();
                autoSave();
                return;
            }
            
            // Создаем новую локацию
            const dirNames = { left: "слева", right: "справа", forward: "спереди", back: "сзади", turnLeft: "поворот влево", turnRight: "поворот вправо" };
            const newLoc = createEmptyLocation(current.name, dirNames[direction] || direction);
            worldData.locations[newLoc.id] = newLoc;
            current.links[direction] = newLoc.id;
            
            const opposite = { left: "right", right: "left", forward: "back", back: "forward", turnLeft: "turnRight", turnRight: "turnLeft" };
            if (opposite[direction]) {
                newLoc.links[opposite[direction]] = current.id;
            }
            
            worldData.currentLocationId = newLoc.id;
            updateUI();
            updatePanoramaVideo();
            showStatus(`✨ Создана новая локация: ${newLoc.name}`);
            updateButtonsState();
            autoSave();
        }
        
        // Добавление видео
        function addVideoToCurrent() {
            const current = worldData.locations[worldData.currentLocationId];
            if (!current) return;
            
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'video/mp4,video/quicktime,video/webm,video/mov';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const blobUrl = URL.createObjectURL(file);
                const videoKey = `video_${Date.now()}_${file.name}`;
                videoStorage.set(videoKey, blobUrl);
                current.videoKey = videoKey;
                
                updateUI();
                updatePanoramaVideo();
                showStatus(`✅ Видео "${file.name}" добавлено в "${current.name}"`);
                updateButtonsState();
                autoSave();
            };
            input.click();
        }
        
        function clearVideoCurrent() {
            const current = worldData.locations[worldData.currentLocationId];
            if (current && current.videoKey) {
                current.videoKey = null;
                updateUI();
                updatePanoramaVideo();
                const modal = document.getElementById('video-modal');
                if (modal.classList.contains('active')) closeModal();
                showStatus(`🗑️ Видео удалено из "${current.name}"`);
                updateButtonsState();
                autoSave();
            }
        }
        
        // Панорамное видео на сфере
        let scene, camera, renderer, sphereMesh;
        
        function initThree() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050510);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 0.1);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);
            
            const geometry = new THREE.SphereGeometry(500, 64, 64);
            const material = new THREE.MeshBasicMaterial({ color: 0x111122, side: THREE.BackSide });
            sphereMesh = new THREE.Mesh(geometry, material);
            scene.add(sphereMesh);
            
            // Звезды
            const starsGeometry = new THREE.BufferGeometry();
            const starsPositions = [];
            for (let i = 0; i < 2000; i++) {
                starsPositions.push((Math.random() - 0.5) * 2000);
                starsPositions.push((Math.random() - 0.5) * 2000);
                starsPositions.push((Math.random() - 0.5) * 500);
            }
            starsGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starsPositions), 3));
            const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.7 });
            scene.add(new THREE.Points(starsGeometry, starsMaterial));
            
            function animate() {
                requestAnimationFrame(animate);
                renderer.render(scene, camera);
            }
            animate();
            
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }
        
        function updatePanoramaVideo() {
            const current = worldData.locations[worldData.currentLocationId];
            const videoKey = current?.videoKey;
            
            // Останавливаем старый видеоэлемент
            if (currentVideoElement) {
                currentVideoElement.pause();
                currentVideoElement = null;
            }
            
            if (!videoKey || !videoStorage.has(videoKey)) {
                if (sphereMesh.material.map) {
                    sphereMesh.material.map.dispose();
                    sphereMesh.material.map = null;
                }
                sphereMesh.material.color.setHex(0x1a1a2e);
                return;
            }
            
            const videoUrl = videoStorage.get(videoKey);
            const video = document.createElement('video');
            video.src = videoUrl;
            video.loop = true;
            video.muted = true;
            video.playsInline = true;
            video.crossOrigin = "Anonymous";
            
            video.addEventListener('canplay', () => {
                video.play().catch(e => console.log('Автовоспроизведение заблокировано, но текстура обновится при первом клике'));
            });
            
            currentVideoElement = video;
            
            if (currentVideoTexture) {
                currentVideoTexture.dispose();
            }
            
            currentVideoTexture = new THREE.VideoTexture(video);
            currentVideoTexture.wrapS = THREE.RepeatWrapping;
            currentVideoTexture.wrapT = THREE.ClampToEdgeWrapping;
            currentVideoTexture.minFilter = THREE.LinearFilter;
            
            sphereMesh.material.map = currentVideoTexture;
            sphereMesh.material.color.setHex(0xffffff);
            sphereMesh.material.needsUpdate = true;
        }
        
        // UI обновление
        function updateUI() {
            const current = worldData.locations[worldData.currentLocationId];
            if (!current) return;
            
            document.getElementById('location-name').innerHTML = `📍 ${current.name}`;
            
            const previewArea = document.getElementById('video-preview-area');
            const videoUrl = current.videoKey ? videoStorage.get(current.videoKey) : null;
            
            if (videoUrl) {
                previewArea.innerHTML = `
                    <video src="${videoUrl}" muted loop playsinline style="width:100%; max-height:160px; object-fit:cover; border-radius:20px;"></video>
                    <div class="play-overlay">▶</div>
                `;
                const previewVideo = previewArea.querySelector('video');
                const overlay = previewArea.querySelector('.play-overlay');
                if (previewVideo) {
                    previewVideo.addEventListener('click', (e) => {
                        e.stopPropagation();
                        openVideoModal();
                    });
                    previewVideo.addEventListener('loadeddata', () => {
                        previewVideo.play().catch(() => {});
                    });
                }
                if (overlay) {
                    overlay.addEventListener('click', (e) => {
                        e.stopPropagation();
                        openVideoModal();
                    });
                }
                previewArea.style.cursor = 'pointer';
            } else {
                previewArea.innerHTML = `<div class="empty-video">🎬 Нет видео<br>Нажмите "Добавить видео"</div>`;
                previewArea.style.cursor = 'default';
            }
        }
        
        // Модальное окно
        function openVideoModal() {
            const current = worldData.locations[worldData.currentLocationId];
            if (!current || !current.videoKey || !videoStorage.has(current.videoKey)) {
                showStatus("❌ Нет видео для просмотра");
                return;
            }
            
            const modal = document.getElementById('video-modal');
            const modalVideo = document.getElementById('modal-video');
            const videoUrl = videoStorage.get(current.videoKey);
            
            modalVideo.src = videoUrl;
            modalVideo.load();
            
            modalVideo.addEventListener('canplay', () => {
                modalVideo.play().catch(e => console.log('play blocked'));
            }, { once: true });
            
            document.getElementById('modal-location-name').textContent = `📍 ${current.name}`;
            modal.classList.add('active');
            updateButtonsState();
            initSwipeControls();
        }
        
        function closeModal() {
            const modal = document.getElementById('video-modal');
            if (modal.classList.contains('active')) {
                const modalVideo = document.getElementById('modal-video');
                modalVideo.pause();
                modal.classList.remove('active');
                removeSwipeControls();
            }
        }
        
        // Свайп управление
        let touchStartX = 0, touchStartY = 0, swipeActive = false;
        
        function handleTouchStart(e) {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }
        
        function handleTouchEnd(e) {
            const deltaX = e.changedTouches[0].clientX - touchStartX;
            const deltaY = e.changedTouches[0].clientY - touchStartY;
            const minDist = 50;
            
            if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > minDist) {
                navigate(deltaX > 0 ? 'left' : 'right');
            } else if (Math.abs(deltaY) > Math.abs(deltaX) && Math.abs(deltaY) > minDist) {
                navigate(deltaY > 0 ? 'forward' : 'back');
            }
            
            setTimeout(() => {
                const current = worldData.locations[worldData.currentLocationId];
                if (!current || !current.videoKey || !videoStorage.has(current.videoKey)) {
                    closeModal();
                } else {
                    const modalVideo = document.getElementById('modal-video');
                    const newUrl = videoStorage.get(current.videoKey);
                    if (modalVideo.src !== newUrl) {
                        modalVideo.src = newUrl;
                        modalVideo.load();
                        modalVideo.play().catch(() => {});
                    }
                    document.getElementById('modal-location-name').textContent = `📍 ${current.name}`;
                }
                updateButtonsState();
            }, 50);
        }
        
        function initSwipeControls() {
            if (swipeActive) return;
            const container = document.getElementById('modal-video-container');
            container.addEventListener('touchstart', handleTouchStart);
            container.addEventListener('touchend', handleTouchEnd);
            swipeActive = true;
        }
        
        function removeSwipeControls() {
            if (!swipeActive) return;
            const container = document.getElementById('modal-video-container');
            container.removeEventListener('touchstart', handleTouchStart);
            container.removeEventListener('touchend', handleTouchEnd);
            swipeActive = false;
        }
        
        // Сохранение/загрузка (только карта, без видео)
        function exportWorld() {
            const exportData = {
                version: "2.0",
                locations: worldData.locations,
                currentLocationId: worldData.currentLocationId
            };
            const jsonStr = JSON.stringify(exportData, null, 2);
            const blob = new Blob([jsonStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `videoworld_${new Date().toISOString().slice(0,19)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showStatus("✅ Карта мира сохранена (видео не встроены)");
        }
        
        function importWorld(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.locations && data.currentLocationId) {
                        worldData.locations = data.locations;
                        worldData.currentLocationId = data.currentLocationId;
                        if (!worldData.locations[worldData.currentLocationId]) {
                            worldData.currentLocationId = Object.keys(worldData.locations)[0];
                        }
                        updateUI();
                        updatePanoramaVideo();
                        updateButtonsState();
                        showStatus(`📀 Загружена карта. Локаций: ${Object.keys(worldData.locations).length}`);
                        autoSave();
                    } else {
                        throw new Error("Неверный формат");
                    }
                } catch (err) {
                    showStatus("❌ Ошибка: " + err.message);
                }
            };
            reader.readAsText(file);
        }
        
        function resetWorld() {
            const freshWorld = {
                locations: {
                    "start": {
                        id: "start",
                        name: "Центральная площадь",
                        videoKey: null,
                        links: { left: null, right: null, forward: null, back: null, turnLeft: null, turnRight: null }
                    }
                },
                currentLocationId: "start"
            };
            worldData = freshWorld;
            updateUI();
            updatePanoramaVideo();
            updateButtonsState();
            closeModal();
            autoSave();
            showStatus("🌍 Новый мир создан");
        }
        
        function fullReset() {
            localStorage.removeItem('video3d_world');
            for (const url of videoStorage.values()) {
                URL.revokeObjectURL(url);
            }
            videoStorage.clear();
            resetWorld();
            showStatus("💥 Полный сброс! Все видео удалены из памяти.");
        }
        
        function autoSave() {
            try {
                localStorage.setItem('video3d_world', JSON.stringify({
                    locations: worldData.locations,
                    currentLocationId: worldData.currentLocationId
                }));
            } catch(e) {}
        }
        
        function loadFromStorage() {
            const raw = localStorage.getItem('video3d_world');
            if (raw) {
                try {
                    const data = JSON.parse(raw);
                    if (data.locations && data.currentLocationId) {
                        worldData.locations = data.locations;
                        worldData.currentLocationId = data.currentLocationId;
                        if (!worldData.locations[worldData.currentLocationId]) {
                            worldData.currentLocationId = Object.keys(worldData.locations)[0];
                        }
                        updateUI();
                        updatePanoramaVideo();
                        updateButtonsState();
                        showStatus("💾 Загружена сохраненная карта");
                    }
                } catch(e) {}
            }
        }
        
        function showStatus(msg) {
            const el = document.getElementById('status-msg');
            el.textContent = msg;
            setTimeout(() => {
                if (document.getElementById('status-msg')?.textContent === msg) {
                    el.textContent = "🎬 3D Видео-навигатор | Добавьте видео с телефона";
                }
            }, 3000);
        }
        
        // Инициализация
        function init() {
            initThree();
            
            // Кнопки
            document.getElementById('btn-left').onclick = () => navigate('left');
            document.getElementById('btn-right').onclick = () => navigate('right');
            document.getElementById('btn-forward').onclick = () => navigate('forward');
            document.getElementById('btn-back').onclick = () => navigate('back');
            document.getElementById('btn-rotate-left').onclick = () => navigate('turnLeft');
            document.getElementById('btn-rotate-right').onclick = () => navigate('turnRight');
            document.getElementById('add-video-btn').onclick = () => addVideoToCurrent();
            document.getElementById('reset-location-btn').onclick = () => clearVideoCurrent();
            document.getElementById('save-world-btn').onclick = () => exportWorld();
            document.getElementById('load-file-input').onchange = (e) => {
                if (e.target.files.length) importWorld(e.target.files[0]);
                e.target.value = '';
            };
            document.getElementById('new-world-btn').onclick = () => resetWorld();
            document.getElementById('full-clear-btn').onclick = () => fullReset();
            
            // Модальные кнопки
            document.getElementById('modal-nav-left').onclick = () => { navigate('left'); if(!locationHasVideo(worldData.currentLocationId)) closeModal(); };
            document.getElementById('modal-nav-right').onclick = () => { navigate('right'); if(!locationHasVideo(worldData.currentLocationId)) closeModal(); };
            document.getElementById('modal-nav-forward').onclick = () => { navigate('forward'); if(!locationHasVideo(worldData.currentLocationId)) closeModal(); };
            document.getElementById('modal-nav-back').onclick = () => { navigate('back'); if(!locationHasVideo(worldData.currentLocationId)) closeModal(); };
            document.getElementById('modal-video-container').addEventListener('click', () => closeModal());
            document.getElementById('modal-close-btn').addEventListener('click', (e) => { e.stopPropagation(); closeModal(); });
            
            loadFromStorage();
            updateUI();
            updatePanoramaVideo();
            updateButtonsState();
            
            showStatus("🎬 Готово! Добавьте видео — оно будет отображаться как панорама");
        }
        
        init();
    </script>
</body>
</html>
