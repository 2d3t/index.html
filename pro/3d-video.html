
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3D Видео-Навигатор | Локальные видео + Карта мира</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #0a0a12;
            color: white;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: fixed;
        }

        /* 3D канвас */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* Модальное окно для просмотра видео в полном размере */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.97);
            z-index: 1000;
            backdrop-filter: blur(8px);
            animation: fadeIn 0.2s ease;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-video-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: calc(100% - 120px);
            cursor: pointer;
            background: #000;
        }

        .modal video {
            max-width: 95vw;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            animation: zoomIn 0.2s ease;
            pointer-events: auto;
        }

        /* Навигационная панель в полноэкранном режиме */
        .modal-nav {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            margin: 0 auto;
            width: fit-content;
            border: 1px solid rgba(255,255,255,0.2);
            z-index: 1001;
        }

        .modal-nav-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(30,30,40,0.9);
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            transition: all 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            touch-action: manipulation;
        }

        .modal-nav-btn:active {
            transform: scale(0.92);
        }

        .modal-nav-btn.has-video {
            background: #1f6d3b;
            box-shadow: 0 0 12px rgba(46, 204, 113, 0.6);
            border: 1px solid rgba(72, 239, 128, 0.8);
        }

        .modal-close-hint {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 14px;
            color: white;
            backdrop-filter: blur(4px);
            cursor: pointer;
            z-index: 1002;
        }

        .modal-location-name {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            backdrop-filter: blur(4px);
            z-index: 1002;
            pointer-events: none;
        }

        .swipe-hint {
            position: absolute;
            bottom: 110px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 11px;
            background: rgba(0,0,0,0.4);
            padding: 4px 12px;
            width: fit-content;
            margin: 0 auto;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            pointer-events: none;
            z-index: 1001;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes zoomIn {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* Интерфейс поверх */
        .ui-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 10;
            background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
            padding: 20px 16px 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            pointer-events: none;
        }

        .video-panel {
            background: rgba(20,20,30,0.85);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 16px;
            pointer-events: auto;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .video-title {
            font-size: 1.2rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 12px;
            color: #ffd966;
            word-break: break-word;
        }

        .video-preview {
            background: #1e1e2a;
            border-radius: 24px;
            min-height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .video-preview:active {
            transform: scale(0.99);
        }

        .video-preview video {
            max-width: 100%;
            max-height: 180px;
            object-fit: contain;
            border-radius: 20px;
            pointer-events: none;
        }

        .empty-video {
            color: #aaa;
            font-size: 0.9rem;
            text-align: center;
            padding: 30px;
            background: #2a2a32;
            border-radius: 20px;
            width: 100%;
        }
        
        .click-hint {
            font-size: 0.7rem;
            color: #888;
            text-align: center;
            margin-top: 5px;
            display: block;
        }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 8px;
        }

        .nav-btn {
            background: rgba(30,30,40,0.9);
            border: none;
            backdrop-filter: blur(4px);
            padding: 14px 0;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.1s ease;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            cursor: pointer;
            pointer-events: auto;
            font-family: monospace;
            letter-spacing: 1px;
        }
        
        .nav-btn.has-video {
            background: #1f6d3b;
            box-shadow: 0 0 6px rgba(46, 204, 113, 0.5);
            border: 1px solid rgba(72, 239, 128, 0.6);
        }
        
        .nav-btn:active {
            transform: scale(0.96);
        }

        .special-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 8px;
        }

        .action-btn {
            background: #2c3e66;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
        }

        .danger-btn {
            background: #8b3c3c;
        }

        .reset-group {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .reset-world-btn {
            background: #a5421b;
            flex: 1;
            text-align: center;
            padding: 12px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            border: none;
            color: white;
        }

        .full-reset-btn {
            background: #7a2e2e;
            flex: 1;
            text-align: center;
            padding: 12px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            border: none;
            color: white;
        }

        .save-load {
            display: flex;
            gap: 12px;
            justify-content: space-between;
            pointer-events: auto;
        }

        .file-btn {
            background: #1f3b4c;
            flex: 1;
            text-align: center;
            padding: 12px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            border: none;
            color: white;
        }

        .file-input-label {
            background: #2c5a2e;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        input[type="file"] {
            display: none;
        }

        .status {
            font-size: 0.7rem;
            text-align: center;
            color: #ccc;
            margin-top: 8px;
            pointer-events: auto;
        }

        @media (max-width: 600px) {
            .nav-btn { padding: 12px 0; font-size: 0.9rem; }
            .video-preview { min-height: 150px; }
            .modal-nav-btn {
                width: 50px;
                height: 50px;
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <!-- Модальное окно для увеличенного видео с навигацией -->
    <div id="video-modal" class="modal">
        <div class="modal-location-name" id="modal-location-name">📍 Локация</div>
        <div class="modal-close-hint" id="modal-close-btn">✖ Закрыть</div>
        <div class="modal-video-container" id="modal-video-container">
            <video id="modal-video" controls loop muted playsinline></video>
        </div>
        <div class="modal-nav">
            <button class="modal-nav-btn" id="modal-nav-left" title="Влево">◀</button>
            <button class="modal-nav-btn" id="modal-nav-forward" title="Вперёд">▲</button>
            <button class="modal-nav-btn" id="modal-nav-right" title="Вправо">▶</button>
            <button class="modal-nav-btn" id="modal-nav-back" title="Назад">▼</button>
        </div>
        <div class="swipe-hint">↔ Свайп влево/вправо = перемещение | ↕ Свайп вверх/вниз = вперёд/назад</div>
    </div>
    
    <div class="ui-overlay">
        <div class="video-panel">
            <div class="video-title" id="location-name">📍 Текущая локация: Центр</div>
            <div class="video-preview" id="video-preview-area">
                <div class="empty-video">🎬 Нет видео<br>Нажмите "Добавить видео"</div>
            </div>
            <div class="click-hint">✨ Нажмите на видео, чтобы открыть плеер</div>
            <div class="nav-grid">
                <button class="nav-btn" id="btn-left">◀ ВЛЕВО</button>
                <button class="nav-btn" id="btn-forward">⬆ ВПЕРЁД</button>
                <button class="nav-btn" id="btn-right">ВПРАВО ▶</button>
                <button class="nav-btn" id="btn-back">⬇ НАЗАД</button>
                <button class="nav-btn" id="btn-rotate-left">🔄 ПОВОРОТ ВЛЕВО</button>
                <button class="nav-btn" id="btn-rotate-right">🔄 ПОВОРОТ ВПРАВО</button>
            </div>
            <div class="special-row">
                <button class="nav-btn action-btn" id="add-video-btn">🎬 ДОБАВИТЬ ВИДЕО</button>
                <button class="nav-btn action-btn danger-btn" id="reset-location-btn">🗑️ ОЧИСТИТЬ ВИДЕО</button>
            </div>
            <div class="reset-group">
                <button class="reset-world-btn" id="new-world-btn">🌍 НОВЫЙ МИР (сброс данных)</button>
                <button class="full-reset-btn" id="full-clear-btn">🗑️ СБРОСИТЬ ВСЁ + КЭШ</button>
            </div>
        </div>

        <div class="save-load">
            <button class="file-btn" id="save-world-btn">💾 СОХРАНИТЬ МИР (JSON)</button>
            <label class="file-btn file-input-label" id="load-label">
                📂 ЗАГРУЗИТЬ JSON
                <input type="file" id="load-file-input" accept=".json">
            </label>
        </div>
        <div class="status" id="status-msg">🎬 3D Видео-навигатор | Видео хранятся локально, JSON только карта</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // Структура данных: в JSON хранится только videoPath (строка, путь/имя файла или blob URL?)
        // Поскольку реальный доступ к файловой системе ограничен, мы будем использовать сохраненные blob:// URL или dataURL?
        // По заданию: "видео хранить просто в телефоне и ориентироваться на их местоположение".
        // Используем localStorage для blob URL? Но blob URL живут только в рамках сессии. 
        // Альтернатива: при добавлении видео мы сохраняем его как blob URL и запоминаем path = уникальный ID, а само видео храним в памяти (Map).
        // При сохранении мира в JSON мы сохраняем только id видео, а сами blob'ы сохраняем в отдельном хранилище (localStorage не подходит из-за размера).
        // Реализуем систему: каждое видео при добавлении получает уникальный ключ, файл читается как DataURL (base64) и хранится в отдельном объекте videoStorage.
        // При экспорте JSON мы сохраняем только ссылки на ключи, а base64 строки НЕ включаем в JSON. При загрузке мира нужно восстанавливать videoStorage из ранее сохраненного.
        // Но чтобы видео действительно "хранились в телефоне" между сессиями, нужно сохранять их в IndexedDB или localStorage (ограничение 5-10МБ).
        // Для демонстрации концепции и простоты: видео храним в виде blob URL, и при сохранении мира JSON сохраняем base64-представление видео? Это нарушит задание (не сохранять в GS).
        // Переделаем: видео НЕ сохраняются в JSON, а остаются в браузере через ссылки на файлы. При загрузке мира JSON, видео нужно заново привязать из файловой системы.
        // Но чтобы пользователь мог восстановить привязки, используем локальный storage для videoBlobs. При экспорте JSON экспортируем только карту, а видео остаются в IndexedDB.
        // Упростим: videoPath будет хранить имя файла (оригинальное имя), а при добавлении видео мы кэшируем blob в Map и показываем. При загрузке мира, если видео нет в кэше, предложим выбрать заново.
        // Сделаем гибрид: при сохранении мира JSON не содержит видео, только имена файлов (videoPath). При загрузке мира видео отсутствуют — пользователь должен будет добавить их вручную, либо мы показываем заглушку.
        // Это соответствует ТЗ: видео хранятся отдельно в телефоне, JSON только карта связей и информация о местоположении карточек.
        
        // Хранилище blob URL для видео (ключ: videoPath)
        let videoBlobMap = new Map(); // key -> blobUrl
        
        let worldData = {
            locations: {
                "start": {
                    id: "start",
                    name: "Центральная площадь",
                    videoPath: null,   // имя файла или null
                    links: {
                        left: null, right: null, forward: null, back: null,
                        turnLeft: null, turnRight: null
                    }
                }
            },
            currentLocationId: "start"
        };
        
        function generateId() {
            return Date.now() + '-' + Math.random().toString(36).substr(2, 8);
        }
        
        function createEmptyLocation(baseName, directionHint = "") {
            const newId = generateId();
            const name = directionHint ? `${baseName} (${directionHint})` : `${baseName} ${Object.keys(worldData.locations).length}`;
            return {
                id: newId,
                name: name,
                videoPath: null,
                links: {
                    left: null, right: null, forward: null, back: null,
                    turnLeft: null, turnRight: null
                }
            };
        }
        
        function locationHasVideo(locId) {
            const loc = worldData.locations[locId];
            return loc && loc.videoPath !== null && loc.videoPath !== "";
        }
        
        // Получить URL для воспроизведения видео (из blob-кэша или создать если есть путь)
        function getVideoUrl(locId) {
            const loc = worldData.locations[locId];
            if (!loc || !loc.videoPath) return null;
            if (videoBlobMap.has(loc.videoPath)) {
                return videoBlobMap.get(loc.videoPath);
            }
            // Если нет в кэше, значит видео не загружено в текущей сессии — возвращаем null
            return null;
        }
        
        // Обновление цветов кнопок
        function updateButtonsColorByVideo() {
            const current = worldData.locations[worldData.currentLocationId];
            if (!current) return;
            const directions = ['left', 'right', 'forward', 'back', 'turnLeft', 'turnRight'];
            directions.forEach(dir => {
                const targetId = current.links[dir];
                const btnId = {
                    left: 'btn-left', right: 'btn-right', forward: 'btn-forward', back: 'btn-back',
                    turnLeft: 'btn-rotate-left', turnRight: 'btn-rotate-right'
                }[dir];
                const button = document.getElementById(btnId);
                if (button) {
                    if (targetId && locationHasVideo(targetId)) {
                        button.classList.add('has-video');
                    } else {
                        button.classList.remove('has-video');
                    }
                }
            });
        }
        
        function updateModalNavButtons() {
            const current = worldData.locations[worldData.currentLocationId];
            if (!current) return;
            const navButtons = {
                left: document.getElementById('modal-nav-left'),
                right: document.getElementById('modal-nav-right'),
                forward: document.getElementById('modal-nav-forward'),
                back: document.getElementById('modal-nav-back')
            };
            const checks = {
                left: current.links.left, right: current.links.right,
                forward: current.links.forward, back: current.links.back
            };
            for (const [dir, btn] of Object.entries(navButtons)) {
                if (btn) {
                    const targetId = checks[dir];
                    if (targetId && locationHasVideo(targetId)) {
                        btn.classList.add('has-video');
                    } else {
                        btn.classList.remove('has-video');
                    }
                }
            }
        }
        
        function performNavigation(direction) {
            const currentLoc = worldData.locations[worldData.currentLocationId];
            if (!currentLoc) return false;
            let targetId = currentLoc.links[direction];
            if (targetId && worldData.locations[targetId]) {
                worldData.currentLocationId = targetId;
                updateUI();
                updateSphereVideo();
                updateModalContent();
                showStatus(`Переход: ${worldData.locations[targetId].name}`);
                updateButtonsColorByVideo();
                updateModalNavButtons();
                autoSaveToLocal();
                return true;
            } else {
                const dirNames = { left: "слева", right: "справа", forward: "спереди", back: "сзади", turnLeft: "поворот влево", turnRight: "поворот вправо" };
                const newLoc = createEmptyLocation(currentLoc.name, dirNames[direction] || direction);
                worldData.locations[newLoc.id] = newLoc;
                currentLoc.links[direction] = newLoc.id;
                const opposite = { left: "right", right: "left", forward: "back", back: "forward", turnLeft: "turnRight", turnRight: "turnLeft" };
                if (opposite[direction]) newLoc.links[opposite[direction]] = currentLoc.id;
                worldData.currentLocationId = newLoc.id;
                updateUI();
                updateSphereVideo();
                updateModalContent();
                showStatus(`✨ Новая локация: ${newLoc.name}`);
                updateButtonsColorByVideo();
                updateModalNavButtons();
                autoSaveToLocal();
                return true;
            }
        }
        
        function addVideoToCurrent() {
            const current = worldData.locations[worldData.currentLocationId];
            if (!current) return;
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'video/mp4,video/quicktime,video/webm';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const blobUrl = URL.createObjectURL(file);
                    const videoKey = file.name || `video_${Date.now()}`;
                    videoBlobMap.set(videoKey, blobUrl);
                    current.videoPath = videoKey;
                    updateUI();
                    updateSphereVideo();
                    updateModalContent();
                    showStatus(`✅ Видео "${file.name}" добавлено в "${current.name}"`);
                    updateButtonsColorByVideo();
                    updateModalNavButtons();
                    autoSaveToLocal();
                }
            };
            input.click();
        }
        
        function clearVideoCurrent() {
            const current = worldData.locations[worldData.currentLocationId];
            if (current && current.videoPath) {
                // Не удаляем blob из map на случай если используется в другой локации
                current.videoPath = null;
                updateUI();
                updateSphereVideo();
                const modal = document.getElementById('video-modal');
                if (modal.classList.contains('active')) closeModal();
                showStatus(`🗑️ Видео удалено из "${current.name}"`);
                updateButtonsColorByVideo();
                updateModalNavButtons();
                autoSaveToLocal();
            }
        }
        
        function resetToNewWorld() {
            const freshWorld = {
                locations: {
                    "start": {
                        id: "start",
                        name: "Центральная площадь",
                        videoPath: null,
                        links: { left: null, right: null, forward: null, back: null, turnLeft: null, turnRight: null }
                    }
                },
                currentLocationId: "start"
            };
            worldData = freshWorld;
            updateUI();
            updateSphereVideo();
            updateButtonsColorByVideo();
            updateModalContent();
            if (document.getElementById('video-modal').classList.contains('active')) closeModal();
            autoSaveToLocal();
            showStatus("🌍 Новый мир! Видео не удаляются из памяти, но привязки сброшены.");
        }
        
        function fullResetAndClearCache() {
            localStorage.removeItem('video3d_world');
            resetToNewWorld();
            // Очистка blob URL
            for (let url of videoBlobMap.values()) {
                URL.revokeObjectURL(url);
            }
            videoBlobMap.clear();
            showStatus("💥 Полный сброс! Все видео-привязки удалены, кэш очищен.");
        }
        
        // Модальное окно видео
        function openVideoModal() {
            const current = worldData.locations[worldData.currentLocationId];
            if (!current || !current.videoPath) {
                showStatus("❌ Нет видео для просмотра");
                return;
            }
            const videoUrl = getVideoUrl(current.videoPath);
            if (!videoUrl) {
                showStatus("❌ Видеофайл не найден в памяти. Добавьте видео заново.");
                return;
            }
            const modal = document.getElementById('video-modal');
            const modalVideo = document.getElementById('modal-video');
            modalVideo.src = videoUrl;
            modalVideo.load();
            modalVideo.play().catch(e => console.log("autoplay blocked"));
            document.getElementById('modal-location-name').textContent = `📍 ${current.name}`;
            modal.classList.add('active');
            updateModalNavButtons();
            initSwipeControls();
        }
        
        function updateModalContent() {
            const current = worldData.locations[worldData.currentLocationId];
            if (current) {
                document.getElementById('modal-location-name').textContent = `📍 ${current.name}`;
                const modalVideo = document.getElementById('modal-video');
                if (current.videoPath) {
                    const url = getVideoUrl(current.videoPath);
                    if (url && modalVideo.src !== url) {
                        modalVideo.src = url;
                        modalVideo.load();
                    }
                } else {
                    if (document.getElementById('video-modal').classList.contains('active')) closeModal();
                }
            }
        }
        
        function closeModal() {
            const modal = document.getElementById('video-modal');
            if (modal.classList.contains('active')) {
                const modalVideo = document.getElementById('modal-video');
                modalVideo.pause();
                modal.classList.remove('active');
                removeSwipeControls();
            }
        }
        
        // Свайп
        let touchStartX = 0, touchStartY = 0, swipeActive = false;
        function handleTouchStart(e) {
            const touch = e.touches[0];
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;
        }
        function handleTouchEnd(e) {
            const deltaX = e.changedTouches[0].clientX - touchStartX;
            const deltaY = e.changedTouches[0].clientY - touchStartY;
            const minDist = 50;
            if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > minDist) {
                performNavigation(deltaX > 0 ? 'left' : 'right');
            } else if (Math.abs(deltaY) > Math.abs(deltaX) && Math.abs(deltaY) > minDist) {
                performNavigation(deltaY > 0 ? 'forward' : 'back');
            }
            setTimeout(() => {
                updateModalContent();
                updateModalNavButtons();
                const current = worldData.locations[worldData.currentLocationId];
                if (!current || !current.videoPath) closeModal();
                else {
                    const url = getVideoUrl(current.videoPath);
                    if (url) document.getElementById('modal-video').src = url;
                }
            }, 50);
        }
        function initSwipeControls() {
            if (swipeActive) return;
            const container = document.getElementById('modal-video-container');
            container.addEventListener('touchstart', handleTouchStart);
            container.addEventListener('touchend', handleTouchEnd);
            swipeActive = true;
        }
        function removeSwipeControls() {
            if (!swipeActive) return;
            const container = document.getElementById('modal-video-container');
            container.removeEventListener('touchstart', handleTouchStart);
            container.removeEventListener('touchend', handleTouchEnd);
            swipeActive = false;
        }
        
        // --- Three.js панорама (видео текстура) ---
        let scene, camera, renderer, sphereMesh, currentVideoTexture = null;
        function initThree() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050510);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 0.1);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);
            const geometry = new THREE.SphereGeometry(500, 64, 64);
            const material = new THREE.MeshBasicMaterial({ color: 0x111122, side: THREE.BackSide });
            sphereMesh = new THREE.Mesh(geometry, material);
            scene.add(sphereMesh);
            const stars = new THREE.Points(new THREE.BufferGeometry().setAttribute('position', new THREE.BufferAttribute(new Float32Array(Array(2000).fill().flatMap(() => [(Math.random() - 0.5) * 2000, (Math.random() - 0.5) * 2000, (Math.random() - 0.5) * 500])), 3)), new THREE.PointsMaterial({ color: 0xffffff, size: 0.7 }));
            scene.add(stars);
            function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
            animate();
            window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        }
        
        function updateSphereVideo() {
            const current = worldData.locations[worldData.currentLocationId];
            const videoPath = current?.videoPath;
            if (!videoPath) {
                if (sphereMesh.material.map) sphereMesh.material.map = null;
                sphereMesh.material.color.setHex(0x1a1a2e);
                return;
            }
            const videoUrl = getVideoUrl(videoPath);
            if (!videoUrl) {
                sphereMesh.material.color.setHex(0x4a2a2a);
                return;
            }
            const videoElem = document.createElement('video');
            videoElem.src = videoUrl;
            videoElem.loop = true;
            videoElem.muted = true;
            videoElem.playsInline = true;
            videoElem.crossOrigin = "Anonymous";
            videoElem.play().catch(e => console.log("autoplay muted"));
            const texture = new THREE.VideoTexture(videoElem);
            texture.wrapS = THREE.RepeatWrapping;
            texture.needsUpdate = true;
            sphereMesh.material.map = texture;
            sphereMesh.material.color.setHex(0xffffff);
            if (currentVideoTexture && currentVideoTexture.image) {
                currentVideoTexture.image.pause();
            }
            currentVideoTexture = texture;
        }
        
        function updateUI() {
            const current = worldData.locations[worldData.currentLocationId];
            if (!current) return;
            document.getElementById('location-name').innerHTML = `📍 ${current.name}`;
            const previewDiv = document.getElementById('video-preview-area');
            const videoUrl = current.videoPath ? getVideoUrl(current.videoPath) : null;
            if (videoUrl) {
                previewDiv.innerHTML = `<video src="${videoUrl}" muted loop playsinline style="max-width:100%; max-height:180px; border-radius:20px; cursor:pointer;"></video>`;
                const previewVideo = previewDiv.querySelector('video');
                if (previewVideo) previewVideo.addEventListener('click', () => openVideoModal());
            } else {
                previewDiv.innerHTML = `<div class="empty-video">🎬 Нет видео<br>Нажмите "Добавить видео"</div>`;
            }
        }
        
        function showStatus(msg) {
            const el = document.getElementById('status-msg');
            el.textContent = msg;
            setTimeout(() => { if (document.getElementById('status-msg') && el.textContent === msg) el.textContent = "🎬 3D Видео-навигатор | Видео хранятся локально, JSON только карта"; }, 2500);
        }
        
        function exportWorldToJSON() {
            const exportData = { version: "2.0", locations: worldData.locations, currentLocationId: worldData.currentLocationId };
            const jsonStr = JSON.stringify(exportData, null, 2);
            const blob = new Blob([jsonStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `videoworld_${new Date().toISOString().slice(0,19)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showStatus("✅ Карта мира сохранена (видео не встроены)");
        }
        
        function importWorldFromJSON(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.locations && data.currentLocationId) {
                        worldData.locations = data.locations;
                        worldData.currentLocationId = data.currentLocationId;
                        if (!worldData.locations[worldData.currentLocationId]) {
                            const first = Object.keys(worldData.locations)[0];
                            if (first) worldData.currentLocationId = first;
                        }
                        updateUI();
                        updateSphereVideo();
                        updateButtonsColorByVideo();
                        updateModalNavButtons();
                        showStatus(`📀 Загружена карта миров. Локаций: ${Object.keys(worldData.locations).length}`);
                        autoSaveToLocal();
                    } else throw new Error("Неверный формат");
                } catch (err) { showStatus("❌ Ошибка: " + err.message); }
            };
            reader.readAsText(file);
        }
        
        function autoSaveToLocal() {
            try {
                localStorage.setItem('video3d_world', JSON.stringify({ locations: worldData.locations, currentLocationId: worldData.currentLocationId }));
            } catch(e) {}
        }
        
        function loadFromLocalStorage() {
            const raw = localStorage.getItem('video3d_world');
            if (raw) {
                try {
                    const data = JSON.parse(raw);
                    if (data.locations && data.currentLocationId) {
                        worldData.locations = data.locations;
                        worldData.currentLocationId = data.currentLocationId;
                        if (!worldData.locations[worldData.currentLocationId]) worldData.currentLocationId = Object.keys(worldData.locations)[0];
                        updateUI();
                        updateSphereVideo();
                        updateButtonsColorByVideo();
                        showStatus("💾 Загружена последняя карта мира");
                    }
                } catch(e) {}
            }
        }
        
        function bindEvents() {
            document.getElementById('btn-left').onclick = () => performNavigation('left');
            document.getElementById('btn-right').onclick = () => performNavigation('right');
            document.getElementById('btn-forward').onclick = () => performNavigation('forward');
            document.getElementById('btn-back').onclick = () => performNavigation('back');
            document.getElementById('btn-rotate-left').onclick = () => performNavigation('turnLeft');
            document.getElementById('btn-rotate-right').onclick = () => performNavigation('turnRight');
            document.getElementById('add-video-btn').onclick = () => addVideoToCurrent();
            document.getElementById('reset-location-btn').onclick = () => clearVideoCurrent();
            document.getElementById('save-world-btn').onclick = () => exportWorldToJSON();
            document.getElementById('load-file-input').onchange = (e) => { if(e.target.files.length) importWorldFromJSON(e.target.files[0]); e.target.value=''; };
            document.getElementById('new-world-btn').onclick = () => resetToNewWorld();
            document.getElementById('full-clear-btn').onclick = () => fullResetAndClearCache();
            document.getElementById('modal-nav-left').onclick = () => { performNavigation('left'); updateModalContent(); updateModalNavButtons(); if(!locationHasVideo(worldData.currentLocationId)) closeModal(); };
            document.getElementById('modal-nav-right').onclick = () => { performNavigation('right'); updateModalContent(); updateModalNavButtons(); if(!locationHasVideo(worldData.currentLocationId)) closeModal(); };
            document.getElementById('modal-nav-forward').onclick = () => { performNavigation('forward'); updateModalContent(); updateModalNavButtons(); if(!locationHasVideo(worldData.currentLocationId)) closeModal(); };
            document.getElementById('modal-nav-back').onclick = () => { performNavigation('back'); updateModalContent(); updateModalNavButtons(); if(!locationHasVideo(worldData.currentLocationId)) closeModal(); };
            document.getElementById('modal-video-container').addEventListener('click', () => closeModal());
            document.getElementById('modal-close-btn').addEventListener('click', (e) => { e.stopPropagation(); closeModal(); });
            document.addEventListener('keydown', (e) => { if(e.key === 'Escape' && document.getElementById('video-modal').classList.contains('active')) closeModal(); });
        }
        
        function start() {
            initThree();
            bindEvents();
            loadFromLocalStorage();
            updateUI();
            updateSphereVideo();
            updateButtonsColorByVideo();
            showStatus("🎬 Готово! Добавляйте видео с телефона, навигация по стрелкам. JSON хранит только карту.");
        }
        start();
    </script>
</body>
</html>
