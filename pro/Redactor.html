<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KlikEdit 🎀</title>
  <style>
    body { margin: 0; font-family: sans-serif; background: #f5f5f5; }
    .toolbar { display: flex; gap: 5px; padding: 10px; background: #333; color: white; flex-wrap: wrap; align-items: center; }
    .toolbar input { padding: 5px; }
    .toolbar button, .toolbar label[for="fileUpload"] {
      padding: 6px 10px; border: none; border-radius: 5px; background: #555; color: white;
      cursor: pointer; transition: background 0.3s; font-size: 14px; font-family: inherit;
      line-height: normal; height: auto; text-align: center; box-sizing: border-box;
      margin: 0; display: inline-block; text-decoration: none;
    }
    .toolbar button:hover, .toolbar label[for="fileUpload"]:hover { background: #777; }
    .toolbar button.copied { background: #4CAF50; }
    .url-input { background: #444; border: 1px solid #666; color: white; border-radius: 5px; padding: 6px 10px; width: 250px; font-size: 14px; }
    .url-input::placeholder { color: #aaa; font-style: italic; }
    .editor { display: flex; height: calc(100vh - 60px); overflow: hidden; }
    .line-numbers { background: #eee; color: #666; padding: 5px 0; text-align: right; user-select: none; overflow: hidden; width: 50px; box-sizing: border-box; font-family: monospace; font-size: 14px; line-height: 1.4; }
    .line-numbers div { padding: 0 10px; }
    textarea { flex: 1; border: none; outline: none; resize: none; padding: 5px; font-family: monospace; font-size: 14px; line-height: 1.4; overflow: auto; }
    .active-line { background: rgba(100, 150, 250, 0.3); }
    .preview { width: 100%; height: calc(100vh - 60px); border: none; margin: 0; padding: 0; opacity: 0; visibility: hidden; transition: opacity 0.5s ease; }
    .preview.active { opacity: 1; visibility: visible; }
    .file-input { display: none; }
    .fullscreen-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 10000; display: none; }
    .fullscreen-overlay.active { display: block; }
    .fullscreen-exit-btn { position: fixed; top: 30px; right: 20px; z-index: 10001; padding: 12px 18px; background: rgba(0, 0, 0, 0.8); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3); }
    .fetch-loading { background: #f0ad4e !important; cursor: wait !important; }
  </style>
</head>
<body>

<div class="toolbar">
  <input type="text" id="urlInput" class="url-input" placeholder="HTML сайта (https://example.com)" value="">
  <button id="fetchButton" onclick="fetchWebsiteCode()">👁️‍🗨️</button>
  <input type="number" id="lineNumber" min="1" placeholder="Строка">
  <button onclick="goToLine()">Перейти 🔀</button>
  <input type="text" id="searchInput" placeholder="Поиск 🔎" style="width:120px;">
  <button onclick="findNext()">Найти ▶️</button>
  <button onclick="findPrev()">Назад ◀️</button>
  <button id="copyButton" onclick="copyText()">Скопировать 📃</button>
  <button onclick="clearAll()">Очистить ❌</button>
  <button onclick="window.location.href='https://2d3t.github.io/index.html/'">Выход 🚸</button>
  <button onclick="undo()">Отменить ↩️</button>
  <button onclick="redo()">Повторить ↪️</button>
  <button onclick="shareCode()">Скачать ⬇️</button>
  <button onclick="showEditor()">Редактор 🛠️</button>
  <button onclick="runCode()">Просмотр 🖥️</button>
  <button id="fullscreenButton" onclick="toggleFullscreen()">Полный экран ⛶</button>
  <label for="fileUpload" title="Открыть файл">Файлы 📂</label>
  <input type="file" id="fileUpload" class="file-input" accept=".html,.htm,.txt,.py,.js,.css,.json,.xml,.md" onchange="loadFile(event)">
</div>
  
<div class="editor">
  <div class="line-numbers" id="lineNumbers"></div>
  <textarea id="codeArea" oninput="updateLineNumbers()" onscroll="syncScroll()"></textarea>
</div>

<iframe class="preview" id="previewFrame"></iframe>

<div class="fullscreen-overlay" id="fullscreenOverlay">
  <button class="fullscreen-exit-btn" onclick="exitFullscreen()">✕ Выйти из полного экрана</button>
  <iframe id="fullscreenFrame" style="width:100%; height:100%; border:none;"></iframe>
</div>

<script>
  const textarea = document.getElementById('codeArea');
  const lineNumbers = document.getElementById('lineNumbers');
  const previewFrame = document.getElementById('previewFrame');
  const copyButton = document.getElementById('copyButton');
  const searchInput = document.getElementById('searchInput');
  const fullscreenButton = document.getElementById('fullscreenButton');
  const fullscreenOverlay = document.getElementById('fullscreenOverlay');
  const fullscreenFrame = document.getElementById('fullscreenFrame');
  const urlInput = document.getElementById('urlInput');
  const fetchButton = document.getElementById('fetchButton');

  let history = [];
  let redoStack = [];
  let isFullscreen = false;
  let manualExit = false;

  // Функция сохранения состояния для Undo/Redo
  function saveState() {
    history.push(textarea.value);
    if (history.length > 100) history.shift();
    redoStack = [];
  }

  // Обновление номеров строк
  function updateLineNumbers() {
    const lines = textarea.value.split('\n').length;
    const totalLines = lines + Math.ceil(lines * 0.5);
    lineNumbers.innerHTML = '';
    for (let i = 1; i <= totalLines; i++) {
      const div = document.createElement("div");
      div.textContent = i;
      lineNumbers.appendChild(div);
    }
  }

  function syncScroll() { lineNumbers.scrollTop = textarea.scrollTop; }

  // Функции для работы с редактором и файлами
  function loadFile(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => { saveState(); textarea.value = e.target.result; updateLineNumbers(); };
    reader.readAsText(file, 'UTF-8');
  }

  function runCode() {
    const blob = new Blob([textarea.value], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    previewFrame.src = url;
    fullscreenFrame.src = url;
    previewFrame.classList.add("active");
    document.querySelector('.editor').style.display = "none";
  }

  function showEditor() {
    if (isFullscreen) exitFullscreen();
    previewFrame.classList.remove("active");
    setTimeout(() => document.querySelector('.editor').style.display = "flex", 500);
  }

  // ========== ЛОГИКА ПОЛНОЭКРАННОГО РЕЖИМА С АВТОВОЗВРАТОМ ==========

  function toggleFullscreen() {
    if (!previewFrame.classList.contains('active')) return;
    isFullscreen ? exitFullscreen() : enterFullscreen();
  }

  function enterFullscreen() {
    fullscreenOverlay.classList.add('active');
    isFullscreen = true;
    manualExit = false; // Сбрасываем флаг: сейчас мы в режиме ожидания действий
    fullscreenButton.textContent = 'Обычный экран ⛶';
    fullscreenButton.style.background = '#4CAF50';
    previewFrame.classList.remove('active');
    document.querySelector('.toolbar').style.display = 'none';
    
    if (fullscreenOverlay.requestFullscreen) {
      fullscreenOverlay.requestFullscreen().catch(err => console.log(err));
    }
  }

  function exitFullscreen() {
    manualExit = true; // Указываем, что вышли сами (кнопкой или ESC)
    if (document.fullscreenElement) {
      document.exitFullscreen();
    }
    finalizeExit();
  }

  function finalizeExit() {
    fullscreenOverlay.classList.remove('active');
    isFullscreen = false;
    fullscreenButton.textContent = 'Полный экран ⛶';
    fullscreenButton.style.background = '';
    previewFrame.classList.add('active');
    document.querySelector('.toolbar').style.display = 'flex';
  }

  // Слушатель фокуса: когда окно выбора файла закрывается, фокус возвращается в окно браузера
  window.addEventListener('focus', () => {
    // Если мы "как бы" в полноэкранном режиме, но браузер его сбросил не вручную
    if (isFullscreen && !manualExit && !document.fullscreenElement) {
      // Пытаемся вернуться в полный экран автоматически
      if (fullscreenOverlay.requestFullscreen) {
        fullscreenOverlay.requestFullscreen().catch(err => console.log("Автовозврат не удался:", err));
      }
    }
  });

  document.addEventListener('fullscreenchange', () => {
    // Если вышли из режима Fullscreen
    if (!document.fullscreenElement) {
      if (manualExit) {
        finalizeExit();
      } else {
        // Системный выброс: визуально скрываем оверлей, чтобы человек мог выбрать файл,
        // но оставляем флаг isFullscreen = true, чтобы сработал фокус-автовозврат
        fullscreenOverlay.classList.remove('active');
        previewFrame.classList.add('active');
        document.querySelector('.toolbar').style.display = 'flex';
        fullscreenButton.textContent = 'Ожидание возврата...';
      }
    } else {
      // Если вернулись в Fullscreen (в том числе через автовозврат)
      fullscreenOverlay.classList.add('active');
      previewFrame.classList.remove('active');
      document.querySelector('.toolbar').style.display = 'none';
      fullscreenButton.textContent = 'Обычный экран ⛶';
      fullscreenButton.style.background = '#4CAF50';
    }
  });

  function handleEscapeKey(e) { if (e.key === 'Escape' && isFullscreen) exitFullscreen(); }
  document.addEventListener('keydown', handleEscapeKey);

  // Инициализация
  textarea.addEventListener('input', () => { saveState(); updateLineNumbers(); });
  updateLineNumbers();
</script>

</body>
</html>
