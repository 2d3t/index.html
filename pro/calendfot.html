
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Календарь с фото — современный дизайн</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  background: linear-gradient(145deg, #0a0f1c 0%, #0c1222 100%);
  color: #f0f3fa;
  transition: background 0.3s ease, color 0.2s;
  min-height: 100vh;
}

.container {
  max-width: 480px;
  margin: 0 auto;
  padding: 20px 16px 32px;
}

/* Современные стили для элементов управления */
.controls {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 24px;
}

.control-row {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.control-row > * {
  flex: 1;
  min-width: 0;
}

/* Универсальный стиль для селектов, инпутов, кнопок */
select, input[type="file"], button, .theme-select {
  background: rgba(20, 28, 40, 0.8);
  backdrop-filter: blur(4px);
  border: 1px solid rgba(72, 85, 120, 0.5);
  padding: 12px 16px;
  font-size: 15px;
  font-weight: 500;
  border-radius: 20px;
  color: #f0f3fa;
  cursor: pointer;
  transition: all 0.25s ease;
  font-family: inherit;
  outline: none;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}

select:hover, input[type="file"]:hover, button:hover {
  background: rgba(35, 45, 65, 0.9);
  border-color: rgba(120, 140, 190, 0.8);
  transform: translateY(-1px);
  box-shadow: 0 8px 18px rgba(0,0,0,0.25);
}

select:focus, button:focus {
  border-color: #5d9bff;
  box-shadow: 0 0 0 3px rgba(93, 155, 255, 0.3);
}

input[type="file"] {
  padding: 10px 12px;
  cursor: pointer;
  background: rgba(20, 28, 40, 0.7);
}

input[type="file"]::file-selector-button {
  background: #2a3a5e;
  border: none;
  border-radius: 40px;
  padding: 6px 14px;
  color: white;
  font-weight: 500;
  margin-right: 12px;
  cursor: pointer;
  transition: 0.2s;
}

input[type="file"]::file-selector-button:hover {
  background: #3f5a8c;
}

/* Кастомный чекбокс */
.checkbox-wrapper {
  display: flex;
  align-items: center;
  gap: 12px;
  background: rgba(20, 28, 40, 0.6);
  backdrop-filter: blur(4px);
  padding: 10px 16px;
  border-radius: 40px;
  border: 1px solid rgba(72, 85, 120, 0.4);
  cursor: pointer;
  transition: all 0.2s;
}

.checkbox-wrapper:hover {
  background: rgba(35, 45, 65, 0.8);
  border-color: #5d9bff;
}

.checkbox-wrapper input {
  width: 20px;
  height: 20px;
  cursor: pointer;
  accent-color: #5d9bff;
  margin: 0;
}

.checkbox-wrapper label {
  flex: 1;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  letter-spacing: 0.3px;
}

/* Стиль кнопки скачивания с градиентом */
.download-btn {
  background: linear-gradient(105deg, #3a6ea5, #2c5282);
  border: none;
  font-weight: 600;
  letter-spacing: 0.5px;
  font-size: 16px;
  box-shadow: 0 6px 14px rgba(0, 30, 60, 0.4);
}

.download-btn:hover {
  background: linear-gradient(105deg, #4c7fb8, #366396);
  transform: translateY(-2px);
  box-shadow: 0 12px 22px rgba(0, 40, 80, 0.5);
}

.download-btn:active {
  transform: translateY(1px);
}

/* Календарь — современный, закругленный, с тенью */
.calendar {
  border-radius: 32px;
  overflow: hidden;
  background: rgba(25, 32, 48, 0.85);
  backdrop-filter: blur(2px);
  box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.5);
  border: 1px solid rgba(100, 120, 160, 0.3);
  transition: all 0.2s;
}

.title {
  text-align: center;
  font-size: 26px;
  font-weight: 700;
  padding: 20px 12px 12px;
  background: rgba(0, 0, 0, 0.2);
  letter-spacing: -0.3px;
  backdrop-filter: blur(2px);
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

/* ВАЖНО: фотографии без обрезки, сохраняют пропорции, календарь подстраивается */
.header-wrapper {
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding: 18px 16px 8px;
  background: rgba(0,0,0,0.15);
}

.header-img {
  width: 100%;
  height: auto;          /* Автоматическая высота — без обрезки, сохраняем пропорции */
  object-fit: contain;   /* Вместо cover — фото видно целиком, не обрезается */
  border-radius: 24px;
  background: #0a0f1a;
  box-shadow: 0 6px 14px rgba(0,0,0,0.3);
  transition: transform 0.2s;
  border: 1px solid rgba(255,255,255,0.1);
  display: block;
}

.header-img:hover {
  transform: scale(1.01);
}

/* Сетка дней недели и ячеек */
.grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  text-align: center;
  padding: 12px 8px 18px;
  gap: 4px;
}

.grid > div {
  font-weight: 500;
  padding: 12px 6px;
  font-size: 15px;
  border-radius: 40px;
  transition: 0.1s ease;
}

.day {
  background: rgba(35, 45, 65, 0.5);
  backdrop-filter: blur(2px);
  font-weight: 500;
}

.weekend {
  color: #ff9f7c;
  background: rgba(255, 100, 70, 0.12);
}

/* Подсветка сегодняшнего дня — стильный глянец */
.today {
  background: linear-gradient(135deg, #ffb347, #ff8c2e);
  color: #1e1f2c;
  font-weight: 800;
  box-shadow: 0 4px 12px rgba(255, 140, 0, 0.4);
  border: none;
  transform: scale(0.98);
}

/* Темы оформления (с сохранением современной стилистики) */
.theme-light {
  background: #f2f5fc;
  color: #1e2a3a;
}
.theme-light .calendar {
  background: rgba(255, 255, 255, 0.95);
  border-color: #cdd9ff;
  box-shadow: 0 20px 30px -10px rgba(0,0,0,0.1);
}
.theme-light select, .theme-light input, .theme-light button, .theme-light .checkbox-wrapper {
  background: white;
  border-color: #cbd5e1;
  color: #0f172a;
  box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}
.theme-light .download-btn {
  background: linear-gradient(105deg, #2c5282, #1e3a5f);
  color: white;
}
.theme-light .today {
  background: linear-gradient(135deg, #f59e0b, #ea580c);
  color: white;
}

.theme-blue {
  background: #0a192f;
}
.theme-blue .calendar {
  background: #102b44;
  border-color: #2c5282;
}
.theme-blue .day {
  background: #1e3a5f;
}
.theme-blue .today {
  background: linear-gradient(135deg, #60a5fa, #3b82f6);
  color: #0f172a;
}

.theme-green {
  background: #0f2e24;
}
.theme-green .calendar {
  background: #1b4d3e;
  border-color: #2d6a4f;
}
.theme-green .day {
  background: #2d6a4f;
}
.theme-green .today {
  background: linear-gradient(135deg, #74c69d, #40916c);
  color: #081c15;
}

/* Адаптив */
@media (max-width: 480px) {
  .container {
    padding: 12px;
  }
  .grid > div {
    padding: 8px 2px;
    font-size: 13px;
  }
  .title {
    font-size: 22px;
  }
}
</style>
</head>
<body>
<div class="container" id="app">
  <div class="controls">
    <div class="control-row">
      <input type="file" id="imgInput" multiple accept="image/*">
    </div>
    <div class="control-row">
      <select id="month"></select>
      <select id="year"></select>
    </div>
    <div class="control-row">
      <select id="theme">
        <option value="">🌙 Тёмная (Premium)</option>
        <option value="theme-light">☀️ Светлая</option>
        <option value="theme-blue">💙 Синяя (Deep Blue)</option>
        <option value="theme-green">🌿 Зелёная (Forest)</option>
      </select>
    </div>
    <div class="checkbox-wrapper" id="checkboxWrapper">
      <input type="checkbox" id="toggleToday" checked>
      <label for="toggleToday">✨ Подсветить сегодняшний день</label>
    </div>
    <button class="download-btn" onclick="downloadImage()">📸 Скачать JPEG / PNG (выбор формата)</button>
  </div>
  <div id="calendar" class="calendar"></div>
</div>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script>
const months = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const monthSelect = document.getElementById('month');
const yearSelect = document.getElementById('year');
const calendarDiv = document.getElementById('calendar');
const themeSelect = document.getElementById('theme');
const toggleTodayCheckbox = document.getElementById('toggleToday');

months.forEach((m,i)=>{
 let opt=document.createElement('option'); opt.value=i; opt.text=m; monthSelect.add(opt);
});

for(let y=2020;y<=2035;y++){
 let opt=document.createElement('option'); opt.value=y; opt.text=y; yearSelect.add(opt);
}

monthSelect.value = new Date().getMonth();
yearSelect.value = new Date().getFullYear();

function render(){
 calendarDiv.innerHTML='';

 let m = parseInt(monthSelect.value);
 let y = parseInt(yearSelect.value);

 let imgs = document.getElementById('imgInput').files;
 if(imgs.length){
   let wrap = document.createElement('div');
   wrap.className='header-wrapper';

   for(let i=0;i<imgs.length;i++){
     let img=document.createElement('img');
     img.className='header-img';
     // Важно: сохраняем оригинальные пропорции — никакого обрезания
     img.style.width = '100%';
     img.style.height = 'auto';
     img.style.objectFit = 'contain';
     img.src=URL.createObjectURL(imgs[i]);
     wrap.appendChild(img);
   }
   calendarDiv.appendChild(wrap);
 }

 /* Заголовок под фото */
 let title = document.createElement('div');
 title.className = 'title';
 title.textContent = months[m] + ' ' + y;
 calendarDiv.appendChild(title);

 let grid=document.createElement('div'); grid.className='grid';

 let days=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
 days.forEach((d,i)=>{
   let div=document.createElement('div'); div.textContent=d;
   if(i>=5) div.classList.add('weekend');
   grid.appendChild(div);
 });

 let first = new Date(y,m,1).getDay();
 if(first===0) first=7;
 let total = new Date(y,m+1,0).getDate();

 let today = new Date();

 for(let i=1;i<first;i++){
   let div=document.createElement('div'); grid.appendChild(div);
 }

 for(let d=1;d<=total;d++){
   let div=document.createElement('div'); div.textContent=d; div.className='day';
   let dayIndex = (first + d -2)%7;
   if(dayIndex>=5) div.classList.add('weekend');

   /* Подсветка сегодняшнего дня */
   if(toggleTodayCheckbox.checked && d === today.getDate() && m === today.getMonth() && y === today.getFullYear()){
     div.classList.add('today');
   }

   grid.appendChild(div);
 }

 calendarDiv.appendChild(grid);
}

monthSelect.onchange = render;
yearSelect.onchange = render;
document.getElementById('imgInput').onchange = render;
themeSelect.onchange = ()=>{
 document.body.className = themeSelect.value;
};
toggleTodayCheckbox.onchange = render;

render();

// Функция скачивания с поддержкой JPEG и PNG (пользователь выбирает)
async function downloadImage(){
 try {
   const btn = document.querySelector('.download-btn');
   const originalText = btn.innerHTML;
   btn.innerHTML = '⏳ Генерация изображения...';
   btn.disabled = true;
   btn.style.opacity = '0.7';
   
   const canvas = await html2canvas(calendarDiv, {
     useCORS: true,
     backgroundColor: null,
     scale: 2.5,
     logging: false,
     allowTaint: false
   });
   
   // Предлагаем выбор: OK → PNG, Отмена → JPEG
   const usePng = confirm('Выберите формат:\n\n✅ «OK» → PNG (максимальное качество, поддержка прозрачности)\n❌ «Отмена» → JPEG (компактный размер, отличное качество)');
   
   let mimeType = usePng ? 'image/png' : 'image/jpeg';
   let extension = usePng ? 'png' : 'jpg';
   let quality = usePng ? undefined : 0.94;
   
   canvas.toBlob(function(blob){
     const link = document.createElement('a');
     const dateStr = new Date().toISOString().slice(0,19).replace(/:/g, '-');
     link.download = `calendar_${dateStr}.${extension}`;
     link.href = URL.createObjectURL(blob);
     link.click();
     URL.revokeObjectURL(link.href);
     
     btn.innerHTML = originalText;
     btn.disabled = false;
     btn.style.opacity = '1';
   }, mimeType, quality);
   
 } catch(e){
   alert('❌ Ошибка при сохранении: ' + e.message);
   const btn = document.querySelector('.download-btn');
   btn.innerHTML = '📸 Скачать JPEG / PNG (выбор формата)';
   btn.disabled = false;
   btn.style.opacity = '1';
 }
}
</script>
</body>
</html>
