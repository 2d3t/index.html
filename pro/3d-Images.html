
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3D Фото-Навигатор | Полноэкранный режим с навигацией</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #0a0a12;
            color: white;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: fixed;
        }

        /* 3D канвас */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* Модальное окно для просмотра фото в полном размере */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.97);
            z-index: 1000;
            backdrop-filter: blur(8px);
            animation: fadeIn 0.2s ease;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-image-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: calc(100% - 120px);
            cursor: pointer;
        }

        .modal img {
            max-width: 95vw;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            animation: zoomIn 0.2s ease;
            pointer-events: none;
        }

        /* Навигационная панель в полноэкранном режиме */
        .modal-nav {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            margin: 0 auto;
            width: fit-content;
            border: 1px solid rgba(255,255,255,0.2);
            z-index: 1001;
        }

        .modal-nav-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(30,30,40,0.9);
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            transition: all 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            touch-action: manipulation;
        }

        .modal-nav-btn:active {
            transform: scale(0.92);
        }

        .modal-nav-btn.has-photo {
            background: #1f6d3b;
            box-shadow: 0 0 12px rgba(46, 204, 113, 0.6);
            border: 1px solid rgba(72, 239, 128, 0.8);
        }

        .modal-nav-btn.has-photo:active {
            background: #158a44;
        }

        .modal-close-hint {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 14px;
            color: white;
            backdrop-filter: blur(4px);
            cursor: pointer;
            z-index: 1002;
            transition: 0.2s;
        }

        .modal-close-hint:active {
            transform: scale(0.95);
        }

        .modal-location-name {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            backdrop-filter: blur(4px);
            z-index: 1002;
            pointer-events: none;
        }

        .swipe-hint {
            position: absolute;
            bottom: 110px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 11px;
            background: rgba(0,0,0,0.4);
            padding: 4px 12px;
            width: fit-content;
            margin: 0 auto;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            pointer-events: none;
            z-index: 1001;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes zoomIn {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* Интерфейс поверх */
        .ui-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 10;
            background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
            padding: 20px 16px 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            pointer-events: none;
        }

        .photo-panel {
            background: rgba(20,20,30,0.85);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 16px;
            pointer-events: auto;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .photo-title {
            font-size: 1.2rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 12px;
            color: #ffd966;
            word-break: break-word;
        }

        .photo-preview {
            background: #1e1e2a;
            border-radius: 24px;
            min-height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .photo-preview:active {
            transform: scale(0.99);
        }

        .photo-preview img {
            max-width: 100%;
            max-height: 180px;
            object-fit: contain;
            border-radius: 20px;
            transition: 0.2s;
            pointer-events: none;
        }

        .empty-photo {
            color: #aaa;
            font-size: 0.9rem;
            text-align: center;
            padding: 30px;
            background: #2a2a32;
            border-radius: 20px;
            width: 100%;
        }
        
        .click-hint {
            font-size: 0.7rem;
            color: #888;
            text-align: center;
            margin-top: 5px;
            display: block;
        }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 8px;
        }

        .nav-btn {
            background: rgba(30,30,40,0.9);
            border: none;
            backdrop-filter: blur(4px);
            padding: 14px 0;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.1s ease;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            cursor: pointer;
            pointer-events: auto;
            font-family: monospace;
            letter-spacing: 1px;
        }
        
        .nav-btn.has-photo {
            background: #1f6d3b;
            box-shadow: 0 0 6px rgba(46, 204, 113, 0.5);
            border: 1px solid rgba(72, 239, 128, 0.6);
        }
        
        .nav-btn:active {
            transform: scale(0.96);
        }

        .special-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 8px;
        }

        .action-btn {
            background: #2c3e66;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
        }

        .danger-btn {
            background: #8b3c3c;
        }

        .save-load {
            display: flex;
            gap: 12px;
            justify-content: space-between;
            pointer-events: auto;
        }

        .file-btn {
            background: #1f3b4c;
            flex: 1;
            text-align: center;
            padding: 12px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            border: none;
            color: white;
        }

        .file-input-label {
            background: #2c5a2e;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        input[type="file"] {
            display: none;
        }

        .status {
            font-size: 0.7rem;
            text-align: center;
            color: #ccc;
            margin-top: 8px;
            pointer-events: auto;
        }

        @media (max-width: 600px) {
            .nav-btn { padding: 12px 0; font-size: 0.9rem; }
            .photo-preview { min-height: 150px; }
            .modal-nav-btn {
                width: 50px;
                height: 50px;
                font-size: 24px;
            }
            .modal-location-name {
                font-size: 11px;
                top: 12px;
                left: 12px;
            }
            .modal-close-hint {
                font-size: 12px;
                top: 12px;
                right: 12px;
            }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <!-- Модальное окно для увеличенного фото с навигацией -->
    <div id="photo-modal" class="modal">
        <div class="modal-location-name" id="modal-location-name">📍 Локация</div>
        <div class="modal-close-hint" id="modal-close-btn">✖ Закрыть</div>
        <div class="modal-image-container" id="modal-image-container">
            <img id="modal-image" src="" alt="Увеличенное фото">
        </div>
        <div class="modal-nav">
            <button class="modal-nav-btn" id="modal-nav-left" title="Влево">◀</button>
            <button class="modal-nav-btn" id="modal-nav-forward" title="Вперёд">▲</button>
            <button class="modal-nav-btn" id="modal-nav-right" title="Вправо">▶</button>
            <button class="modal-nav-btn" id="modal-nav-back" title="Назад">▼</button>
        </div>
        <div class="swipe-hint">↔ Свайп влево/вправо = перемещение | ↕ Свайп вверх/вниз = вперёд/назад</div>
    </div>
    
    <div class="ui-overlay">
        <div class="photo-panel">
            <div class="photo-title" id="location-name">📍 Текущая локация: Центр</div>
            <div class="photo-preview" id="photo-preview-area">
                <div class="empty-photo">📸 Нет фотографии<br>Нажмите "Добавить фото"</div>
            </div>
            <div class="click-hint">✨ Нажмите на фото, чтобы увеличить</div>
            <div class="nav-grid">
                <button class="nav-btn" id="btn-left">◀ ВЛЕВО</button>
                <button class="nav-btn" id="btn-forward">⬆ ВПЕРЁД</button>
                <button class="nav-btn" id="btn-right">ВПРАВО ▶</button>
                <button class="nav-btn" id="btn-back">⬇ НАЗАД</button>
                <button class="nav-btn" id="btn-rotate-left">🔄 ПОВОРОТ ВЛЕВО</button>
                <button class="nav-btn" id="btn-rotate-right">🔄 ПОВОРОТ ВПРАВО</button>
            </div>
            <div class="special-row">
                <button class="nav-btn action-btn" id="add-photo-btn">📷 ДОБАВИТЬ ФОТО</button>
                <button class="nav-btn action-btn danger-btn" id="reset-location-btn">🗑️ ОЧИСТИТЬ ФОТО</button>
            </div>
        </div>

        <div class="save-load">
            <button class="file-btn" id="save-world-btn">💾 СОХРАНИТЬ МИР (JSON)</button>
            <label class="file-btn file-input-label" id="load-label">
                📂 ЗАГРУЗИТЬ JSON
                <input type="file" id="load-file-input" accept=".json">
            </label>
        </div>
        <div class="status" id="status-msg">⚡ 3D просмотрщик | Тап по фото для закрытия | Зелёные стрелки = есть фото</div>
    </div>

    <!-- Библиотеки Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- Модель данных ---
        let worldData = {
            locations: {
                "start": {
                    id: "start",
                    name: "Центральная площадь",
                    imageUrl: null,
                    links: {
                        left: null,
                        right: null,
                        forward: null,
                        back: null,
                        turnLeft: null,
                        turnRight: null
                    }
                }
            },
            currentLocationId: "start"
        };

        // Вспомогательные функции
        function generateId() {
            return Date.now() + '-' + Math.random().toString(36).substr(2, 6);
        }

        function createEmptyLocation(baseName, directionHint = "") {
            const newId = generateId();
            const name = directionHint ? `${baseName} (${directionHint})` : `${baseName} ${Object.keys(worldData.locations).length}`;
            return {
                id: newId,
                name: name,
                imageUrl: null,
                links: {
                    left: null,
                    right: null,
                    forward: null,
                    back: null,
                    turnLeft: null,
                    turnRight: null
                }
            };
        }

        function locationHasPhoto(locId) {
            const loc = worldData.locations[locId];
            return loc && loc.imageUrl !== null && loc.imageUrl !== "";
        }

        // Обновление цвета кнопок в основном интерфейсе
        function updateButtonsColorByPhoto() {
            const current = worldData.locations[worldData.currentLocationId];
            if (!current) return;
            
            const directions = ['left', 'right', 'forward', 'back', 'turnLeft', 'turnRight'];
            directions.forEach(dir => {
                const targetId = current.links[dir];
                const btnId = {
                    left: 'btn-left',
                    right: 'btn-right',
                    forward: 'btn-forward',
                    back: 'btn-back',
                    turnLeft: 'btn-rotate-left',
                    turnRight: 'btn-rotate-right'
                }[dir];
                
                const button = document.getElementById(btnId);
                if (button) {
                    if (targetId && locationHasPhoto(targetId)) {
                        button.classList.add('has-photo');
                    } else {
                        button.classList.remove('has-photo');
                    }
                }
            });
        }
        
        // Обновление цвета кнопок в модальном окне
        function updateModalNavButtons() {
            const current = worldData.locations[worldData.currentLocationId];
            if (!current) return;
            
            const navButtons = {
                left: document.getElementById('modal-nav-left'),
                right: document.getElementById('modal-nav-right'),
                forward: document.getElementById('modal-nav-forward'),
                back: document.getElementById('modal-nav-back')
            };
            
            const checks = {
                left: current.links.left,
                right: current.links.right,
                forward: current.links.forward,
                back: current.links.back
            };
            
            for (const [dir, btn] of Object.entries(navButtons)) {
                if (btn) {
                    const targetId = checks[dir];
                    if (targetId && locationHasPhoto(targetId)) {
                        btn.classList.add('has-photo');
                    } else {
                        btn.classList.remove('has-photo');
                    }
                }
            }
        }

        // Функция перемещения
        function performNavigation(direction) {
            const currentLoc = worldData.locations[worldData.currentLocationId];
            if (!currentLoc) return false;
            const targetId = currentLoc.links[direction];
            
            if (targetId && worldData.locations[targetId]) {
                worldData.currentLocationId = targetId;
                updateUI();
                renderCurrentPhotoOnSphere();
                updateModalContent();
                showStatus(`Переход: ${worldData.locations[targetId].name}`);
                updateButtonsColorByPhoto();
                updateModalNavButtons();
                autoSaveToLocal();
                return true;
            } else {
                const dirNames = {
                    left: "слева", right: "справа", forward: "спереди", back: "сзади",
                    turnLeft: "поворот влево", turnRight: "поворот вправо"
                };
                const newLoc = createEmptyLocation(currentLoc.name, dirNames[direction] || direction);
                worldData.locations[newLoc.id] = newLoc;
                currentLoc.links[direction] = newLoc.id;
                const opposite = {
                    left: "right", right: "left", forward: "back", back: "forward",
                    turnLeft: "turnRight", turnRight: "turnLeft"
                };
                if (opposite[direction]) {
                    newLoc.links[opposite[direction]] = currentLoc.id;
                }
                worldData.currentLocationId = newLoc.id;
                updateUI();
                renderCurrentPhotoOnSphere();
                updateModalContent();
                showStatus(`✨ Создана новая локация: ${newLoc.name}`);
                updateButtonsColorByPhoto();
                updateModalNavButtons();
                autoSaveToLocal();
                return true;
            }
        }

        function navigate(direction) {
            performNavigation(direction);
        }

        function addPhotoToCurrent() {
            const current = worldData.locations[worldData.currentLocationId];
            if (!current) return;
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/jpeg, image/png, image/webp';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        const imgUrl = ev.target.result;
                        current.imageUrl = imgUrl;
                        updateUI();
                        renderCurrentPhotoOnSphere();
                        updateModalContent();
                        showStatus(`✅ Фото добавлено в "${current.name}"`);
                        updateButtonsColorByPhoto();
                        updateModalNavButtons();
                        autoSaveToLocal();
                    };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        }

        function clearPhotoCurrent() {
            const current = worldData.locations[worldData.currentLocationId];
            if (current) {
                current.imageUrl = null;
                updateUI();
                renderCurrentPhotoOnSphere();
                if (document.getElementById('photo-modal').classList.contains('active')) {
                    closeModal();
                }
                showStatus(`🗑️ Фото удалено из "${current.name}"`);
                updateButtonsColorByPhoto();
                updateModalNavButtons();
                autoSaveToLocal();
            }
        }

        // --- Модальное окно ---
        function openPhotoModal() {
            const current = worldData.locations[worldData.currentLocationId];
            if (!current || !current.imageUrl) return;
            
            const modal = document.getElementById('photo-modal');
            const modalImg = document.getElementById('modal-image');
            modalImg.src = current.imageUrl;
            updateModalContent();
            modal.classList.add('active');
            updateModalNavButtons();
            initSwipeControls();
        }

        function updateModalContent() {
            const current = worldData.locations[worldData.currentLocationId];
            if (current) {
                const modalName = document.getElementById('modal-location-name');
                modalName.textContent = `📍 ${current.name}`;
                const modalImg = document.getElementById('modal-image');
                if (current.imageUrl && modalImg.src !== current.imageUrl) {
                    modalImg.src = current.imageUrl;
                }
            }
        }

        function closeModal() {
            const modal = document.getElementById('photo-modal');
            modal.classList.remove('active');
            removeSwipeControls();
        }

        // --- Свайп управление ---
        let touchStartX = 0, touchStartY = 0;
        let swipeHandlerActive = false;
        
        function handleTouchStart(e) {
            e.preventDefault();
            const touch = e.touches[0];
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;
        }
        
        function handleTouchEnd(e) {
            e.preventDefault();
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;
            const minDistance = 50;
            
            if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > minDistance) {
                if (deltaX > 0) {
                    performNavigation('left');
                } else {
                    performNavigation('right');
                }
            } 
            else if (Math.abs(deltaY) > Math.abs(deltaX) && Math.abs(deltaY) > minDistance) {
                if (deltaY > 0) {
                    performNavigation('forward');
                } else {
                    performNavigation('back');
                }
            }
            
            setTimeout(() => {
                updateModalContent();
                updateModalNavButtons();
                const current = worldData.locations[worldData.currentLocationId];
                if (!current || !current.imageUrl) {
                    closeModal();
                    showStatus("⚠️ В этой локации нет фото, режим закрыт");
                }
            }, 50);
        }
        
        function initSwipeControls() {
            if (swipeHandlerActive) return;
            const modal = document.getElementById('photo-modal');
            modal.addEventListener('touchstart', handleTouchStart, { passive: false });
            modal.addEventListener('touchend', handleTouchEnd, { passive: false });
            swipeHandlerActive = true;
        }
        
        function removeSwipeControls() {
            if (!swipeHandlerActive) return;
            const modal = document.getElementById('photo-modal');
            modal.removeEventListener('touchstart', handleTouchStart);
            modal.removeEventListener('touchend', handleTouchEnd);
            swipeHandlerActive = false;
        }

        // --- Three.js ---
        let scene, camera, renderer, sphereMesh;
        
        function initThree() {
            const container = document.getElementById('canvas-container');
            const width = window.innerWidth;
            const height = window.innerHeight;
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050510);
            camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
            camera.position.set(0, 0, 0.1);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(width, height);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);
            
            const geometry = new THREE.SphereGeometry(500, 64, 64);
            const material = new THREE.MeshBasicMaterial({ color: 0x111122, side: THREE.BackSide });
            sphereMesh = new THREE.Mesh(geometry, material);
            scene.add(sphereMesh);
            
            const starGeometry = new THREE.BufferGeometry();
            const starCount = 1800;
            const starPos = [];
            for (let i = 0; i < starCount; i++) {
                starPos.push((Math.random() - 0.5) * 2000);
                starPos.push((Math.random() - 0.5) * 2000);
                starPos.push((Math.random() - 0.5) * 500 - 300);
            }
            starGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starPos), 3));
            const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.7 });
            const stars = new THREE.Points(starGeometry, starMaterial);
            scene.add(stars);
            
            function animate() {
                requestAnimationFrame(animate);
                renderer.render(scene, camera);
            }
            animate();
            
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }
        
        function renderCurrentPhotoOnSphere() {
            const current = worldData.locations[worldData.currentLocationId];
            const imgUrl = current?.imageUrl;
            if (!imgUrl) {
                if (sphereMesh.material.map) sphereMesh.material.map = null;
                sphereMesh.material.color.setHex(0x1a1a2e);
                sphereMesh.material.needsUpdate = true;
                return;
            }
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.onload = () => {
                const texture = new THREE.Texture(img);
                texture.wrapS = THREE.RepeatWrapping;
                texture.wrapT = THREE.ClampToEdgeWrapping;
                texture.needsUpdate = true;
                sphereMesh.material.map = texture;
                sphereMesh.material.color.setHex(0xffffff);
                sphereMesh.material.needsUpdate = true;
            };
            img.src = imgUrl;
        }
        
        function updateUI() {
            const current = worldData.locations[worldData.currentLocationId];
            if (!current) return;
            document.getElementById('location-name').innerHTML = `📍 ${current.name}`;
            const previewDiv = document.getElementById('photo-preview-area');
            if (current.imageUrl) {
                previewDiv.innerHTML = `<img src="${current.imageUrl}" alt="preview" style="max-width:100%; max-height:180px; border-radius:20px; cursor:pointer;">`;
                const previewImg = previewDiv.querySelector('img');
                if (previewImg) {
                    previewImg.addEventListener('click', (e) => {
                        e.stopPropagation();
                        openPhotoModal();
                    });
                }
            } else {
                previewDiv.innerHTML = `<div class="empty-photo">📸 Нет фотографии<br>Нажмите "Добавить фото"</div>`;
            }
            const previewArea = document.getElementById('photo-preview-area');
            previewArea.style.cursor = current.imageUrl ? 'pointer' : 'default';
            const oldHandler = previewArea._clickHandler;
            if (oldHandler) previewArea.removeEventListener('click', oldHandler);
            const newHandler = () => {
                if (current.imageUrl) openPhotoModal();
            };
            previewArea.addEventListener('click', newHandler);
            previewArea._clickHandler = newHandler;
        }
        
        function showStatus(msg) {
            const statusEl = document.getElementById('status-msg');
            statusEl.textContent = msg;
            setTimeout(() => {
                if (document.getElementById('status-msg') && statusEl.textContent === msg)
                    statusEl.textContent = "⚡ 3D просмотрщик | Тап по фото для закрытия | Зелёные стрелки = есть фото";
            }, 2000);
        }
        
        // --- Сохранение/загрузка ---
        function exportWorldToJSON() {
            const exportData = {
                version: "1.0",
                locations: worldData.locations,
                currentLocationId: worldData.currentLocationId
            };
            const jsonStr = JSON.stringify(exportData, null, 2);
            const blob = new Blob([jsonStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `photoworld_${new Date().toISOString().slice(0,19)}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showStatus("✅ Мир сохранён в JSON");
        }
        
        function importWorldFromJSON(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.locations && typeof data.locations === 'object' && data.currentLocationId) {
                        worldData.locations = data.locations;
                        worldData.currentLocationId = data.currentLocationId;
                        if (!worldData.locations[worldData.currentLocationId]) {
                            const firstId = Object.keys(worldData.locations)[0];
                            if (firstId) worldData.currentLocationId = firstId;
                            else throw new Error("Нет валидных локаций");
                        }
                        updateUI();
                        renderCurrentPhotoOnSphere();
                        updateButtonsColorByPhoto();
                        updateModalNavButtons();
                        showStatus(`📀 Загружен мир! Локаций: ${Object.keys(worldData.locations).length}`);
                        autoSaveToLocal();
                    } else {
                        throw new Error("Неверный формат JSON");
                    }
                } catch (err) {
                    showStatus("❌ Ошибка загрузки: " + err.message);
                }
            };
            reader.readAsText(file);
        }
        
        function autoSaveToLocal() {
            try {
                localStorage.setItem('photo3d_world', JSON.stringify({
                    locations: worldData.locations,
                    currentLocationId: worldData.currentLocationId
                }));
            } catch(e) {}
        }
        
        function loadFromLocalStorage() {
            const raw = localStorage.getItem('photo3d_world');
            if (raw) {
                try {
                    const data = JSON.parse(raw);
                    if (data.locations && data.currentLocationId) {
                        worldData.locations = data.locations;
                        worldData.currentLocationId = data.currentLocationId;
                        if (!worldData.locations[worldData.currentLocationId]) {
                            const first = Object.keys(worldData.locations)[0];
                            if(first) worldData.currentLocationId = first;
                        }
                        updateUI();
                        renderCurrentPhotoOnSphere();
                        updateButtonsColorByPhoto();
                        showStatus("💾 Загружена последняя сессия");
                    }
                } catch(e) {}
            }
        }
        
        // --- Инициализация ---
        function bindEvents() {
            document.getElementById('btn-left').addEventListener('click', () => navigate('left'));
            document.getElementById('btn-right').addEventListener('click', () => navigate('right'));
            document.getElementById('btn-forward').addEventListener('click', () => navigate('forward'));
            document.getElementById('btn-back').addEventListener('click', () => navigate('back'));
            document.getElementById('btn-rotate-left').addEventListener('click', () => navigate('turnLeft'));
            document.getElementById('btn-rotate-right').addEventListener('click', () => navigate('turnRight'));
            document.getElementById('add-photo-btn').addEventListener('click', () => addPhotoToCurrent());
            document.getElementById('reset-location-btn').addEventListener('click', () => clearPhotoCurrent());
            document.getElementById('save-world-btn').addEventListener('click', () => exportWorldToJSON());
            document.getElementById('load-file-input').addEventListener('change', (e) => {
                if (e.target.files.length) importWorldFromJSON(e.target.files[0]);
                e.target.value = '';
            });
            
            // Модальные кнопки навигации
            document.getElementById('modal-nav-left').addEventListener('click', () => {
                performNavigation('left');
                updateModalContent();
                updateModalNavButtons();
                const current = worldData.locations[worldData.currentLocationId];
                if (!current.imageUrl) closeModal();
            });
            document.getElementById('modal-nav-right').addEventListener('click', () => {
                performNavigation('right');
                updateModalContent();
                updateModalNavButtons();
                const current = worldData.locations[worldData.currentLocationId];
                if (!current.imageUrl) closeModal();
            });
            document.getElementById('modal-nav-forward').addEventListener('click', () => {
                performNavigation('forward');
                updateModalContent();
                updateModalNavButtons();
                const current = worldData.locations[worldData.currentLocationId];
                if (!current.imageUrl) closeModal();
            });
            document.getElementById('modal-nav-back').addEventListener('click', () => {
                performNavigation('back');
                updateModalContent();
                updateModalNavButtons();
                const current = worldData.locations[worldData.currentLocationId];
                if (!current.imageUrl) closeModal();
            });
            
            // Тап по фото в модалке закрывает режим
            const modalImageContainer = document.getElementById('modal-image-container');
            modalImageContainer.addEventListener('click', () => closeModal());
            
            // Кнопка закрытия
            document.getElementById('modal-close-btn').addEventListener('click', () => closeModal());
            
            // Закрытие по Esc
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && document.getElementById('photo-modal').classList.contains('active')) {
                    closeModal();
                }
            });
        }
        
        function start() {
            initThree();
            bindEvents();
            loadFromLocalStorage();
            updateUI();
            renderCurrentPhotoOnSphere();
            updateButtonsColorByPhoto();
            
            document.querySelectorAll('button').forEach(btn => {
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    btn.click();
                });
            });
            
            showStatus("✨ Тап по фото для закрытия | Зелёные стрелки = в той локации есть фото");
        }
        
        start();
    </script>
</body>
</html>
