
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🎸 Тюнер: Гитара / Балалайка</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0b0f17;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 16px;
            color: #e0e0e0;
        }

        .tuner-container {
            width: 100%;
            max-width: 540px;
            background: #1e2434;
            border-radius: 48px;
            padding: 24px 20px 32px;
            box-shadow: 0 25px 40px -10px rgba(0, 0, 0, 0.6), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 20px;
            color: #b9c6e6;
        }

        .instrument-switch {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: #0f131f;
            padding: 8px;
            border-radius: 60px;
            border: 1px solid #2f3b5a;
        }

        .inst-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: #8e9ed4;
            font-size: 20px;
            font-weight: 600;
            padding: 12px 0;
            border-radius: 50px;
            transition: all 0.2s;
            cursor: pointer;
            touch-action: manipulation;
        }

        .inst-btn.active {
            background: #3b4c7c;
            color: white;
            box-shadow: 0 4px 10px #1f2b4a;
        }

        .instrument-sketch {
            background: #11161f;
            border-radius: 32px;
            padding: 16px 12px 12px 12px;
            margin-bottom: 20px;
            border: 1px solid #2f3f60;
            box-shadow: inset 0 0 8px #00000022, 0 6px 12px #00000040;
        }

        .sketch-title {
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 1px;
            color: #8d9fd1;
            margin-bottom: 10px;
        }

        .guitar-svg-container, .balalaika-svg-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        svg {
            width: 100%;
            max-width: 380px;
            height: auto;
            filter: drop-shadow(0 4px 6px #00000066);
        }

        .note-display {
            background: #0f131f;
            border-radius: 100px;
            padding: 16px 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 12px;
            border: 1px solid #2f3b5a;
        }

        .current-note {
            font-size: 74px;
            font-weight: 800;
            color: #d4e0ff;
            line-height: 1;
            min-width: 120px;
            text-align: center;
            text-shadow: 0 0 10px #6d8eff;
        }

        .note-octave {
            font-size: 26px;
            color: #8096cf;
            font-weight: 500;
        }

        .frequency-value {
            font-family: 'SF Mono', monospace;
            background: #00000033;
            padding: 6px 14px;
            border-radius: 60px;
            font-size: 20px;
            font-weight: 500;
            color: #b1c3ff;
            border: 1px solid #394565;
            text-align: center;
            margin-top: 8px;
        }

        .meter-section {
            background: #161c2b;
            border-radius: 60px;
            padding: 20px 12px;
            margin: 24px 0;
            border: 1px solid #2f3f60;
        }

        .deviation-label {
            display: flex;
            justify-content: space-between;
            font-size: 16px;
            font-weight: 500;
            color: #a2b1da;
            padding: 0 12px;
            margin-bottom: 8px;
        }

        .meter-bar-bg {
            background: #262e42;
            height: 42px;
            border-radius: 42px;
            overflow: hidden;
            border: 1px solid #31415f;
            box-shadow: inset 0 2px 6px #00000099;
            position: relative;
            margin: 12px 0 16px;
        }

        .meter-fill {
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, #4b6ef0, #a0b8ff);
            border-radius: 42px;
            box-shadow: 0 0 16px #3f6eff;
            transition: width 0.1s ease;
        }

        .cents-info {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: 600;
            padding: 0 10px;
            color: #ccd9ff;
        }

        .cents-value {
            background: #1f2740;
            padding: 6px 20px;
            border-radius: 60px;
            border: 1px solid #4d5f8a;
            font-family: monospace;
        }

        .string-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin: 20px 0 16px;
        }

        .string-btn {
            background: #252e44;
            border: 2px solid #3a4668;
            color: #b7c3ed;
            font-size: 19px;
            font-weight: 700;
            width: 68px;
            height: 68px;
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            line-height: 1.2;
            box-shadow: 0 6px 0 #0f1421;
            transition: all 0.06s;
            cursor: pointer;
            touch-action: manipulation;
            padding: 4px;
        }

        .string-btn small {
            font-size: 11px;
            font-weight: 400;
            color: #b1c0ee;
        }

        .string-btn.active {
            background: #3b4c7c;
            border-color: #90a9ff;
            color: white;
            transform: translateY(3px);
            box-shadow: 0 3px 0 #0f1421;
        }

        .status-text {
            text-align: center;
            font-size: 18px;
            padding: 8px;
            border-radius: 60px;
            background: #1b2337;
            margin-top: 16px;
            border: 1px solid #33415e;
            font-weight: 500;
        }

        .mic-controls {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }

        .mic-button {
            flex: 1;
            background: #2f3b60;
            border: none;
            color: white;
            font-size: 18px;
            padding: 16px 0;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 0 #121827;
            transition: 0.07s;
            touch-action: manipulation;
            text-align: center;
        }

        .mic-button:active {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #121827;
        }

        .mic-button.stop {
            background: #5f3f6b;
            box-shadow: 0 8px 0 #2a1933;
        }

        .mic-button:disabled {
            opacity: 0.5;
            transform: none;
            box-shadow: 0 8px 0 #121827;
            pointer-events: none;
        }

        .note-hint {
            font-size: 16px;
            color: #afc1ff;
            background: #00000033;
            border-radius: 30px;
            padding: 10px;
            margin-top: 18px;
            text-align: center;
        }

        footer {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: #5f6d92;
        }
    </style>
</head>
<body>
<div class="tuner-container">
    <h1>🎸 Тюнер</h1>

    <div class="instrument-switch" id="instrumentSwitch">
        <button class="inst-btn active" data-instr="guitar">🎸 Гитара</button>
        <button class="inst-btn" data-instr="balalaika">🪕 Балалайка</button>
    </div>

    <div class="instrument-sketch" id="instrumentSketch">
        <div class="sketch-title" id="sketchTitle">🎵 Схема струн</div>
        <div id="sketchContainer" class="guitar-svg-container"></div>
    </div>

    <div class="note-display">
        <span class="current-note" id="noteLabel">A</span>
        <span class="note-octave" id="octaveLabel">4</span>
    </div>

    <div class="frequency-value" id="freqDisplay">--- Hz</div>

    <div class="meter-section">
        <div class="deviation-label">
            <span>⬇️ ниже</span>
            <span>✅ норма</span>
            <span>выше ⬆️</span>
        </div>
        <div class="meter-bar-bg">
            <div class="meter-fill" id="meterFill" style="width: 50%;"></div>
        </div>
        <div class="cents-info">
            <span>отклонение</span>
            <span class="cents-value" id="centsValue">0</span>
        </div>
    </div>

    <div class="string-buttons" id="stringButtons"></div>

    <div class="status-text" id="statusMessage">🔴 Микрофон не активен</div>

    <div class="mic-controls">
        <button class="mic-button" id="micOnButton">🎤 Вкл</button>
        <button class="mic-button stop" id="micOffButton">⏹ Выкл</button>
    </div>

    <div class="note-hint" id="targetNoteInfo">
        Целевая нота: <span id="targetNoteSpan">A4 (440 Гц)</span>
    </div>

    <footer>🎶 Активная струна подсвечена на схеме</footer>
</div>

<script>
    (function() {
        // ГИТАРА: 1-я (тонкая, E4) снизу, 6-я (толстая, E2) сверху
        const GUITAR_STRINGS = [
            { name: 'E', octave: 4, freq: 329.63, label: '1-я (тонкая)' },
            { name: 'B', octave: 3, freq: 246.94, label: '2-я' },
            { name: 'G', octave: 3, freq: 196.00, label: '3-я' },
            { name: 'D', octave: 3, freq: 146.83, label: '4-я' },
            { name: 'A', octave: 2, freq: 110.00, label: '5-я' },
            { name: 'E', octave: 2, freq: 82.41,  label: '6-я (толстая)' }
        ];

        // БАЛАЛАЙКА: классическое расположение — 1-я (верхняя) сверху, 3-я (нижняя) снизу
        const BALALAIKA_STRINGS = [
            { name: 'E', octave: 4, freq: 329.63, label: '1-я (верхняя)' },
            { name: 'E', octave: 4, freq: 329.63, label: '2-я (средняя)' },
            { name: 'A', octave: 4, freq: 440.00, label: '3-я (нижняя)' }
        ];

        let currentStrings = [...GUITAR_STRINGS];
        let currentInstrument = 'guitar';
        let selectedStringIndex = 0;
        let targetFreq = currentStrings[selectedStringIndex].freq;

        // DOM
        const noteLabel = document.getElementById('noteLabel');
        const octaveLabel = document.getElementById('octaveLabel');
        const freqDisplay = document.getElementById('freqDisplay');
        const meterFill = document.getElementById('meterFill');
        const centsValue = document.getElementById('centsValue');
        const statusMessage = document.getElementById('statusMessage');
        const targetNoteSpan = document.getElementById('targetNoteSpan');
        const stringButtonsDiv = document.getElementById('stringButtons');
        const micOnButton = document.getElementById('micOnButton');
        const micOffButton = document.getElementById('micOffButton');
        const instButtons = document.querySelectorAll('.inst-btn');
        const sketchContainer = document.getElementById('sketchContainer');
        const sketchTitle = document.getElementById('sketchTitle');

        let audioContext = null;
        let analyser = null;
        let microphone = null;
        let mediaStream = null;
        let isMicActive = false;
        let animationFrame = null;

        // --- ГИТАРА: снизу вверх (1-я → 6-я) ---
        function drawGuitarSVG(activeIndex) {
            const stringsCount = 6;
            const startY = 195;   // снизу (1-я струна)
            const stepY = -28;     // поднимаемся к 6-й
            let svg = `<svg viewBox="0 0 340 230" xmlns="http://www.w3.org/2000/svg" style="background: #121826; border-radius: 24px;">`;
            svg += `<rect x="40" y="12" width="260" height="206" rx="18" fill="#2a2f3f" stroke="#5f6f94" stroke-width="1.5" />`;
            svg += `<rect x="48" y="18" width="244" height="194" rx="12" fill="none" stroke="#7e8eb0" stroke-width="1" />`;
            for (let i = 1; i <= 4; i++) {
                let fretX = 60 + i * 52;
                svg += `<line x1="${fretX}" y1="22" x2="${fretX}" y2="208" stroke="#bd9e6b" stroke-width="1.2" stroke-dasharray="3 3" />`;
            }
            for (let i = 0; i < stringsCount; i++) {
                const yPos = startY + i * stepY;
                const isActive = (i === activeIndex);
                const strokeColor = isActive ? '#FFB347' : '#a7bcff';
                const strokeWidth = isActive ? 3.8 : 1.8;
                svg += `<line x1="55" y1="${yPos}" x2="295" y2="${yPos}" stroke="${strokeColor}" stroke-width="${strokeWidth}" opacity="${isActive ? 1 : 0.7}" />`;
                const stringData = GUITAR_STRINGS[i];
                const noteText = `${stringData.name}${stringData.octave}`;
                svg += `<text x="30" y="${yPos+4}" font-size="10" fill="#cfdfff" font-weight="bold">${noteText}</text>`;
                svg += `<text x="${isActive ? 305 : 308}" y="${yPos+4}" font-size="9" fill="${isActive ? '#FFD966' : '#99aae0'}">${i+1}-я</text>`;
            }
            const activeY = startY + activeIndex * stepY;
            svg += `<rect x="42" y="${activeY - 6}" width="256" height="14" rx="6" fill="#ffc10720" stroke="none" />`;
            svg += `<text x="170" y="222" text-anchor="middle" font-size="10" fill="#bfceff">1-я (тонкая) — снизу &nbsp;&nbsp; 6-я (толстая) — сверху</text>`;
            svg += `</svg>`;
            return svg;
        }

        // --- БАЛАЛАЙКА: классический вид (1-я сверху, 3-я снизу) ---
        function drawBalalaikaSVG(activeIndex) {
            const stringsCount = 3;
            // Рисуем сверху вниз: 1-я (верхняя) → 3-я (нижняя)
            const startY = 45;    // верхняя струна (1-я)
            const stepY = 48;      // спускаемся вниз
            let svg = `<svg viewBox="0 0 340 210" xmlns="http://www.w3.org/2000/svg" style="background: #121826; border-radius: 24px;">`;
            svg += `<polygon points="170,180 80,40 260,40" fill="#2d3248" stroke="#7986aa" stroke-width="1.5" />`;
            svg += `<polygon points="170,172 95,48 245,48" fill="none" stroke="#a2b0d4" stroke-width="1" />`;
            svg += `<rect x="152" y="18" width="36" height="38" fill="#2d3248" stroke="#c2a15b" stroke-width="1.2" />`;
            svg += `<line x1="170" y1="22" x2="170" y2="56" stroke="#c2a15b" stroke-width="1.5" />`;
            
            for (let i = 0; i < stringsCount; i++) {
                const yPos = startY + i * stepY;
                const isActive = (i === activeIndex);
                const strokeColor = isActive ? '#FFB347' : '#acc4ff';
                const strokeWidth = isActive ? 4 : 2;
                svg += `<line x1="88" y1="${yPos}" x2="280" y2="${yPos}" stroke="${strokeColor}" stroke-width="${strokeWidth}" opacity="${isActive ? 1 : 0.8}" />`;
                const stringData = BALALAIKA_STRINGS[i];
                const noteText = `${stringData.name}${stringData.octave}`;
                svg += `<text x="62" y="${yPos+4}" font-size="11" fill="#e4ecff" font-weight="bold">${noteText}</text>`;
                svg += `<text x="${isActive ? 292 : 288}" y="${yPos+4}" font-size="9" fill="${isActive ? '#FFD966' : '#b7c6ff'}">${i+1}-я</text>`;
            }
            const activeY = startY + activeIndex * stepY;
            svg += `<rect x="78" y="${activeY - 6}" width="215" height="14" rx="5" fill="#ffbf4040" stroke="none" />`;
            svg += `<text x="170" y="200" text-anchor="middle" font-size="10" fill="#bfceff">1-я (верхняя) — 3-я (нижняя)</text>`;
            svg += `</svg>`;
            return svg;
        }

        function updateInstrumentSketch() {
            if (currentInstrument === 'guitar') {
                sketchTitle.innerText = '🎸 Гитара: 1-я струна (тонкая) снизу, 6-я (толстая) сверху';
                sketchContainer.innerHTML = drawGuitarSVG(selectedStringIndex);
            } else {
                sketchTitle.innerText = '🪕 Балалайка: 1-я (верхняя) сверху, 3-я (нижняя) снизу';
                sketchContainer.innerHTML = drawBalalaikaSVG(selectedStringIndex);
            }
        }

        function renderStringButtons() {
            stringButtonsDiv.innerHTML = '';
            currentStrings.forEach((string, idx) => {
                const btn = document.createElement('button');
                btn.className = 'string-btn' + (idx === selectedStringIndex ? ' active' : '');
                btn.innerHTML = `${string.name}${string.octave}<small>${string.label}</small>`;
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.string-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    selectedStringIndex = idx;
                    targetFreq = currentStrings[idx].freq;
                    updateTargetInfo();
                    updateInstrumentSketch();
                });
                stringButtonsDiv.appendChild(btn);
            });
        }

        function updateTargetInfo() {
            const s = currentStrings[selectedStringIndex];
            targetNoteSpan.innerText = `${s.name}${s.octave} (${s.freq.toFixed(1)} Гц)`;
        }

        instButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                instButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentInstrument = btn.dataset.instr;
                if (currentInstrument === 'guitar') {
                    currentStrings = [...GUITAR_STRINGS];
                } else {
                    currentStrings = [...BALALAIKA_STRINGS];
                }
                selectedStringIndex = 0;
                targetFreq = currentStrings[0].freq;
                renderStringButtons();
                updateTargetInfo();
                updateInstrumentSketch();
            });
        });

        // --- Аудио ---
        function getPitchFromBuffer(buffer, sampleRate) {
            if (buffer.length < 100) return -1;
            let maxOffset = Math.floor(sampleRate / 65);
            let minOffset = Math.floor(sampleRate / 1000);
            if (maxOffset > buffer.length/2) maxOffset = buffer.length/2;
            let bestOffset = -1, bestDiff = Infinity;
            for (let offset = minOffset; offset < maxOffset; offset++) {
                let diff = 0, count = 0;
                for (let i = 0; i + offset < buffer.length; i+=2) {
                    diff += Math.abs(buffer[i] - buffer[i+offset]);
                    count++;
                }
                if (count) diff /= count;
                if (diff < bestDiff) { bestDiff = diff; bestOffset = offset; }
            }
            if (bestOffset === -1) return -1;
            let freq = sampleRate / bestOffset;
            if (freq < 70 && freq > 40) freq *= 2;
            return freq;
        }

        function getNoteNameFromFreq(freq) {
            if (freq <= 0) return null;
            const noteNames = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
            let number = 12 * Math.log2(freq / 440) + 69;
            let midiNote = Math.round(number);
            let octave = Math.floor(midiNote / 12) - 1;
            return { name: noteNames[midiNote % 12], octave };
        }

        function updatePitch() {
            if (!analyser || !isMicActive) { animationFrame = null; return; }
            const buffer = new Float32Array(analyser.fftSize);
            analyser.getFloatTimeDomainData(buffer);
            const pitch = getPitchFromBuffer(buffer, audioContext.sampleRate);
            if (pitch > 0 && pitch < 800) {
                freqDisplay.innerText = pitch.toFixed(1) + ' Hz';
                const det = getNoteNameFromFreq(pitch);
                if (det) { noteLabel.innerText = det.name; octaveLabel.innerText = det.octave; }
                let cents = 1200 * Math.log2(pitch / targetFreq);
                if (!isFinite(cents)) cents = 0;
                let fill = Math.min(100, Math.max(0, ((Math.min(50, Math.max(-50, cents)) + 50) / 100) * 100));
                meterFill.style.width = fill + '%';
                centsValue.innerText = (cents > 0 ? '+' : '') + cents.toFixed(1) + ' ¢';
                if (Math.abs(cents) < 5) { meterFill.style.background = 'linear-gradient(90deg, #28c76f, #7cff9f)'; statusMessage.innerText = '✅ Точно!'; }
                else if (cents > 5) { meterFill.style.background = 'linear-gradient(90deg, #f09b4a, #ffc896)'; statusMessage.innerText = '⬆️ Высоковато'; }
                else { meterFill.style.background = 'linear-gradient(90deg, #4a9bf0, #96ccff)'; statusMessage.innerText = '⬇️ Низковато'; }
            } else { freqDisplay.innerText = '--- Hz'; meterFill.style.width = '50%'; centsValue.innerText = '0'; statusMessage.innerText = '🔊 Извлеките звук'; }
            animationFrame = requestAnimationFrame(updatePitch);
        }

        async function enableMicrophone() {
            if (isMicActive) return;
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
                await audioContext.resume();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 2048;
                microphone = audioContext.createMediaStreamSource(mediaStream);
                microphone.connect(analyser);
                isMicActive = true;
                statusMessage.innerText = '🎤 Микрофон активен';
                micOnButton.disabled = true;
                micOffButton.disabled = false;
                if (animationFrame) cancelAnimationFrame(animationFrame);
                updatePitch();
            } catch { statusMessage.innerText = '❌ Нет доступа к микрофону'; isMicActive = false; }
        }

        function disableMicrophone() {
            if (!isMicActive) return;
            mediaStream?.getTracks().forEach(t => t.stop());
            microphone?.disconnect();
            analyser = null;
            audioContext?.suspend();
            isMicActive = false;
            statusMessage.innerText = '🔴 Микрофон отключён';
            freqDisplay.innerText = '--- Hz';
            meterFill.style.width = '50%';
            centsValue.innerText = '0';
            noteLabel.innerText = 'A'; octaveLabel.innerText = '4';
            micOnButton.disabled = false;
            micOffButton.disabled = true;
            if (animationFrame) cancelAnimationFrame(animationFrame);
            animationFrame = null;
        }

        micOnButton.addEventListener('click', enableMicrophone);
        micOffButton.addEventListener('click', disableMicrophone);
        window.addEventListener('pagehide', () => disableMicrophone());
        document.addEventListener('touchstart', () => audioContext?.resume());
        micOffButton.disabled = true;

        renderStringButtons();
        updateTargetInfo();
        updateInstrumentSketch();
    })();
</script>
</body>
</html>
