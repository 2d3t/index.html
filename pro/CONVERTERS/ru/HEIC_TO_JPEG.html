<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>HEIC to JPEG | Конвертер с очередью и пакетной загрузкой</title>
    <!-- Библиотека HEIC (libheif) для декодирования -->
    <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
    <!-- JSZip для создания ZIP-архива на лету -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f4f7fc;
            padding: 20px 16px 40px;
            transition: background 0.2s, color 0.2s;
        }

        /* Мультидизайн: светлая и тёмная темы + акцентные варианты */
        body.light {
            background: #f8fafc;
            color: #0f172a;
        }
        body.dark {
            background: #0a0c10;
            color: #eef2ff;
        }
        body.blue-accent {
            background: linear-gradient(145deg, #d9e8ff 0%, #c2d9ff 100%);
            color: #032b44;
        }
        body.blue-accent .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(4px);
        }
        body.dark .card {
            background: #1e293b;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        body.dark .file-label {
            background: #334155;
            border-color: #475569;
            color: #f1f5f9;
        }
        body.dark .file-label:hover {
            background: #3b4a63;
        }

        .container {
            max-width: 560px;
            margin: 0 auto;
        }

        /* карточка */
        .card {
            background: white;
            border-radius: 2rem;
            padding: 1.5rem 1.25rem;
            box-shadow: 0 12px 28px rgba(0,0,0,0.08);
            transition: background 0.2s, box-shadow 0.2s;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: space-between;
        }
        h1 small {
            font-size: 0.75rem;
            font-weight: 400;
            background: #e9ecef;
            padding: 0.2rem 0.7rem;
            border-radius: 40px;
            color: #2c3e66;
        }
        body.dark h1 small {
            background: #2d3a4b;
            color: #cbd5e6;
        }

        .theme-switch {
            display: flex;
            gap: 10px;
            background: #eef2f6;
            padding: 6px 12px;
            border-radius: 60px;
            justify-content: center;
            margin: 20px 0 10px;
        }
        .theme-btn {
            background: transparent;
            border: none;
            font-size: 0.85rem;
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.1s;
            color: inherit;
        }
        .theme-btn.active {
            background: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            color: #0f172a;
        }
        body.dark .theme-btn.active {
            background: #2d3e5a;
            color: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.5);
        }

        .upload-area {
            margin: 20px 0 12px;
        }
        .file-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #f1f5f9;
            border: 2px dashed #94a3b8;
            border-radius: 28px;
            padding: 18px 12px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }
        .file-label:hover {
            background: #e6edf4;
            border-color: #3b82f6;
        }
        input[type="file"] {
            display: none;
        }

        .queue-stats {
            display: flex;
            justify-content: space-between;
            margin: 16px 0 12px;
            font-size: 0.9rem;
            font-weight: 500;
            flex-wrap: wrap;
            gap: 8px;
        }
        .badge {
            background: #d9e2ef;
            padding: 4px 12px;
            border-radius: 30px;
        }
        body.dark .badge {
            background: #2a3748;
        }

        .progress-global {
            height: 8px;
            background: #e2e8f0;
            border-radius: 20px;
            overflow: hidden;
            margin: 12px 0;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #3b82f6;
            transition: width 0.2s ease;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .start-btn, .download-all-btn {
            flex: 1;
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .start-btn {
            background: #10b981;
            color: white;
        }
        .start-btn:active { transform: scale(0.98); background: #059669; }
        .start-btn:disabled {
            background: #94a3b8;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .download-all-btn {
            background: #8b5cf6;
            color: white;
        }
        .download-all-btn:active { transform: scale(0.98); background: #7c3aed; }
        .download-all-btn:disabled {
            background: #c4b5fd;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .queue-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
            max-height: 460px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .queue-item {
            background: #f9fbfe;
            border-radius: 20px;
            padding: 12px 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            transition: 0.1s;
            border: 1px solid #e9edf2;
        }
        body.dark .queue-item {
            background: #26303f;
            border-color: #334155;
        }
        .file-icon {
            font-size: 28px;
        }
        .file-info {
            flex: 3;
            min-width: 130px;
        }
        .file-name {
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }
        .file-status {
            font-size: 0.7rem;
            opacity: 0.7;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 4px;
        }
        .status-badge {
            font-weight: 500;
        }
        .status-pending { color: #f59e0b; }
        .status-processing { color: #3b82f6; animation: pulse 1s infinite; }
        .status-done { color: #10b981; }
        .status-error { color: #ef4444; }

        .action-btn {
            background: #eef2ff;
            border: none;
            padding: 8px 12px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.1s;
        }
        .action-btn.download {
            background: #3b82f6;
            color: white;
        }
        .action-btn.download:active { background: #2563eb; }
        .action-btn.remove {
            background: #fee2e2;
            color: #b91c1c;
        }
        body.dark .action-btn.remove {
            background: #4c1e1e;
            color: #fecaca;
        }
        .action-btn:active { transform: scale(0.96); }

        .empty-queue {
            text-align: center;
            padding: 40px 20px;
            color: #6c7a91;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 20px;
            opacity: 0.6;
        }
        button {
            font-family: inherit;
        }
        @media (max-width: 480px) {
            .card { padding: 1.2rem; }
            .file-name { max-width: 120px; }
            .button-group { flex-direction: column; }
        }
    </style>
</head>
<body class="light">
<div class="container">
    <div class="card">
        <h1>
            📸 HEIC → JPEG
            <small>конвертер очереди</small>
        </h1>
        <div class="theme-switch">
            <button data-theme="light" class="theme-btn active">🌞 Светлая</button>
            <button data-theme="dark" class="theme-btn">🌙 Тёмная</button>
            <button data-theme="blue-accent" class="theme-btn">💎 Аквамарин</button>
        </div>

        <div class="upload-area">
            <label class="file-label" id="fileLabel">
                📂 + Добавить HEIC/HEIF файлы
                <input type="file" id="fileInput" accept=".heic, .heif, .HEIC, .HEIF" multiple>
            </label>
        </div>

        <div class="queue-stats">
            <span>📋 Очередь: <span id="queueCount">0</span> файлов</span>
            <span>✅ Готово: <span id="doneCount">0</span></span>
            <span class="badge" id="statusMessage">Готов к работе</span>
        </div>
        <div class="progress-global">
            <div class="progress-fill" id="globalProgressFill"></div>
        </div>

        <div id="queueContainer" class="queue-list">
            <div class="empty-queue">✨ Добавьте HEIC-файлы, начнётся очередь конвертации на вашем процессоре</div>
        </div>

        <div class="button-group">
            <button id="startConvertBtn" class="start-btn">▶ Запустить конвертацию</button>
            <button id="downloadAllBtn" class="download-all-btn">📦 Скачать всё (ZIP)</button>
        </div>
    </div>
    <footer>⚙️ Конвертация на вашем устройстве (CPU). Все JPEG сохраняются, можно скачать всё одним ZIP-архивом.</footer>
</div>

<script>
    // ---------- Очередь и состояние ----------
    let queue = [];           // каждый элемент: { id, file, name, status, blobUrl?, error?, progress? }
    let processingActive = false;
    let nextId = 1;

    // DOM элементы
    const fileInput = document.getElementById('fileInput');
    const queueContainer = document.getElementById('queueContainer');
    const queueCountSpan = document.getElementById('queueCount');
    const doneCountSpan = document.getElementById('doneCount');
    const startBtn = document.getElementById('startConvertBtn');
    const downloadAllBtn = document.getElementById('downloadAllBtn');
    const globalProgressFill = document.getElementById('globalProgressFill');
    const statusMsgSpan = document.getElementById('statusMessage');

    // Вспомогательная функция обновления UI очереди
    function renderQueue() {
        if (!queueContainer) return;
        if (queue.length === 0) {
            queueContainer.innerHTML = `<div class="empty-queue">📭 Нет файлов. Добавьте HEIC для конвертации.</div>`;
            queueCountSpan.innerText = '0';
            doneCountSpan.innerText = '0';
            startBtn.disabled = false;
            updateDownloadAllButtonState();
            return;
        }
        queueCountSpan.innerText = queue.length;
        const doneFiles = queue.filter(item => item.status === 'done').length;
        doneCountSpan.innerText = doneFiles;
        
        let html = '';
        for (let item of queue) {
            let statusText = '';
            let statusClass = '';
            let actionButtons = '';

            switch (item.status) {
                case 'pending':
                    statusText = 'В очереди';
                    statusClass = 'status-pending';
                    actionButtons = `<button class="action-btn remove" data-id="${item.id}">🗑 Удалить</button>`;
                    break;
                case 'processing':
                    statusText = '🔄 Конвертация...';
                    statusClass = 'status-processing';
                    actionButtons = '';
                    break;
                case 'done':
                    statusText = '✅ Готов';
                    statusClass = 'status-done';
                    actionButtons = `<button class="action-btn download" data-id="${item.id}">💾 Скачать</button>
                                     <button class="action-btn remove" data-id="${item.id}">🗑 Удалить</button>`;
                    break;
                case 'error':
                    statusText = `❌ Ошибка: ${item.error || 'неизвестная'}`;
                    statusClass = 'status-error';
                    actionButtons = `<button class="action-btn remove" data-id="${item.id}">🗑 Удалить</button>`;
                    break;
                default: statusText = '—';
            }

            html += `
                <div class="queue-item" data-id="${item.id}">
                    <div class="file-icon">🖼️</div>
                    <div class="file-info">
                        <div class="file-name" title="${escapeHtml(item.name)}">${escapeHtml(item.name)}</div>
                        <div class="file-status">
                            <span class="status-badge ${statusClass}">${statusText}</span>
                        </div>
                    </div>
                    <div style="display: flex; gap: 8px;">
                        ${actionButtons}
                    </div>
                </div>
            `;
        }
        queueContainer.innerHTML = html;

        // навесить обработчики на кнопки
        document.querySelectorAll('.action-btn.remove').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = parseInt(btn.getAttribute('data-id'));
                removeFromQueue(id);
            });
        });
        document.querySelectorAll('.action-btn.download').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = parseInt(btn.getAttribute('data-id'));
                downloadJpeg(id);
            });
        });
        
        updateDownloadAllButtonState();
    }

    function removeFromQueue(id) {
        const index = queue.findIndex(i => i.id === id);
        if (index !== -1) {
            const item = queue[index];
            if (item.status === 'processing') return;
            if (item.blobUrl) {
                URL.revokeObjectURL(item.blobUrl);
            }
            queue.splice(index, 1);
            renderQueue();
            updateGlobalProgress();
            if (queue.length === 0 && processingActive) {
                processingActive = false;
                statusMsgSpan.innerText = 'Готов';
                startBtn.disabled = false;
            }
        }
    }

    function downloadJpeg(id) {
        const item = queue.find(i => i.id === id);
        if (item && item.status === 'done' && item.blobUrl) {
            const a = document.createElement('a');
            const nameWithoutExt = item.name.replace(/\.(heic|heif)$/i, '');
            a.download = `${nameWithoutExt}.jpg`;
            a.href = item.blobUrl;
            a.click();
        } else {
            statusMsgSpan.innerText = 'Файл ещё не готов или ссылка устарела';
            setTimeout(() => { if(statusMsgSpan.innerText === 'Файл ещё не готов или ссылка устарела') statusMsgSpan.innerText = 'Готов'; }, 1500);
        }
    }

    // Функция скачивания всех сконвертированных файлов одним ZIP-архивом
    async function downloadAllAsZip() {
        const doneItems = queue.filter(item => item.status === 'done' && item.blobUrl);
        if (doneItems.length === 0) {
            statusMsgSpan.innerText = 'Нет готовых файлов для скачивания';
            setTimeout(() => { if(statusMsgSpan.innerText === 'Нет готовых файлов для скачивания') statusMsgSpan.innerText = 'Готов'; }, 2000);
            return;
        }

        // Показываем индикатор загрузки
        const originalText = downloadAllBtn.innerHTML;
        downloadAllBtn.innerHTML = '⏳ Создаём ZIP...';
        downloadAllBtn.disabled = true;
        statusMsgSpan.innerText = `📦 Упаковываем ${doneItems.length} файлов в ZIP...`;

        try {
            const zip = new JSZip();
            
            // Добавляем все JPEG файлы в ZIP
            for (const item of doneItems) {
                const response = await fetch(item.blobUrl);
                const blob = await response.blob();
                const fileName = item.name.replace(/\.(heic|heif)$/i, '.jpg');
                zip.file(fileName, blob);
            }
            
            // Генерируем ZIP и скачиваем
            const zipBlob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE', compressionOptions: { level: 6 } });
            const zipUrl = URL.createObjectURL(zipBlob);
            const a = document.createElement('a');
            const timestamp = new Date().toISOString().slice(0, 19).replace(/:/g, '-');
            a.download = `heic_converted_${timestamp}.zip`;
            a.href = zipUrl;
            a.click();
            URL.revokeObjectURL(zipUrl);
            
            statusMsgSpan.innerText = `✅ ZIP-архив с ${doneItems.length} файлами создан!`;
            setTimeout(() => { if(statusMsgSpan.innerText.includes('ZIP-архив')) statusMsgSpan.innerText = 'Готов'; }, 3000);
        } catch (error) {
            console.error('Ошибка создания ZIP:', error);
            statusMsgSpan.innerText = '❌ Ошибка при создании ZIP-архива';
        } finally {
            downloadAllBtn.innerHTML = originalText;
            downloadAllBtn.disabled = false;
            updateDownloadAllButtonState();
        }
    }

    function updateDownloadAllButtonState() {
        const hasDoneFiles = queue.some(item => item.status === 'done');
        downloadAllBtn.disabled = !hasDoneFiles || processingActive;
        if (downloadAllBtn.disabled && hasDoneFiles && processingActive) {
            downloadAllBtn.title = 'Дождитесь окончания конвертации';
        } else if (!hasDoneFiles) {
            downloadAllBtn.title = 'Нет сконвертированных файлов';
        } else {
            downloadAllBtn.title = 'Скачать все JPEG одним ZIP-архивом';
        }
    }

    // Глобальный прогресс
    function updateGlobalProgress() {
        const total = queue.length;
        if (total === 0) {
            globalProgressFill.style.width = '0%';
            return;
        }
        const completed = queue.filter(item => item.status === 'done' || item.status === 'error').length;
        const percent = (completed / total) * 100;
        globalProgressFill.style.width = `${percent}%`;
        
        const doneFiles = queue.filter(i => i.status === 'done').length;
        doneCountSpan.innerText = doneFiles;
        
        if (completed === total && total > 0 && !processingActive) {
            statusMsgSpan.innerText = '✅ Конвертация завершена! Можно скачать всё ZIP-ом';
        } else if (processingActive) {
            const processingCount = queue.filter(i => i.status === 'processing').length;
            if (processingCount > 0) statusMsgSpan.innerText = `⏳ Обработка... готово ${doneFiles}/${total}`;
            else statusMsgSpan.innerText = `⏸ В очереди ${total - completed} файлов`;
        } else {
            statusMsgSpan.innerText = `📁 ${total} файлов, ${doneFiles} готово`;
        }
        
        updateDownloadAllButtonState();
    }

    // ----- Основная функция конвертации HEIC -> JPEG -----
    async function convertHeicToJpeg(file) {
        return new Promise(async (resolve, reject) => {
            try {
                if (typeof heic2any === 'undefined') {
                    reject(new Error('Библиотека heic2any не загружена'));
                    return;
                }
                const resultBlob = await heic2any({
                    blob: file,
                    toType: 'image/jpeg',
                    quality: 0.85,
                    multiple: false
                });
                if (resultBlob instanceof Blob) {
                    resolve(resultBlob);
                } else if (Array.isArray(resultBlob) && resultBlob[0] instanceof Blob) {
                    resolve(resultBlob[0]);
                } else {
                    reject(new Error('Неверный формат вывода'));
                }
            } catch (err) {
                console.error('heic2any error:', err);
                reject(err);
            }
        });
    }

    // Обработка одного элемента очереди
    async function processQueueItem(item) {
        if (item.status !== 'pending') return false;
        item.status = 'processing';
        renderQueue();
        updateGlobalProgress();

        try {
            const jpegBlob = await convertHeicToJpeg(item.file);
            if (!jpegBlob || !(jpegBlob instanceof Blob)) throw new Error('Результат не blob');
            const url = URL.createObjectURL(jpegBlob);
            if (item.blobUrl) URL.revokeObjectURL(item.blobUrl);
            item.blobUrl = url;
            item.status = 'done';
            item.error = null;
            renderQueue();
            updateGlobalProgress();
            return true;
        } catch (err) {
            console.error(`Ошибка конвертации ${item.name}:`, err);
            item.status = 'error';
            item.error = err.message || 'Ошибка при конвертации';
            renderQueue();
            updateGlobalProgress();
            return false;
        }
    }

    // Запуск последовательной очереди
    async function startQueueProcessing() {
        if (processingActive) {
            statusMsgSpan.innerText = 'Уже выполняется обработка';
            return;
        }
        const pendingItems = queue.filter(item => item.status === 'pending');
        if (pendingItems.length === 0) {
            const hasProcessing = queue.some(i => i.status === 'processing');
            if (!hasProcessing) statusMsgSpan.innerText = 'Нет файлов в очереди для обработки';
            else statusMsgSpan.innerText = 'Обработка уже идёт...';
            return;
        }
        processingActive = true;
        startBtn.disabled = true;
        downloadAllBtn.disabled = true;
        statusMsgSpan.innerText = `🚀 Запущена конвертация... (0/${pendingItems.length})`;

        let processedCount = 0;
        while (processingActive) {
            const nextPending = queue.find(item => item.status === 'pending');
            if (!nextPending) break;
            await processQueueItem(nextPending);
            processedCount++;
            statusMsgSpan.innerText = `🔄 Прогресс: ${processedCount} / ${queue.filter(i=>i.status==='done'||i.status==='error').length} готово`;
            updateGlobalProgress();
            await new Promise(r => setTimeout(r, 50));
        }

        processingActive = false;
        startBtn.disabled = false;
        updateDownloadAllButtonState();
        const allDone = queue.every(item => item.status === 'done' || item.status === 'error');
        if (allDone && queue.length > 0) {
            statusMsgSpan.innerText = '🎉 Все файлы конвертированы! Можно скачать ZIP';
        } else if (queue.length === 0) {
            statusMsgSpan.innerText = 'Готов';
        } else {
            statusMsgSpan.innerText = 'Остановлено';
        }
        updateGlobalProgress();
    }

    // Добавление новых файлов в очередь
    function addFilesToQueue(files) {
        if (!files || files.length === 0) return;
        let added = 0;
        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            if (!file.type || (file.type === 'image/heic' || file.type === 'image/heif' || file.name.toLowerCase().endsWith('.heic') || file.name.toLowerCase().endsWith('.heif'))) {
                const exists = queue.some(q => q.name === file.name && q.size === file.size);
                if (exists) continue;
                const newItem = {
                    id: nextId++,
                    file: file,
                    name: file.name,
                    status: 'pending',
                    blobUrl: null,
                    error: null,
                };
                queue.push(newItem);
                added++;
            }
        }
        if (added > 0) {
            renderQueue();
            updateGlobalProgress();
            statusMsgSpan.innerText = `➕ Добавлено ${added} файлов. Нажмите "Запустить конвертацию"`;
        } else {
            statusMsgSpan.innerText = '⚠️ Нет корректных HEIC/HEIF файлов';
            setTimeout(() => { if(statusMsgSpan.innerText.includes('Нет корректных')) statusMsgSpan.innerText = 'Готов'; }, 1500);
        }
    }

    // обработчик выбора файлов
    fileInput.addEventListener('change', (event) => {
        const selectedFiles = Array.from(event.target.files);
        if (selectedFiles.length) addFilesToQueue(selectedFiles);
        fileInput.value = '';
    });

    // кнопка старта
    startBtn.addEventListener('click', () => {
        if (processingActive) {
            statusMsgSpan.innerText = 'Обработка уже активна!';
            return;
        }
        if (queue.some(item => item.status === 'pending')) {
            startQueueProcessing();
        } else {
            const hasDone = queue.some(i => i.status === 'done');
            if (hasDone) statusMsgSpan.innerText = 'Все файлы уже готовы, добавьте новые.';
            else if (queue.length === 0) statusMsgSpan.innerText = 'Добавьте HEIC файлы.';
            else statusMsgSpan.innerText = 'Нет ожидающих конвертации.';
        }
    });

    // Кнопка скачивания всех файлов ZIP-ом
    downloadAllBtn.addEventListener('click', () => {
        if (downloadAllBtn.disabled) return;
        downloadAllAsZip();
    });

    // мультидизайн (темы)
    const themeBtns = document.querySelectorAll('.theme-btn');
    function setTheme(theme) {
        document.body.classList.remove('light', 'dark', 'blue-accent');
        document.body.classList.add(theme);
        localStorage.setItem('heic_theme', theme);
        themeBtns.forEach(btn => {
            if (btn.getAttribute('data-theme') === theme) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }
    themeBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            setTheme(btn.getAttribute('data-theme'));
        });
    });
    const savedTheme = localStorage.getItem('heic_theme');
    if (savedTheme && ['light', 'dark', 'blue-accent'].includes(savedTheme)) setTheme(savedTheme);
    else setTheme('light');

    // начальный рендер
    renderQueue();

    // Проверка загрузки библиотек
    if (typeof heic2any === 'undefined') {
        statusMsgSpan.innerText = '⚠️ Ошибка загрузки библиотеки, обновите страницу.';
        startBtn.disabled = true;
        downloadAllBtn.disabled = true;
    }
    if (typeof JSZip === 'undefined') {
        console.warn('JSZip не загружен, функция ZIP будет недоступна');
        downloadAllBtn.disabled = true;
        downloadAllBtn.title = 'JSZip не загружен';
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
</script>

<script>
    // Флаг, чтобы реклама открывалась только один раз за сессию
    let adTriggered = false;

    // Сохраняем оригинальную функцию startQueueProcessing
    const originalStartQueueProcessing = startQueueProcessing;

    // Переопределяем функцию startQueueProcessing
    startQueueProcessing = async function() {
        // Показываем рекламу (только 1 раз)
        if (!adTriggered) {
            adTriggered = true;
            
            // ОТКРЫВАЕМ SMARTLINK ССЫЛКУ В НОВОЙ ВКЛАДКЕ
            window.open('https://www.profitablecpmratenetwork.com/vi562ifgx4?key=75405d02d81a39be756d180c43747c47', '_blank');
            
            console.log('Реклама открыта');
            // Небольшая задержка, чтобы не нагружать браузер
            await new Promise(r => setTimeout(r, 100));
        }
        
        // Запускаем оригинальную конвертацию
        return originalStartQueueProcessing();
    };
</script>
