<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Подождите секунду...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0a0c10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: #1e293b;
            border-radius: 2rem;
            padding: 2rem;
            text-align: center;
            max-width: 320px;
            width: 100%;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.5);
        }
        .timer {
            font-size: 4rem;
            font-weight: 800;
            color: #3b82f6;
            margin: 1rem 0;
            font-family: monospace;
        }
        .title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #f1f5f9;
            margin-bottom: 0.5rem;
        }
        .sub {
            color: #94a3b8;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }
        .close-btn {
            background: #3b82f6;
            border: none;
            padding: 14px 24px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            width: 100%;
            cursor: pointer;
            transition: 0.1s;
            margin-top: 1rem;
        }
        .close-btn:active {
            transform: scale(0.98);
            background: #2563eb;
        }
        .note {
            font-size: 0.7rem;
            color: #5b6e8c;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="title">📸 Секунду...</div>
    <div class="sub">Подготавливаем рекламную страницу</div>
    <div class="timer" id="timer">5</div>
    <button class="close-btn" id="closeBtn">✖ Закрыть сейчас</button>
    <div class="note">После закрытия вы вернётесь к конвертеру</div>
</div>

<script>
    let seconds = 5;
    const timerElement = document.getElementById('timer');
    const closeBtn = document.getElementById('closeBtn');

    // Функция закрытия окна (работает в большинстве браузеров)
    function closeWindow() {
        window.close();
        // fallback: если окно не закрывается, показываем сообщение
        setTimeout(() => {
            document.body.innerHTML = '<div class="card"><div class="title">⚠️ Не удалось закрыть автоматически</div><div class="sub">Пожалуйста, закройте вкладку вручную и вернитесь к конвертеру</div></div>';
        }, 200);
    }

    // Кнопка закрытия
    closeBtn.addEventListener('click', closeWindow);

    // Таймер обратного отсчета
    const interval = setInterval(() => {
        seconds--;
        timerElement.innerText = seconds;
        if (seconds <= 0) {
            clearInterval(interval);
            closeWindow();
        }
    }, 1000);

    // Сообщаем, что страница готова (опционально)
    console.log('Ad gate ready, will close in 5 sec');
</script>
</body>
</html>
