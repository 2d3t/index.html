<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Подождите секунду...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0a0c10;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #1e293b;
            padding: 12px 16px;
            text-align: center;
            border-bottom: 1px solid #334155;
            flex-shrink: 0;
        }
        .timer-box {
            display: inline-block;
            background: #3b82f6;
            color: white;
            font-weight: bold;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 1.2rem;
        }
        .close-btn {
            background: #ef4444;
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: bold;
            color: white;
            margin-left: 12px;
            cursor: pointer;
        }
        .close-btn:active {
            transform: scale(0.96);
        }
        .iframe-container {
            flex: 1;
            background: white;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .note {
            background: #0f172a;
            color: #94a3b8;
            text-align: center;
            padding: 6px;
            font-size: 0.7rem;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
<div class="header">
    <span class="timer-box" id="timer">10</span>
    <button class="close-btn" id="closeBtn">✖ Закрыть сейчас</button>
</div>
<div class="iframe-container">
    <iframe id="adIframe" src="about:blank"></iframe>
</div>
<div class="note">
    🔄 Страница закроется автоматически через <span id="secLabel">10</span> секунд<br>
    Вы вернетесь к конвертеру
</div>

<script>
    // Функция закрытия вкладки
    function closeTab() {
        window.close();
        // fallback
        setTimeout(() => {
            document.body.innerHTML = '<div style="text-align:center; padding:50px; color:white; background:#0a0c10; height:100vh;">⚠️ Не удалось закрыть автоматически. Пожалуйста, закройте вкладку вручную.</div>';
        }, 200);
    }

    // Загружаем Smartlink в iframe
    const smartlinkUrl = 'https://www.profitablecpmratenetwork.com/vi562ifgx4?key=75405d02d81a39be756d180c43747c47';
    const iframe = document.getElementById('adIframe');
    iframe.src = smartlinkUrl;

    // Таймер 10 секунд
    let seconds = 10;
    const timerElement = document.getElementById('timer');
    const secLabel = document.getElementById('secLabel');
    const closeBtn = document.getElementById('closeBtn');

    const interval = setInterval(() => {
        seconds--;
        timerElement.innerText = seconds;
        secLabel.innerText = seconds;
        
        if (seconds <= 0) {
            clearInterval(interval);
            closeTab();
        }
    }, 1000);

    // Кнопка закрытия (для тех, кто хочет быстрее)
    closeBtn.addEventListener('click', () => {
        clearInterval(interval);
        closeTab();
    });
</script>
</body>
</html>
