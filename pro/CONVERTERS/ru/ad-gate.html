<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Подождите секунду...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0a0c10;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #1e293b;
            padding: 12px 16px;
            text-align: center;
            border-bottom: 1px solid #334155;
            flex-shrink: 0;
        }
        .timer-box {
            display: inline-block;
            background: #3b82f6;
            color: white;
            font-weight: bold;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 1.2rem;
            font-family: monospace;
        }
        .close-btn {
            background: #ef4444;
            border: none;
            padding: 6px 20px;
            border-radius: 40px;
            font-weight: bold;
            color: white;
            margin-left: 12px;
            cursor: not-allowed;
            opacity: 0.5;
            transition: 0.1s;
        }
        .close-btn.active {
            cursor: pointer;
            opacity: 1;
        }
        .close-btn.active:active {
            transform: scale(0.96);
        }
        .iframe-container {
            flex: 1;
            background: white;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .note {
            background: #0f172a;
            color: #94a3b8;
            text-align: center;
            padding: 8px;
            font-size: 0.75rem;
            flex-shrink: 0;
        }
        .note strong {
            color: #3b82f6;
        }
    </style>
</head>
<body>
<div class="header">
    <span class="timer-box" id="timer">10</span>
    <button class="close-btn" id="closeBtn" disabled>✖ Закрыть</button>
</div>
<div class="iframe-container">
    <iframe id="adIframe" src="about:blank"></iframe>
</div>
<div class="note">
    ⏱️ Реклама загружается... Вы сможете закрыть окно через <strong id="secLabel">10</strong> секунд
</div>

<script>
    // ТВОЯ ССЫЛКА
    const smartlinkUrl = 'https://www.profitablecpmratenetwork.com/vi562ifgx4?key=75405d02d81a39be756d180c43747c47';
    
    // Загружаем рекламу в iframe
    const iframe = document.getElementById('adIframe');
    iframe.src = smartlinkUrl;
    
    // Таймер 10 секунд
    let seconds = 10;
    const timerElement = document.getElementById('timer');
    const secLabel = document.getElementById('secLabel');
    const closeBtn = document.getElementById('closeBtn');
    
    const interval = setInterval(() => {
        seconds--;
        timerElement.innerText = seconds;
        secLabel.innerText = seconds;
        
        if (seconds <= 0) {
            clearInterval(interval);
            // Активируем кнопку
            closeBtn.disabled = false;
            closeBtn.classList.add('active');
            closeBtn.innerText = '✖ Закрыть сейчас';
            document.querySelector('.note').innerHTML = '✅ Реклама загружена. Вы можете закрыть окно.';
        }
    }, 1000);
    
    // Закрытие вкладки по кнопке (только когда активна)
    closeBtn.addEventListener('click', () => {
        if (closeBtn.disabled) return;
        window.close();
        // fallback
        setTimeout(() => {
            document.body.innerHTML = '<div style="text-align:center; padding:50px; color:white; background:#0a0c10; height:100vh;">⚠️ Не удалось закрыть автоматически. Пожалуйста, закройте вкладку вручную.</div>';
        }, 200);
    });
</script>
</body>
</html>
