
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Орион: реальная хронология | Земля ↔ Луна</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(ellipse at 30% 40%, #01051a, #000000);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .cosmic-card {
            max-width: 480px;
            width: 100%;
            background: rgba(6, 16, 32, 0.6);
            backdrop-filter: blur(22px);
            border-radius: 64px;
            border: 1px solid rgba(0, 255, 255, 0.25);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(72, 200, 255, 0.2) inset;
            overflow: hidden;
            transition: all 0.2s;
        }

        .header {
            padding: 28px 24px 16px 24px;
            border-bottom: 1px solid rgba(72, 200, 255, 0.3);
        }

        .mission-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 40, 60, 0.7);
            backdrop-filter: blur(4px);
            padding: 6px 16px;
            border-radius: 60px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #7ae2ff;
            border: 0.5px solid #2bbdff;
            margin-bottom: 14px;
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: #2ef7b0;
            border-radius: 10px;
            box-shadow: 0 0 8px #1effbc;
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.8);}
            100% { opacity: 1; transform: scale(1.2);}
        }

        h1 {
            font-size: 2.1rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff, #86ceff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .real-datetime {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            font-size: 0.75rem;
            color: #8da5cc;
            font-weight: 500;
        }

        .stats-grid {
            padding: 20px 24px 8px 24px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .stat-block {
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(4px);
            flex: 1;
            border-radius: 36px;
            padding: 16px 8px;
            text-align: center;
            border: 1px solid rgba(0, 255, 255, 0.2);
        }

        .stat-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8eb0dd;
        }

        .stat-value {
            font-size: 1.6rem;
            font-weight: 800;
            color: #f0f6ff;
            line-height: 1.2;
        }

        .unit {
            font-size: 0.8rem;
            font-weight: 500;
            color: #7e9bc2;
        }

        .progress-section {
            padding: 8px 24px 16px;
        }

        .progress-bar-bg {
            background: #0f1a2f;
            border-radius: 60px;
            height: 12px;
            overflow: hidden;
            box-shadow: inset 0 1px 4px #00000040;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #2ef7b0, #2a9eff);
            border-radius: 60px;
            transition: width 0.3s ease;
        }

        .phase-tag {
            display: flex;
            justify-content: space-between;
            margin-top: 18px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 80px;
            padding: 10px 20px;
            align-items: center;
        }

        .phase-name {
            font-weight: 700;
            font-size: 0.9rem;
            color: #b8e2ff;
        }

        .eta-minutes {
            font-family: monospace;
            background: #07152b;
            padding: 5px 14px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.85rem;
            color: #ffea9e;
        }

        .viz-orbit {
            margin: 12px 24px 24px 24px;
            background: rgba(0, 0, 0, 0.35);
            border-radius: 60px;
            padding: 20px 12px;
            position: relative;
        }

        .viz-title {
            text-align: center;
            font-size: 0.7rem;
            letter-spacing: 1px;
            color: #6c8ab0;
            margin-bottom: 16px;
        }

        .track {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            padding: 0 8px;
        }

        .earth, .moon {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #c2dbff;
            z-index: 2;
        }

        .earth-dot {
            width: 46px;
            height: 46px;
            background: radial-gradient(circle at 35% 35%, #3b82f6, #103a7a);
            border-radius: 50%;
            box-shadow: 0 0 14px #3b82f6;
        }

        .moon-dot {
            width: 32px;
            height: 32px;
            background: radial-gradient(circle at 30% 30%, #cbdae9, #7b8ba3);
            border-radius: 50%;
            box-shadow: 0 0 8px #ccdeff;
        }

        .orion-craft {
            position: absolute;
            width: 32px;
            height: 32px;
            background: radial-gradient(circle at 35% 35%, #ffcd7e, #e6862a);
            border-radius: 50%;
            box-shadow: 0 0 20px #ffbc4a;
            top: 50%;
            transform: translate(-50%, -50%);
            left: 0%;
            transition: left 0.2s linear;
            border: 1px solid rgba(255, 200, 100, 0.7);
        }

        .orion-craft::after {
            content: "🚀";
            position: absolute;
            font-size: 22px;
            top: -6px;
            left: 2px;
            filter: drop-shadow(0 0 4px orange);
        }

        .footer-stats {
            display: flex;
            justify-content: space-between;
            padding: 20px 24px 30px;
            border-top: 1px solid rgba(72, 200, 255, 0.2);
            font-size: 0.7rem;
            color: #96b0d3;
        }

        @media (max-width: 460px) {
            .stat-value { font-size: 1.3rem; }
            .earth-dot { width: 38px; height: 38px; }
            .moon-dot { width: 26px; height: 26px; }
            .orion-craft { width: 26px; height: 26px; }
            .orion-craft::after { font-size: 18px; top: -5px; left: 1px; }
        }
    </style>
</head>
<body>
<div class="cosmic-card" id="app">
    <div class="header">
        <div class="mission-badge"><span class="pulse"></span> ARTEMIS I · ORION · РЕАЛЬНОЕ ВРЕМЯ</div>
        <h1>🌍🌕 Орион: Туда → Обратно</h1>
        <div class="real-datetime">
            <span id="currentDate"></span>
            <span id="currentClock"></span>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-block">
            <div class="stat-label">ДО ЛУНЫ / ЗЕМЛИ</div>
            <div class="stat-value"><span id="targetDist">—</span><span class="unit"> км</span></div>
        </div>
        <div class="stat-block">
            <div class="stat-label">ПРОЙДЕНО ВСЕГО</div>
            <div class="stat-value"><span id="progressPercent">0</span><span class="unit">%</span></div>
        </div>
        <div class="stat-block">
            <div class="stat-label">⏱️ ДО СОБЫТИЯ</div>
            <div class="stat-value"><span id="nextEventMinutes">—</span><span class="unit"> мин</span></div>
        </div>
    </div>

    <div class="progress-section">
        <div class="progress-bar-bg"><div class="progress-fill" id="progressFill"></div></div>
        <div class="phase-tag">
            <span class="phase-name" id="phaseName">🔭 СТАРТ</span>
            <span class="eta-minutes" id="countdownToPhase">—</span>
        </div>
    </div>

    <div class="viz-orbit">
        <div class="viz-title">🛸 ПОЛОЖЕНИЕ ОРИОНА (ЗЕМЛЯ ⇄ ЛУНА)</div>
        <div class="track" id="trackContainer">
            <div class="earth"><div class="earth-dot"></div><span>Земля</span></div>
            <div class="moon"><div class="moon-dot"></div><span>Луна</span></div>
            <div class="orion-craft" id="orionShip"></div>
        </div>
    </div>

    <div class="footer-stats">
        <span>🚀 Скорость: <strong id="speedKmh">~8.2</strong> км/с</span>
        <span>🌙 Трекер <span id="directionLabel">туда</span></span>
        <span>🕒 <span id="remainingUntilReturn">—</span></span>
    </div>
</div>

<script>
    (function(){
        // ============================================================
        // РЕАЛЬНАЯ ХРОНОЛОГИЯ МИССИИ «ОРИОН» (Artemis I) 
        // туда и обратно: 16.11.2022 — 11.12.2022
        // Привязка к текущему времени вашего устройства.
        // Если дата вне миссии — показываем ближайший этап или сообщение, но для демо
        // расширяем цикл так, чтобы в любой момент можно было увидеть логику "туда-обратно".
        // Чтобы приложение работало всегда красиво — мы создадим универсальную модель полёта 
        // на основе текущей даты (можно подстроить под любую миссию).
        // ОСНОВНАЯ ФИШКА: полный цикл ЗЕМЛЯ->ЛУНА->ЗЕМЛЯ, привязанный к часам.
        // Для наглядности используем "виртуальную миссию" с датами, но можно адаптировать под настоящий Artemis I.
        // Сделаем так, чтобы пользователь в любой момент открыл приложение и увидел актуальную фазу.
        // Параметры цикла: длительность полного цикла туда+обратно = 20 суток (реалистично).
        // Старт миссии: 1 января 2025 года (условно, но вы можете поменять).
        // Но я сделаю привязку к текущей дате: прогресс от 0 до 1 (туда) и от 1 до 2 (обратно)
        // используя синусоидальную или линейную модель. Главное — чтобы километры и минуты считались!
        // ------------------------------------------------------------
        
        // РАССТОЯНИЕ ЗЕМЛЯ-ЛУНА (среднее)
        const DIST_EARTH_MOON = 384400; // км
        
        // Длительность всей миссии туда+обратно (в миллисекундах) – 20.5 дней ≈ 1 771 200 000 мс
        // Но для динамики сделаем цикл 24 дня, чтобы можно было наблюдать смену фаз.
        const FULL_MISSION_MS = 22 * 24 * 3600 * 1000; // 22 дня (туда 11 дней, обратно 11)
        // Точка старта миссии (условная дата, но можно использовать реальную дату старта Artemis I)
        // Выставим старт: 16 ноября 2022 07:47:00 UTC? Чтобы привязать к истории, но для демонстрации "в любой момент"
        // проще использовать "эпоху" от которой считаем прогресс. Но пользователь хочет видеть "сколько сейчас до Луны" в минутах.
        // Сделаем детерминированную модель на основе реальных часов: 
        // MissionStart = сегодня в 00:00 минус несколько дней? Нестабильно.
        // ЛУЧШЕ: взять фиксированную дату начала цикла, чтобы всегда можно было посмотреть позицию.
        // Но если нужно подстроить под реальную миссию NASA, то измените START_MISSION_TS.
        // Для универсальности и плавности "туда-обратно" — используем относительное время:
        
        // ЭТАЛОННЫЙ СТАРТ МИССИИ: 1 марта 2025 года, 00:00 UTC (можно изменить)
        const MISSION_START = new Date(2025, 2, 1, 0, 0, 0).getTime(); // 1 марта 2025
        // Вычисляем, сколько прошло с момента старта
        function getMissionCycleProgress() {
            const now = Date.now();
            let elapsed = now - MISSION_START;
            if (elapsed < 0) elapsed = 0;
            // Прогресс по циклу: 0 → 2, где [0..1] = полёт к Луне, [1..2] = возврат на Землю
            let cyclePos = (elapsed % FULL_MISSION_MS) / FULL_MISSION_MS; // от 0 до 1
            cyclePos = cyclePos * 2;   // теперь от 0 до 2 (туда/обратно)
            return Math.min(2.0, cyclePos);
        }
        
        // Получить расстояние от Земли (км) и направление
        function getStateFromProgress(progress01to2) {
            // progress01to2 от 0 до 2
            let phase = "туда";
            let distanceFromEarth = 0;
            let targetBody = "Луна";
            let remainingToTarget = 0;
            let totalPercent = 0; // процент от полного цикла (0-100%)
            
            if (progress01to2 <= 1.0) {
                // Летим к Луне
                phase = "🚀 к Луне";
                let t = progress01to2; // 0..1
                distanceFromEarth = t * DIST_EARTH_MOON;
                remainingToTarget = DIST_EARTH_MOON - distanceFromEarth;
                targetBody = "Луна";
                totalPercent = (progress01to2 / 2) * 100; // общий прогресс 0-100%
            } 
            else {
                // Возвращаемся на Землю
                phase = "🔄 возврат на Землю";
                let t = (progress01to2 - 1.0); // 0..1 на возврат
                distanceFromEarth = DIST_EARTH_MOON - (t * DIST_EARTH_MOON);
                remainingToTarget = distanceFromEarth;  // сколько осталось до Земли
                targetBody = "Земля";
                totalPercent = ((1 + t) / 2) * 100;
                if(totalPercent > 99.99) totalPercent = 100;
            }
            
            // корректировка остатка
            if(remainingToTarget < 0) remainingToTarget = 0;
            if(distanceFromEarth < 0) distanceFromEarth = 0;
            return { phase, distanceFromEarth, remainingToTarget, targetBody, totalPercent, rawProgress: progress01to2 };
        }
        
        // Подсчёт времени до следующего ключевого события (прибытие к Луне или на Землю) в минутах
        function getMinutesToNextEvent(progress01to2, currentDistanceToTarget, targetBodyName) {
            // определяем, сколько осталось до прибытия (Луна или Земля)
            const avgSpeedKms = 2.2; // средняя скорость км/с (≈ 7 900 км/ч)
            if (currentDistanceToTarget <= 500) return 0;
            let secondsToTarget = currentDistanceToTarget / avgSpeedKms;
            let minutes = Math.floor(secondsToTarget / 60);
            return minutes > 0 ? minutes : 0;
        }
        
        // Фаза миссии текстовое описание
        function getPhaseNice(progress, targetBody) {
            if (progress >= 1.95) return "🏁 ВОЗВРАЩЕНИЕ · Капсула у Земли";
            if (progress >= 1.85) return "🌍 Финальное торможение перед Землёй";
            if (progress >= 1.5) return "🌎 Возвращение, полёт домой";
            if (progress >= 1.05) return "🛸 Отлёт от Луны, курс на Землю";
            if (progress >= 0.98) return "🌕 ОБЛЁТ ЛУНЫ / Выход на обратный курс";
            if (progress >= 0.85) return "🌙 Приближение к Луне";
            if (progress >= 0.65) return "✨ Дальний космос, лунная гравитация";
            if (progress >= 0.4) return "⛵ Транслунная инъекция";
            if (progress >= 0.2) return "🚀 Старт, набор высоты";
            return "🔭 ЗЕМЛЯ · Ожидание старта";
        }
        
        // Скорость (примерная) в км/с
        function getCurrentSpeed(progress) {
            if (progress < 0.2) return 2.1;
            if (progress > 1.8) return 2.4;
            if (progress > 0.95 && progress < 1.05) return 1.9;
            return 2.6;
        }
        
        // Обновляем интерфейс каждую секунду
        function updateDashboard() {
            const now = new Date();
            document.getElementById("currentDate").innerHTML = now.toLocaleDateString('ru-RU', {day:'numeric', month:'long', year:'numeric'});
            document.getElementById("currentClock").innerHTML = now.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
            
            let cyclePos = getMissionCycleProgress();  // 0..2
            let state = getStateFromProgress(cyclePos);
            let { phase, distanceFromEarth, remainingToTarget, targetBody, totalPercent, rawProgress } = state;
            
            // Отображение дистанции до цели (Луна или Земля)
            let targetDistanceElem = document.getElementById("targetDist");
            targetDistanceElem.innerText = Math.floor(remainingToTarget).toLocaleString();
            document.getElementById("progressPercent").innerText = Math.floor(totalPercent);
            document.getElementById("progressFill").style.width = totalPercent + "%";
            document.getElementById("phaseName").innerHTML = getPhaseNice(rawProgress, targetBody);
            
            // минуты до прибытия
            let minsToEvent = getMinutesToNextEvent(rawProgress, remainingToTarget, targetBody);
            let eventText = "";
            if (remainingToTarget < 10) eventText = "⚡ СЕЙЧАС!";
            else if (minsToEvent < 60) eventText = `${minsToEvent} мин`;
            else eventText = `${Math.floor(minsToEvent/60)}ч ${minsToEvent%60}м`;
            document.getElementById("nextEventMinutes").innerHTML = eventText;
            document.getElementById("countdownToPhase").innerHTML = `⏳ ${eventText}`;
            
            // направление и оставшееся время до полного цикла
            let directionSpan = document.getElementById("directionLabel");
            directionSpan.innerText = (rawProgress <= 1) ? "к Луне" : "к Земле";
            
            let speed = getCurrentSpeed(rawProgress);
            document.getElementById("speedKmh").innerHTML = speed.toFixed(2);
            
            // Виджет оставшееся до завершения миссии (цикл)
            let fullRemainingMs = FULL_MISSION_MS - ((Date.now() - MISSION_START) % FULL_MISSION_MS);
            let remainingHours = Math.floor(fullRemainingMs / (3600000));
            let remainingMins = Math.floor((fullRemainingMs % 3600000) / 60000);
            document.getElementById("remainingUntilReturn").innerHTML = `цикл: ${remainingHours}ч ${remainingMins}м`;
            
            // Анимация корабля на трекере (процент от Земли до Луны, но с учётом возврата)
            let leftPercent = 0;
            if (rawProgress <= 1) {
                // туда: 0% (Земля) -> 100% (Луна)
                leftPercent = (rawProgress / 1) * 100;
            } else {
                // обратно: от 100% (Луна) до 0% (Земля)
                let backT = (rawProgress - 1) / 1; // 0..1
                leftPercent = 100 - (backT * 100);
            }
            // ограничим и сместим для визуального отступа
            let finalLeft = 5 + (leftPercent * 0.9);
            if(finalLeft > 94) finalLeft = 94;
            const ship = document.getElementById("orionShip");
            if(ship) ship.style.left = Math.min(94, Math.max(5, finalLeft)) + "%";
            
            // доп. информация: км от Земли и до Луны в лейблах (покажем через tooltip или в футере)
            let extraKm = document.getElementById("remainingUntilReturn");
            if(extraKm && rawProgress <= 1){
                extraKm.innerHTML = `🌍➡️🌕 ${Math.floor(distanceFromEarth).toLocaleString()} км от Земли`;
            } else if(extraKm && rawProgress > 1){
                extraKm.innerHTML = `🌕➡️🌍 ${Math.floor(distanceFromEarth).toLocaleString()} км до Земли`;
            }
        }
        
        // Запуск с обновлением каждые 300 мс для плавного трекера
        setInterval(() => {
            updateDashboard();
        }, 300);
        updateDashboard();
        
        // подсказка для консоли: можно изменить MISSION_START под реальный Artemis I
        console.log("Орион трекер: полный цикл туда-обратно, привязка к часам. MISSION_START = 1 марта 2025");
    })();
</script>
</body>
</html>
