<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Видео + MP3 → MP4 | Плавная замена звука</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            margin-bottom: 6px;
            color: #2d3748;
            font-size: 1.8rem;
        }

        .sub {
            text-align: center;
            color: #718096;
            margin-bottom: 24px;
            font-size: 0.85rem;
        }

        .upload-box {
            border: 2px dashed #cbd5e0;
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            margin-bottom: 16px;
            cursor: pointer;
            transition: all 0.2s;
            background: #f8fafc;
        }

        .upload-box:hover {
            border-color: #667eea;
            background: #edf2f7;
        }

        .upload-icon {
            font-size: 40px;
            margin-bottom: 8px;
        }

        .file-name {
            font-size: 12px;
            color: #718096;
            word-break: break-all;
            margin-top: 8px;
        }

        input[type="file"] {
            display: none;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 16px 0;
            transition: opacity 0.2s;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .progress-bar {
            height: 8px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
            margin: 16px 0;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s;
        }

        .status {
            background: #f8fafc;
            padding: 12px;
            border-radius: 16px;
            text-align: center;
            font-size: 14px;
            margin: 16px 0;
        }

        .preview-title {
            font-weight: 600;
            margin-top: 16px;
            margin-bottom: 8px;
            color: #4a5568;
        }

        video {
            width: 100%;
            border-radius: 16px;
            background: #000;
            max-height: 300px;
        }

        .timer {
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            color: #667eea;
            margin: 12px 0;
            padding: 8px;
            background: #f0f4ff;
            border-radius: 40px;
        }

        .hidden {
            display: none;
        }

        .footer {
            text-align: center;
            font-size: 11px;
            color: #a0aec0;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #e2e8f0;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🎬 Видео + MP3</h1>
    <div class="sub">Замена звука в MP4 на вашу MP3 — плавно и быстро</div>

    <div class="upload-box" id="videoBox">
        <div class="upload-icon">📹</div>
        <div>Нажмите или перетащите видео (MP4)</div>
        <div class="file-name" id="videoName"></div>
        <input type="file" id="videoInput" accept="video/mp4">
    </div>

    <div class="upload-box" id="audioBox">
        <div class="upload-icon">🎵</div>
        <div>Нажмите или перетащите аудио (MP3)</div>
        <div class="file-name" id="audioName"></div>
        <input type="file" id="audioInput" accept="audio/mpeg">
    </div>

    <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="timer hidden" id="timer">⏳ 0 сек</div>

    <button id="mergeBtn" disabled>✨ Объединить и скачать</button>

    <div class="status" id="status">Ожидание загрузки файлов...</div>

    <div class="preview-title">📺 Результат (после обработки)</div>
    <video id="preview" controls></video>

    <div class="footer">
        ⚡ Обработка в браузере, файлы никуда не уходят<br>
        📱 Оптимизировано для телефонов
    </div>
</div>

<script>
    let videoFile = null;
    let audioFile = null;
    let isProcessing = false;

    const videoBox = document.getElementById('videoBox');
    const audioBox = document.getElementById('audioBox');
    const videoInput = document.getElementById('videoInput');
    const audioInput = document.getElementById('audioInput');
    const videoName = document.getElementById('videoName');
    const audioName = document.getElementById('audioName');
    const mergeBtn = document.getElementById('mergeBtn');
    const progressFill = document.getElementById('progressFill');
    const statusDiv = document.getElementById('status');
    const preview = document.getElementById('preview');
    const timerDiv = document.getElementById('timer');

    function updateProgress(percent) {
        progressFill.style.width = Math.min(percent, 100) + '%';
    }

    function setStatus(msg, isError = false) {
        statusDiv.innerHTML = msg;
        statusDiv.style.background = isError ? '#fed7d7' : '#f8fafc';
        statusDiv.style.color = isError ? '#c53030' : '#4a5568';
    }

    function formatFileSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / 1048576).toFixed(1) + ' MB';
    }

    videoBox.onclick = () => videoInput.click();
    audioBox.onclick = () => audioInput.click();

    videoInput.onchange = (e) => {
        if (e.target.files[0]) {
            videoFile = e.target.files[0];
            videoName.innerText = `${videoFile.name} (${formatFileSize(videoFile.size)})`;
            checkReady();
        }
    };

    audioInput.onchange = (e) => {
        if (e.target.files[0]) {
            audioFile = e.target.files[0];
            audioName.innerText = `${audioFile.name} (${formatFileSize(audioFile.size)})`;
            checkReady();
        }
    };

    function checkReady() {
        mergeBtn.disabled = !(videoFile && audioFile);
        if (videoFile && audioFile) {
            setStatus('✅ Файлы загружены. Нажмите "Объединить и скачать"');
        }
    }

    async function mergeVideoAudio() {
        if (isProcessing || !videoFile || !audioFile) return;
        isProcessing = true;
        mergeBtn.disabled = true;
        mergeBtn.innerText = '⏳ Обработка...';
        updateProgress(0);
        setStatus('🎬 Начинаем объединение, пожалуйста, подождите...');

        if (preview.src && preview.src.startsWith('blob:')) {
            URL.revokeObjectURL(preview.src);
        }
        preview.src = '';

        try {
            const videoUrl = URL.createObjectURL(videoFile);
            const video = document.createElement('video');
            video.muted = true;
            video.playsInline = true;
            video.src = videoUrl;

            await new Promise((resolve) => {
                video.onloadedmetadata = resolve;
            });

            const duration = video.duration;
            let width = video.videoWidth || 640;
            let height = video.videoHeight || 480;

            const maxDim = 1280;
            if (width > maxDim || height > maxDim) {
                const ratio = Math.min(maxDim / width, maxDim / height);
                width = Math.floor(width * ratio);
                height = Math.floor(height * ratio);
            }

            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');

            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const audioArrayBuf = await audioFile.arrayBuffer();
            let audioBuffer = await audioCtx.decodeAudioData(audioArrayBuf);

            if (audioBuffer.sampleRate !== 48000) {
                const offlineCtx = new OfflineAudioContext(
                    audioBuffer.numberOfChannels,
                    Math.ceil(audioBuffer.length * 48000 / audioBuffer.sampleRate),
                    48000
                );
                const source = offlineCtx.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(offlineCtx.destination);
                source.start();
                audioBuffer = await offlineCtx.startRendering();
            }

            const audioSource = audioCtx.createBufferSource();
            audioSource.buffer = audioBuffer;
            const dest = audioCtx.createMediaStreamDestination();
            audioSource.connect(dest);

            const canvasStream = canvas.captureStream(30);
            const combinedStream = new MediaStream([
                ...canvasStream.getVideoTracks(),
                ...dest.stream.getAudioTracks()
            ]);

            let mimeType = 'video/webm';
            if (MediaRecorder.isTypeSupported('video/mp4;codecs=h264,aac')) {
                mimeType = 'video/mp4;codecs=h264,aac';
            } else if (MediaRecorder.isTypeSupported('video/mp4')) {
                mimeType = 'video/mp4';
            }

            const recorder = new MediaRecorder(combinedStream, {
                mimeType: mimeType,
                videoBitsPerSecond: 2500000,
                audioBitsPerSecond: 128000
            });

            const chunks = [];
            recorder.ondataavailable = (e) => {
                if (e.data.size > 0) chunks.push(e.data);
            };

            // Таймер: ~0.45 секунды на 1 МБ (реалистичная оценка)
            const estimatedSec = Math.max(3, Math.floor(videoFile.size / (1024 * 1024) * 0.45));
            timerDiv.classList.remove('hidden');
            let remaining = estimatedSec;
            timerDiv.innerText = `⏳ Осталось: ${remaining} сек`;
            const timerInterval = setInterval(() => {
                if (remaining > 0) {
                    remaining--;
                    timerDiv.innerText = `⏳ Осталось: ${remaining} сек`;
                } else {
                    clearInterval(timerInterval);
                }
            }, 1000);

            recorder.start(100);

            video.currentTime = 0;
            await video.play();
            audioSource.start(0, 0, duration);

            function drawFrame() {
                if (video.paused || video.ended) return;

                const vw = video.videoWidth;
                const vh = video.videoHeight;
                const scale = Math.max(width / vw, height / vh);
                const drawW = vw * scale;
                const drawH = vh * scale;
                const offX = (width - drawW) / 2;
                const offY = (height - drawH) / 2;
                ctx.clearRect(0, 0, width, height);
                ctx.drawImage(video, offX, offY, drawW, drawH);

                const percent = (video.currentTime / duration) * 100;
                updateProgress(percent);

                requestAnimationFrame(drawFrame);
            }
            drawFrame();

            await new Promise((resolve) => {
                video.onended = resolve;
            });

            clearInterval(timerInterval);
            timerDiv.classList.add('hidden');

            setTimeout(() => {
                if (recorder.state === 'recording') {
                    recorder.stop();
                }
                try { audioSource.stop(); } catch(e) {}
            }, 200);

            await new Promise((resolve) => {
                recorder.onstop = resolve;
            });

            const blob = new Blob(chunks, { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);

            preview.src = url;
            preview.load();

            const a = document.createElement('a');
            a.href = url;
            a.download = `video_with_new_audio_${Date.now()}.mp4`;
            a.click();

            setStatus(`✅ Готово! Размер: ${formatFileSize(blob.size)}. Файл скачан автоматически.`);
            updateProgress(100);

            URL.revokeObjectURL(videoUrl);
            await audioCtx.close();

        } catch (err) {
            console.error(err);
            setStatus(`❌ Ошибка: ${err.message || 'Не удалось объединить файлы'}`, true);
            updateProgress(0);
            timerDiv.classList.add('hidden');
        } finally {
            isProcessing = false;
            mergeBtn.disabled = false;
            mergeBtn.innerText = '✨ Объединить и скачать';
        }
    }

    mergeBtn.onclick = mergeVideoAudio;
</script>
</body>
</html>
